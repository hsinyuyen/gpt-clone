let parts=[],ripples=[],pops=[],sh={mag:0,until:0};
function burst(x,y,col,n){ for(let i=0;i<(n||16);i++){ const a=Math.random()*7,s=1.5+Math.random()*4; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col}); } }
function confetti(){ for(let i=0;i<180;i++){ parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*2,vy:2+Math.random()*4,life:1.7,col:['#ff5d6c','#ffce47','#2bd17e','#5bc0ff','#ff7ab0'][i%5],fall:true}); } }
function ripple(x,y,col){ ripples.push({x,y,r:6,col:col||'#8fd0ff',t:1}); }
function popText(x,y,txt,col,sc){ pops.push({x,y,txt,col:col||'#fff',t:0,vy:-0.85,sc:sc||1}); }
function shake(m,ms){ sh.mag=m; sh.until=now()+ms; }

function drawFx(){ parts.forEach(p=>{ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; if(p.fall){ ctx.fillRect(p.x,p.y,6,9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); } }); ctx.globalAlpha=1;
  ripples.forEach(r=>{ ctx.globalAlpha=clamp(r.t,0,1)*0.6; ctx.strokeStyle=r.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }); ctx.globalAlpha=1;
  pops.forEach(p=>{ ctx.save(); ctx.globalAlpha=clamp(1-p.t,0,1); const bp=1+0.4*(1-Math.min(1,p.t*4)); const fs=Math.round(24*p.sc*bp); ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(2,10,20,.55)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); ctx.restore(); }); ctx.globalAlpha=1; }
function gHeart(x,y,r,filled){ ctx.save(); ctx.beginPath(); ctx.moveTo(x,y+r*0.85); ctx.bezierCurveTo(x-r*1.3,y-r*0.15,x-r*0.55,y-r*1.15,x,y-r*0.35); ctx.bezierCurveTo(x+r*0.55,y-r*1.15,x+r*1.3,y-r*0.15,x,y+r*0.85); ctx.closePath(); if(filled){ ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=6; ctx.fillStyle='#ff5d6c'; ctx.fill(); } else { ctx.strokeStyle='#5a6b7a'; ctx.lineWidth=2.5; ctx.stroke(); } ctx.restore(); }
const GEMS=[{col:'#ff5d6c',hi:'#ffd0d5'},{col:'#ffa63c',hi:'#ffe3b0'},{col:'#7cff9e',hi:'#d6ffe2'},{col:'#5bc0ff',hi:'#cdeeff'},{col:'#c48ae8',hi:'#eddaf7'}];

function isCJK(ch){ const c=ch.codePointAt(0); return c>=0x4E00 && c<=0x9FFF; }

function splitZhu(z){ if(!z) return {syms:[],tone:''}; const a=[...z]; let tone=''; if(a.length&&TONES.has(a[a.length-1])) tone=a.pop(); return {syms:a,tone}; }
function rubyMetrics(fs){ const zf=Math.max(8,Math.round(fs*0.46)); return { zf, zcol:zf, toneW:Math.round(zf*0.72), gap:Math.round(fs*0.10), cellGap:Math.round(fs*0.10), stepY:Math.round(zf*0.84) }; }
function rubyWidth(line,fs){ const m=rubyMetrics(fs); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; let total=0;

function gWASD(x,y,s,hlDir){ const k=s*0.5, g=k*1.12; const pos={W:[0,-g*0.55],A:[-g,g*0.45],S:[0,g*0.45],D:[g,g*0.45]};

/* POV зҺ©е®¶иҰ–и§’жү“ж“ҠеӢ•з•«пјҲжІҝз”Ё W02пјҡеҠҚ/йҺҡ/зӣҫ/жқ–пјӣең–жңӘијүйҖҖеӣһеҗ‘йҮҸпјү */
let pov=null;

/* ---------- ијёе…ҘеұӨпјҲPointer + wheel + еҸійҚөвҶ’menuпјӣе·ҰйҚөе–®/йӣҷ/й•·жҢү/holdпјү ---------- */
const mouse={x:W/2,y:H/2,down:false,downBtn:0};
const TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0;
let evQ=[], lastLeft=null, singleTimer=null, longTimer=null, leftDownAt=0, leftHeld=false;
const DBL_MS=380, DBL_DIST=120, LONG_MS=500;
function xy(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
cv.addEventListener('pointerdown',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=true; mouse.downBtn=e.button; try{cv.setPointerCapture(e.pointerId);}catch(_){}
  if(dpadHit(x,y,true)) { return; }
  if(e.button===2){ evQ.push({t:'menu',x,y}); return; }
  evQ.push({t:'down',x,y,btn:e.button});
  if(e.button===0){ leftDownAt=now(); leftHeld=true; const tt=now();
    if(lastLeft && (tt-lastLeft.t)<=DBL_MS && dist(x,y,lastLeft.x,lastLeft.y)<=DBL_DIST){ evQ.push({t:'dbl',x,y}); lastLeft=null; }
    else { lastLeft={t:tt,x,y}; } } });
cv.addEventListener('pointermove',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; dpadHit(x,y,mouse.down); });
cv.addEventListener('pointerup',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=false;
  if(dpadRelease()) { leftHeld=false; return; }
  evQ.push({t:'up',x,y}); if(e.button===0||mouse.downBtn===0){ leftHeld=false; } try{cv.releasePointerCapture(e.pointerId);}catch(_){} });
cv.addEventListener('pointercancel',()=>{ mouse.down=false; leftHeld=false; dpadRelease(); evQ.push({t:'cancel'}); });
cv.addEventListener('wheel',e=>{ e.preventDefault(); let dy=e.deltaY; if(e.deltaMode===1) dy*=16; else if(e.deltaMode===2) dy*=(H||600); evQ.push({t:'wheel',dy}); },{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
function clearInput(){ evQ=[]; lastLeft=null; mouse.down=false; leftHeld=false; keys.up=keys.down=keys.left=keys.right=0; }

/* ---------- WASD иө°дҪҚпјҲе·ҰжүӢпјүпјӢ и§ёжҺ§ж–№еҗ‘йҲ• ---------- */
const keys={up:0,down:0,left:0,right:0};
window.addEventListener('keydown',e=>{ if(S.phase!=='wave'&&S.phase!=='tut')return; const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')keys.up=1; else if(k==='s'||k==='arrowdown')keys.down=1; else if(k==='a'||k==='arrowleft')keys.left=1; else if(k==='d'||k==='arrowright')keys.right=1; else return; e.preventDefault(); });
window.addEventListener('keyup',e=>{ const k=e.key.toLowerCase(); if(k==='w'||k==='arrowup')keys.up=0; else if(k==='s'||k==='arrowdown')keys.down=0; else if(k==='a'||k==='arrowleft')keys.left=0; else if(k==='d'||k==='arrowright')keys.right=0; });
window.addEventListener('blur',()=>{ keys.up=keys.down=keys.left=keys.right=0; });
// и§ёжҺ§ж–№еҗ‘йҲ•пјҲе·ҰдёӢи§’еҚҒеӯ—пјүпјҡз„ЎйҚөзӣӨиЈңе„ҹ
let dpadActive=false;
function dpadGeo(){ const r=Math.min(W,H)*0.11, cx=r*1.5, cy=H-r*1.5; return {cx,cy,r}; }
function dpadHit(x,y,isDown){ if(!TOUCH) return false; const g=dpadGeo(); if(!isDown){ if(dpadActive){/*keep*/} return false; }
  if(dist(x,y,g.cx,g.cy)<=g.r*2.1){ dpadActive=true; keys.up=keys.down=keys.left=keys.right=0; const dx=x-g.cx, dy=y-g.cy; if(Math.abs(dx)>g.r*0.3) (dx<0?keys.left=1:keys.right=1); if(Math.abs(dy)>g.r*0.3) (dy<0?keys.up=1:keys.down=1); return true; }
  return false; }
function dpadRelease(){ if(dpadActive){ dpadActive=false; keys.up=keys.down=keys.left=keys.right=0; return true; } return false; }
function drawDpad(){ if(!TOUCH) return; const g=dpadGeo(); ctx.save(); ctx.globalAlpha=0.5; ctx.fillStyle='rgba(4,18,32,.6)'; ctx.beginPath(); ctx.arc(g.cx,g.cy,g.r*1.6,0,7); ctx.fill();
  ctx.fillStyle='#8fd0ff'; const a=g.r*0.55; [[0,-1],[0,1],[-1,0],[1,0]].forEach(d=>{ const ax=g.cx+d[0]*g.r*0.95, ay=g.cy+d[1]*g.r*0.95; ctx.save(); ctx.translate(ax,ay); ctx.rotate(Math.atan2(d[1],d[0])+Math.PI/2); ctx.beginPath(); ctx.moveTo(0,-a*0.5); ctx.lineTo(a*0.42,a*0.4); ctx.lineTo(-a*0.42,a*0.4); ctx.closePath(); ctx.fill(); ctx.restore(); });

const SPOT_COL={click:'#5bc0ff', right:'#ff8a3c', dbl:'#3f8bff', gold:'#ffe27a'};
function spawnSpot(){ const B=st.boss, A=arena(); const kinds=st.cfg.spotKinds||['click']; let k=pick(kinds), gold=false; if(k==='gold'){ gold=true; k='click'; }
  const a=Math.random()*7, rr2=B.sz*(0.14+Math.random()*0.30), pad=Math.min(34,B.sz*0.14);
  let x=clamp(B.x+Math.cos(a)*rr2, A.x+pad, A.x+A.w-pad);

  st.spots.push({x,y, r:clamp(B.sz*0.10,20,30), kind:k, gold, born:now(), life:st.cfg.spotLife||2500}); }

function tryHitSpot(e){ const a=spotActionOf(e); if(!a) return; const s=hitTestSpot(e.x,e.y); if(!s) return;
  const ok=(s.kind===a)||(s.kind==='click'&&a==='dbl')||(TOUCH&&a==='click'); // йҖЈй»һе…©дёӢеҸҜжү“дёҖиҲ¬й»һпјӣи§ёжҺ§дёҖеҫӢй»һж“Ҡ
  if(ok){ popSpot(s); return; }
  if(s.kind==='dbl'&&a==='click') popText(s.x,s.y-s.r-8,'еҶҚй»һдёҖдёӢпјҒ','#9fd0ff',0.9);
  else if(s.kind==='right'){ popText(s.x,s.y-s.r-8,'иҰҒжҢүеҸійҚөпјҒ','#ffb27a',0.9); Sfx.tick(); }

  ctx.strokeStyle='#7cffb0'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2-2,-Math.PI/2,-Math.PI/2+f*Math.PI*2); ctx.stroke();
  ctx.restore(); drawRuby(P('йӯ”жі•','г„Үг„ӣЛҠ г„Ҳг„ҡЛҮ'), b.x+b.w/2, b.y+b.h/2, Math.min(15,b.w*0.24), ready?'#7cffb0':'#8fb7d6'); }
function drawWaveHUD(){ const cfg=st.cfg; st.ghost=lerp(st.ghost,st.hp,0.12);

function A0(){ return arena(); }

/* ================= DELIVERпјҲе®ҲдҪҸеҜ¶зҹі + з« йӯҡзҺӢеүӘеҪұ + TAпјү ================= */
function initDeliver(){ st.t0=now(); st.raised=false; st.ta=false; st.cam=0;
  if(!S.done){ S.done=true; S.coins=Math.min(TOTAL_COINS,S.coins+COIN_DONE); Account.creditCoins(GAMEKEY+'_done',COIN_DONE,'P1U-W03 ж“ҠйҖҖеүҚе“Ё'); for(let i=1;i<=N_WAVE;i++) Account.creditCoins(GAMEKEY+'_wave'+i,COIN_WAVE,'P1U-W03 з¬¬'+i+'жіў'); persist(); Sfx.win(); confetti(); } }
function taBtn(){ const w=Math.min(280,W*0.7), h=Math.min(60,H*0.09); return {x:W/2-w/2, y:H*0.72, w, h}; }
function raiseBtn(){ const w=Math.min(280,W*0.7), h=Math.min(60,H*0.09); return {x:W/2-w/2, y:H*0.82, w, h}; }
const ST_DELIVER={ update(evs){ st.cam=Math.min(1,st.cam+0.006); for(const e of evs){ if(e.t==='down'){ const t=taBtn(); if(e.x>=t.x&&e.x<=t.x+t.w&&e.y>=t.y&&e.y<=t.y+t.h&&!st.ta){ st.ta=true; Sfx.ding(); Account.creditCoins(GAMEKEY+'_ta',20,'P1U-W03 е°ҸиҖҒеё«'); S.coins=Math.min(TOTAL_COINS,S.coins+20); persist(); popText(W/2,H*0.5,'еҺ»ж•ҷдёҖдҪҚеҗҢеӯёпјҡдёҖжүӢиө°дҪҚгҖҒдёҖжүӢжҲ°й¬ҘпјҒ','#7cffb0',1.1); }
      const r=raiseBtn(); if(e.x>=r.x&&e.x<=r.x+r.w&&e.y>=r.y&&e.y<=r.y+r.h){ st.raised=true; Sfx.ding(); popText(W/2,H*0.5,'иҲүжүӢе‘ҠиЁҙиҖҒеё«дҪ е®ҲдҪҸдәҶпјҒ','#ffe27a',1.1); } } } },
  draw(){ seaBg(); const cx=W/2, cam=st.cam;
    // з« йӯҡзҺӢеүӘеҪұпјҲйҸЎй ӯжӢүйҒ жө®зҸҫпјү
    ctx.save(); ctx.globalAlpha=cam*0.55; drawOcto({x:cx, y:H*0.30, ang:0}, Math.min(120,W*0.28)*(0.8+cam*0.5), '#3a1550', false); ctx.restore();
    drawRuby(P('еүҚе“Ёиў«дҪ ж“ҠйҖҖдәҶпјҒ','г„‘г„§г„ўЛҠ г„•г„ ЛӢ г„…г„ҹЛӢ г„Ӣг„§ЛҮ г„җг„§ЛҠ г„Ҡг„Ёг„ҹЛӢ г„Ңг„ңЛҷ'), cx, H*0.12, Math.min(26,W*0.06), '#7cffb0');
    // еҜ¶зҹіеҲ— + е®үе…Ё
    const gy=H*0.5, gap=Math.min(60,W*0.11), gr=Math.min(20,W*0.04); for(let i=0;i<5;i++) gGemIcon(cx-2*gap+i*gap, gy, gr, true, i);
    drawRuby(P('еҜ¶зҹіе®үе…ЁпјҒ','г„…г„ ЛҮ г„•ЛҠ г„ў г„‘г„©г„ўЛҠ'), cx, gy+Math.min(46,H*0.07), Math.min(22,W*0.05), '#ffe27a');
    ctx.save(); ctx.globalAlpha=cam; drawRuby(P('жӣҙеӨ§зҡ„йӮ„еңЁеҫҢйқўвҖҰвҖҰ','г„Қг„ҘЛӢ г„үг„ҡЛӢ г„үг„ңЛҷ г„Ҹг„һЛҠ г„—г„һЛӢ г„Ҹг„ЎЛӢ г„Үг„§г„ўЛӢ'), cx, H*0.62, Math.min(18,W*0.04), '#cfa8e0'); ctx.restore();
    const t=taBtn(); rr(t.x,t.y,t.w,t.h,t.h/2); ctx.fillStyle=st.ta?'#2b6f4a':'#1f8f5a'; ctx.fill(); ctx.strokeStyle='#7cffb0'; ctx.lineWidth=2; ctx.stroke();
    drawRuby(st.ta?P('е·Із•¶е°ҸиҖҒеё« вң“','г„§ЛҮ г„үг„Ө г„’г„§г„ ЛҮ г„Ңг„ ЛҮ г„•'):P('жҲ‘жҳҜе°ҸиҖҒеё«','г„Ёг„ӣЛҮ г„•ЛӢ г„’г„§г„ ЛҮ г„Ңг„ ЛҮ г„•'), t.x+t.w/2, t.y+t.h/2, Math.min(20,W*0.045), '#eafff2');
    const r=raiseBtn(); rr(r.x,r.y,r.w,r.h,r.h/2); ctx.fillStyle=st.raised?'#7a5a1a':'#b8871f'; ctx.fill(); ctx.strokeStyle='#ffe27a'; ctx.lineWidth=2; ctx.stroke();
    drawRuby(st.raised?P('е·ІиҲүжүӢ вң“','г„§ЛҮ г„җг„©ЛҮ г„•г„ЎЛҮ'):P('иҲүжүӢе‘ҠиЁҙиҖҒеё«','г„җг„©ЛҮ г„•г„ЎЛҮ г„Қг„ ЛӢ г„ҷг„ЁЛӢ г„Ңг„ ЛҮ г„•'), r.x+r.w/2, r.y+r.h/2, Math.min(19,W*0.043), '#fff6e0');
    drawFx(); } };

/* ================= дё»иҝҙеңҲ ================= */
const DISPATCH={ cover:ST_COVER, tut:ST_TUT, story:ST_STORY, wave:ST_WAVE, deliver:ST_DELIVER };
let bootT=0;
// жүҖжңүең–йғҪжңүеҗ‘йҮҸ fallbackпјҢдёҚйңҖзӯүзҙ жқҗијүе…Ҙ вҶ’ зӣҙжҺҘй–Ӣи·‘пјҢйҒҝе…Қијүе…Ҙй–ҳй–ҖеҚЎдҪҸ
function frame1(){
  const evs=evQ; evQ=[];
  const cur=DISPATCH[S.phase]||ST_COVER;
  const so=shakeOffset(); ctx.save(); ctx.translate(so[0],so[1]);
  try{ cur.update(evs); }catch(e){ console.error('update',e); }
  try{ cur.draw(); }catch(e){ console.error('draw',e); }
  updateFx();
  if(S.phase==='wave') drawCoinHUD();
  ctx.restore(); }
function frame(){ frame1(); requestAnimationFrame(frame); }

function boot(){ bootT=now();
  const local=loadLocal(); if(local) S=local;
  renderAcct(); window.addEventListener('online',renderAcct); window.addEventListener('offline',renderAcct);
  goPhase(S.phase&&DISPATCH[S.phase]?S.phase:'cover');
  requestAnimationFrame(frame); // з«ӢеҲ»е•ҹеӢ•дё»иҝҙеңҲпјҢдёҚиў«йӣІз«Ҝијүе…ҘеҚЎдҪҸ
  // иғҢжҷҜијүе…ҘйӣІз«ҜйҖІеәҰпјҡијғйҒ иҖ…жүҚиҰҶи“ӢпјҢдё”еҸӘеңЁйӮ„жІ’й–Ӣе§ӢзҺ©жҷӮ
  (async()=>{ try{ const cloud=await Account.load(); if(cloud && (cloud.waveMax||0)>(S.waveMax||0)){ S=cloud; if(S.phase==='cover'||!DISPATCH[S.phase]) goPhase('cover'); } }catch(e){} })(); }
boot();

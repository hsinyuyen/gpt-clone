const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const SPRITES={}; let ASSET_TOTAL=0, ASSET_DONE=0;
function loadSprite(key,src){ ASSET_TOTAL++; const im=new Image(); const o={im,ready:false,sx:0,sy:0,sw:0,sh:0};
  im.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=im.width; c.height=im.height; const g=c.getContext('2d'); g.drawImage(im,0,0);
      const d=g.getImageData(0,0,c.width,c.height).data; let minx=c.width,miny=c.height,maxx=0,maxy=0; const step=4;
      for(let y=0;y<c.height;y+=step){ for(let x=0;x<c.width;x+=step){ if(d[(y*c.width+x)*4+3]>200){ if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; } } }
      if(maxx>minx&&maxy>miny){ o.sx=minx;o.sy=miny;o.sw=maxx-minx;o.sh=maxy-miny; } else { o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; }
    }catch(e){ o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; } o.ready=true; ASSET_DONE++; };
  im.onerror=()=>{ ASSET_DONE++; }; im.src=src; SPRITES[key]=o; }

function drawSprite(key,x,y,size,rot,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh; let w,h; if(ar>=1){ w=size; h=size/ar; } else { h=size; w=size*ar; }
  ctx.save(); if(alpha!==undefined) ctx.globalAlpha=alpha; ctx.translate(x,y); if(rot) ctx.rotate(rot); ctx.drawImage(s.im,s.sx,s.sy,s.sw,s.sh,-w/2,-h/2,w,h); ctx.restore(); return true; }
function drawCover(key,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh, war=W/H; let sw,sh,sx,sy;
  if(ar>war){ sh=s.sh; sw=s.sh*war; sx=s.sx+(s.sw-sw)/2; sy=s.sy; } else { sw=s.sw; sh=s.sw/war; sx=s.sx; sy=s.sy+(s.sh-sh)/2; }
  ctx.save(); ctx.globalAlpha=alpha===undefined?1:alpha; ctx.drawImage(s.im,sx,sy,sw,sh,0,0,W,H); ctx.restore(); return true; }

/* ---------- 音效 ---------- */
const Sfx=(function(){ let ac=null,on=true;
  function A(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } return ac; }
  function tone(f,d,t,v){ if(!on)return; const a=A(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),s=a.currentTime; o.type=t||'sine'; o.frequency.setValueAtTime(f,s); g.gain.setValueAtTime(v||0.05,s); g.gain.exponentialRampToValueAtTime(0.0001,s+d); o.connect(g).connect(a.destination); o.start(s); o.stop(s+d); }
  return { hit(n){tone(720+(clamp(n||0,0,12))*45,0.12,'sine',0.06);}, ding(){tone(920,0.12,'sine',0.06);},
    tick(){tone(320,0.045,'square',0.03);}, cue(){tone(500,0.09,'triangle',0.05); setTimeout(()=>tone(760,0.1,'sine',0.05),80);},

})();

/* ---------- 粒子 / 回饋 ---------- */
let parts=[],ripples=[],pops=[],sh={mag:0,until:0};
function burst(x,y,col,n){ for(let i=0;i<(n||16);i++){ const a=Math.random()*7,s=1.5+Math.random()*4; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col}); } }
function confetti(){ for(let i=0;i<180;i++){ parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*2,vy:2+Math.random()*4,life:1.7,col:['#ff5d6c','#ffce47','#2bd17e','#5bc0ff','#ff7ab0'][i%5],fall:true}); } }
function ripple(x,y,col){ ripples.push({x,y,r:6,col:col||'#8fd0ff',t:1}); }
function popText(x,y,txt,col,sc){ pops.push({x,y,txt,col:col||'#fff',t:0,vy:-0.85,sc:sc||1}); }
function shake(m,ms){ sh.mag=m; sh.until=now()+ms; }
function shakeOffset(){ if(now()>=sh.until) return [0,0]; const d=Math.min(1,(sh.until-now())/160); return [(Math.random()-0.5)*sh.mag*d,(Math.random()-0.5)*sh.mag*d]; }
function updateFx(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.fall?0.03:0.06; p.life-=p.fall?0.006:0.02; if(p.life<=0||p.y>H+30) parts.splice(i,1); }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.r+=3.2; r.t-=0.04; if(r.t<=0) ripples.splice(i,1); }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.t+=0.045; p.y+=p.vy; p.vy*=0.96; if(p.t>=1) pops.splice(i,1); } }
function drawFx(){ parts.forEach(p=>{ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; if(p.fall){ ctx.fillRect(p.x,p.y,6,9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); } }); ctx.globalAlpha=1;
  ripples.forEach(r=>{ ctx.globalAlpha=clamp(r.t,0,1)*0.6; ctx.strokeStyle=r.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }); ctx.globalAlpha=1;
  pops.forEach(p=>{ ctx.save(); ctx.globalAlpha=clamp(1-p.t,0,1); const bp=1+0.4*(1-Math.min(1,p.t*4)); const fs=Math.round(24*p.sc*bp); ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(2,10,20,.55)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); ctx.restore(); }); ctx.globalAlpha=1; }
function gHeart(x,y,r,filled){ ctx.save(); ctx.beginPath(); ctx.moveTo(x,y+r*0.85); ctx.bezierCurveTo(x-r*1.3,y-r*0.15,x-r*0.55,y-r*1.15,x,y-r*0.35); ctx.bezierCurveTo(x+r*0.55,y-r*1.15,x+r*1.3,y-r*0.15,x,y+r*0.85); ctx.closePath(); if(filled){ ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=6; ctx.fillStyle='#ff5d6c'; ctx.fill(); } else { ctx.strokeStyle='#5a6b7a'; ctx.lineWidth=2.5; ctx.stroke(); } ctx.restore(); }
const GEMS=[{col:'#ff5d6c',hi:'#ffd0d5'},{col:'#ffa63c',hi:'#ffe3b0'},{col:'#7cff9e',hi:'#d6ffe2'},{col:'#5bc0ff',hi:'#cdeeff'},{col:'#c48ae8',hi:'#eddaf7'}];
function gGemIcon(x,y,r,safe,idx){ const gm=GEMS[idx%5]; ctx.save(); ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.72,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r*0.72,y); ctx.closePath();
  ctx.shadowColor=gm.col; ctx.shadowBlur=safe?10:3; ctx.globalAlpha=safe?1:0.5; ctx.fillStyle=gm.col; ctx.fill(); ctx.shadowBlur=0;
  ctx.globalAlpha=0.7; ctx.fillStyle=gm.hi; ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.36,y-r*0.22); ctx.lineTo(x,y+r*0.05); ctx.closePath(); ctx.fill(); ctx.restore(); }
function gCoin(x,y,r){ ctx.save(); ctx.shadowColor='#ffd75e'; ctx.shadowBlur=7; ctx.fillStyle='#ffce47'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#c8912a'; ctx.lineWidth=Math.max(1.5,r*0.16); ctx.stroke(); ctx.fillStyle='#c8912a'; ctx.font='900 '+Math.round(r*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',x,y+1); ctx.restore(); ctx.textBaseline='alphabetic'; }
const TOTAL_COINS=300;
let coinDisp=-1, coinSeen=0, coinPop=null;
function drawCoinHUD(){ if(coinDisp<0){ coinDisp=S.coins; coinSeen=S.coins; }
  if(S.coins>coinSeen){ coinPop={amt:S.coins-coinSeen, t0:now()}; coinSeen=S.coins; } else if(S.coins<coinSeen-0.5){ coinSeen=S.coins; coinDisp=S.coins; coinPop=null; }
  coinDisp+=(S.coins-coinDisp)*0.14; if(Math.abs(S.coins-coinDisp)<0.5) coinDisp=S.coins;
  const val=Math.round(coinDisp), fs=Math.min(16,W*0.034), cr=fs*0.74, x=12, y=10, gap=7, padL=12, padR=13;
  ctx.save(); ctx.font='800 '+fs+'px "Noto Sans TC",sans-serif'; const txt=val+' / '+TOTAL_COINS, tw=ctx.measureText(txt).width, w=padL+cr*2+gap+tw+padR, h=fs*2.0;
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; rr(x,y,w,h,h/2); ctx.fillStyle='rgba(4,18,32,.9)'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,206,71,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  const coinX=x+padL+cr, coinY=y+h/2; gCoin(coinX,coinY,cr);
  ctx.fillStyle='#ffe27a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt, coinX+cr+gap, coinY+1); ctx.restore(); ctx.textBaseline='alphabetic';
  if(coinPop){ const k=(now()-coinPop.t0)/1200; if(k>=1) coinPop=null; else { ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle='#ffe27a'; ctx.font='900 '+Math.min(20,W*0.044)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('+'+coinPop.amt, x+w+10, y+h/2-k*26); ctx.restore(); ctx.textBaseline='alphabetic'; } } }

/* ---------- 海底背景 ---------- */
function seaBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0b3a5e'); g.addColorStop(1,'#041d33'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle='#bfeaff'; for(let i=0;i<14;i++){ const sp=18+(i%5)*7; const bx=((i*173)%Math.max(W,1))+Math.sin(now()/2600+i)*18; const byy=H-(((now()/sp)+i*149)%(H+60))+30; ctx.beginPath(); ctx.arc(bx,byy,3+(i%4)*2,0,7); ctx.fill(); } ctx.restore(); }

/* ---------- 注音渲染（台灣課本樣式：注音直排在漢字右側） ---------- */
function isCJK(ch){ const c=ch.codePointAt(0); return c>=0x4E00 && c<=0x9FFF; }
function P(han,zhu){ const toks=(zhu&&zhu.trim().length)?zhu.trim().split(/\s+/):[]; const out=[]; let zi=0;
  for(const ch of han){ if(isCJK(ch)) out.push({c:ch,z:toks[zi++]||''}); else out.push({c:ch,z:null}); } return out; }
const TONES=new Set(['ˊ','ˇ','ˋ','˙','ˉ']);
function splitZhu(z){ if(!z) return {syms:[],tone:''}; const a=[...z]; let tone=''; if(a.length&&TONES.has(a[a.length-1])) tone=a.pop(); return {syms:a,tone}; }
function rubyMetrics(fs){ const zf=Math.max(8,Math.round(fs*0.46)); return { zf, zcol:zf, toneW:Math.round(zf*0.72), gap:Math.round(fs*0.10), cellGap:Math.round(fs*0.10), stepY:Math.round(zf*0.84) }; }
function rubyWidth(line,fs){ const m=rubyMetrics(fs); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; let total=0;
  for(const p of line){ const hw=ctx.measureText(p.c).width; total += hw + (p.z?(m.gap+m.zcol+m.toneW):0) + m.cellGap; } return total; }
function drawRuby(line,cx,cy,fs,col,align){ align=align||'center';
  let total=rubyWidth(line,fs); const maxW=W*0.94; if(total>maxW){ fs=Math.max(9,Math.floor(fs*maxW/total)); total=rubyWidth(line,fs); }
  const m=rubyMetrics(fs); let x=align==='center'?cx-total/2:(align==='left'?cx:cx-total);
  ctx.save(); ctx.textBaseline='middle'; ctx.fillStyle=col;
  for(const p of line){ ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; const hw=ctx.measureText(p.c).width;
    ctx.textAlign='left'; ctx.fillText(p.c, x, cy+fs*0.02);
    if(p.z){ const s=splitZhu(p.z); const zx=x+hw+m.gap+m.zcol/2; const n=s.syms.length; const blockH=n*m.stepY;
      let sy=cy-blockH/2+m.stepY/2; ctx.font='700 '+m.zf+'px sans-serif'; ctx.textAlign='center';
      for(const sym of s.syms){ const sw=ctx.measureText(sym).width; if(sw>m.zcol+0.5){ ctx.save(); ctx.translate(zx,sy); ctx.scale(m.zcol/sw,1); ctx.fillText(sym,0,0); ctx.restore(); } else ctx.fillText(sym,zx,sy); sy+=m.stepY; }
      if(s.tone){ if(s.tone==='˙'){ ctx.textAlign='center'; ctx.fillText('˙', zx, cy-blockH/2-m.stepY*0.5); }
        else { ctx.textAlign='left'; ctx.fillText(s.tone, zx+m.zcol*0.5+1, cy); } }
      x += hw+m.gap+m.zcol+m.toneW; }
    else x += hw;
    x += m.cellGap; }
  ctx.restore(); return total; }
// 純文字（無注音）大字置中
function bigText(txt,cx,cy,fs,col){ ctx.save(); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=Math.max(3,fs*0.14); ctx.strokeStyle='rgba(2,10,20,.6)'; ctx.strokeText(txt,cx,cy); ctx.fillStyle=col||'#fff'; ctx.fillText(txt,cx,cy); ctx.restore(); ctx.textBaseline='alphabetic'; }

/* ---------- 向量圖：小章魚兵 / 隊長 / 潛水員 ---------- */
function vOcto(x,y,s,col,ang,captain){ ctx.save(); ctx.translate(x,y);
  const body=col||'#c46bd6'; ctx.fillStyle=body;
  // 頭
  ctx.beginPath(); ctx.ellipse(0,-s*0.15,s*0.62,s*0.72,0,0,7); ctx.fill();
  // 觸手
  ctx.strokeStyle=body; ctx.lineWidth=Math.max(3,s*0.16); ctx.lineCap='round';
  for(let i=0;i<6;i++){ const a=(-0.9+i*0.36); const wob=Math.sin(now()/300+i+ang*3)*s*0.18; ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.32,s*0.35); ctx.quadraticCurveTo(Math.cos(a)*s*0.7+wob,s*0.8, Math.cos(a)*s*0.6+wob*1.4,s*1.15); ctx.stroke(); }

cv.addEventListener('pointerdown',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=true; mouse.downBtn=e.button; try{cv.setPointerCapture(e.pointerId);}catch(_){}
  if(dpadHit(x,y,true)) { return; }

  evQ.push({t:'down',x,y,btn:e.button});

    if(lastLeft && (tt-lastLeft.t)<=DBL_MS && dist(x,y,lastLeft.x,lastLeft.y)<=DBL_DIST){ evQ.push({t:'dbl',x,y}); lastLeft=null; }
    else { lastLeft={t:tt,x,y}; } } });

  if(dist(x,y,g.cx,g.cy)<=g.r*2.1){ dpadActive=true; keys.up=keys.down=keys.left=keys.right=0; const dx=x-g.cx, dy=y-g.cy; if(Math.abs(dx)>g.r*0.3) (dx<0?keys.left=1:keys.right=1); if(Math.abs(dy)>g.r*0.3) (dy<0?keys.up=1:keys.down=1); return true; }

  ctx.globalAlpha=0.8; ctx.font='700 '+Math.round(g.r*0.42)+'px "Noto Sans TC",sans-serif'; ctx.fillStyle='#cfe8ff'; ctx.textAlign='center'; ctx.fillText('走位',g.cx,g.cy+g.r*1.95); ctx.restore(); }

function goPhase(p,extra){ S.phase=p; st={}; clearInput(); if(p==='wave') initWave(extra!=null?extra:S.wave); else if(p==='cover') initCover(); else if(p==='tut') initTut(); else if(p==='story') initStory(); else if(p==='deliver') initDeliver(); }

/* ================= COVER（Hook：先鋒章魚衝過來了！） ================= */
function initCover(){ st.t0=now(); st.subs=[]; for(let i=0;i<6;i++) st.subs.push({x:Math.random()*W, y:-40-Math.random()*H, s:26+Math.random()*20, spd:0.4+Math.random()*0.6, ang:Math.random()}); }
function drawCoverPanel(){ seaBg();
  // 生成的封面圖（先鋒章魚群衝過來）；未載入退回向量小章魚群
  if(!drawCover('cover')){ st.subs.forEach(o=>{ o.y+=o.spd; o.ang+=0.01; if(o.y>H+50){ o.y=-40; o.x=Math.random()*W; } drawOcto(o,o.s,'#a45bd6'); }); }
  ctx.save(); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'rgba(3,14,26,.15)'); g.addColorStop(0.55,'rgba(3,14,26,.55)'); g.addColorStop(1,'rgba(3,14,26,.85)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();
  const cx=W/2;
  bigText('先鋒章魚衝過來了！', cx, H*0.30, Math.min(34,W*0.075), '#ffd0d5');
  drawRuby(P('用兩手守住國王的寶石','ㄩㄥˋ ㄌㄧㄤˇ ㄕㄡˇ ㄕㄡˇ ㄓㄨˋ ㄍㄨㄛˊ ㄨㄤˊ ㄉㄜ˙ ㄅㄠˇ ㄕˊ'), cx, H*0.42, Math.min(22,W*0.05), '#cfe8ff');
  // 寶石列
  const gy=H*0.55, gap=Math.min(60,W*0.11), gr=Math.min(20,W*0.04); for(let i=0;i<5;i++) gGemIcon(cx-2*gap+i*gap, gy, gr, true, i);
  // 開始按鈕
  const b=coverBtn(); ctx.save(); const pl=pulse(); ctx.shadowColor='#2bd17e'; ctx.shadowBlur=14+pl*10; rr(b.x,b.y,b.w,b.h,b.h/2); ctx.fillStyle='#1f8f5a'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#7cffb0'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
  drawRuby(P('開始','ㄎㄞ ㄕˇ'), b.x+b.w/2, b.y+b.h/2, Math.min(24,W*0.05), '#eafff2');
  if(S.waveMax>0){ drawRuby(P('（會從你上次的地方繼續）','ㄏㄨㄟˋ ㄘㄨㄥˊ ㄋㄧˇ ㄕㄤˋ ㄘˋ ㄉㄜ˙ ㄉㄧˋ ㄈㄤ ㄐㄧˋ ㄒㄩˋ'), cx, b.y+b.h+26, Math.min(14,W*0.032), '#8fb7d6'); } }
function coverBtn(){ const w=Math.min(260,W*0.62), h=Math.min(66,H*0.1); return {x:W/2-w/2, y:H*0.66, w, h}; }
const ST_COVER={ update(evs){ for(const e of evs){ if(e.t==='down'){ const b=coverBtn(); if(e.x>=b.x&&e.x<=b.x+b.w&&e.y>=b.y&&e.y<=b.y+b.h){ Sfx.win(); goPhase(S.waveMax>0?'wave':'tut', S.waveMax>0?S.waveMax:0); } } } }, draw(){ drawCoverPanel(); } };

/* ================= 教學關（沿用 W02：一步步教、不限時、做對才過） ================= */
// 步驟：0 移動(WASD) → 1 打(右鍵) → 2 擋(左鍵) → 3 閃避(WASD進安全圈) → 4 魔法(滾輪)
const TUT=[
 { key:'move', title:P('用 WASD 走一走','ㄩㄥˋ WASD ㄗㄡˇ ㄧ ㄗㄡˇ'), sub:P('走到亮亮的點','ㄗㄡˇ ㄉㄠˋ ㄌㄧㄤˋ ㄌㄧㄤˋ ㄉㄜ˙ ㄉㄧㄢˇ') },
 { key:'atk',  title:P('打章魚：點右鍵','ㄉㄚˇ ㄓㄤ ㄩˊ ㄉㄧㄢˇ ㄧㄡˋ ㄐㄧㄢˋ'), sub:P('對準章魚點右鍵','ㄉㄨㄟˋ ㄓㄨㄣˇ ㄓㄤ ㄩˊ ㄉㄧㄢˇ ㄧㄡˋ ㄐㄧㄢˋ') },
 { key:'block',title:P('擋攻擊：點左鍵','ㄉㄤˇ ㄍㄨㄥ ㄐㄧ ㄉㄧㄢˇ ㄗㄨㄛˇ ㄐㄧㄢˋ'), sub:P('章魚打來時點左鍵','ㄓㄤ ㄩˊ ㄉㄚˇ ㄌㄞˊ ㄕˊ ㄉㄧㄢˇ ㄗㄨㄛˇ ㄐㄧㄢˋ') },
 { key:'dodge',title:P('閃避：WASD 走進綠圈','ㄕㄢˇ ㄅㄧˋ WASD ㄗㄡˇ ㄐㄧㄣˋ ㄌㄩˋ ㄑㄩㄢ'), sub:P('走進綠色安全圈','ㄗㄡˇ ㄐㄧㄣˋ ㄌㄩˋ ㄙㄜˋ ㄢ ㄑㄩㄢˊ ㄑㄩㄢ') },
 { key:'magic',title:P('放魔法：滾輪往前','ㄈㄤˋ ㄇㄛˊ ㄈㄚˇ ㄍㄨㄣˇ ㄌㄨㄣˊ ㄨㄤˇ ㄑㄧㄢˊ'), sub:P('滾輪往前滾滿','ㄍㄨㄣˇ ㄌㄨㄣˊ ㄨㄤˇ ㄑㄧㄢˊ ㄍㄨㄣˇ ㄇㄢˇ') },
];
function initTut(){ const A=arena(); st.ti=0; st.tdone=false; st.diver={x:A.x+A.w*0.5,y:A.y+A.h*0.72,r:Math.min(W,H)*0.045}; st.target=null; st.charge=0; st.flash=0; st.lead={x:A.x+A.w*0.5,y:A.y+A.h*0.28,sz:Math.min(W*0.24,H*0.17)}; setTut(); }
function setTut(){ const A=arena(), d=st.diver, L=st.lead; const k=TUT[st.ti].key; st.charge=0; st.done1=false;
  if(k==='move'){ st.target={x:A.x+A.w*(0.2+Math.random()*0.6), y:A.y+A.h*(0.3+Math.random()*0.4), r:st.diver.r*1.2}; }
  else if(k==='dodge'){ st.zx=d.x; st.zy=d.y; st.zr=Math.min(W,H)*0.14; st.safe={x:A.x+A.w*(d.x<W/2?0.75:0.25), y:A.y+A.h*0.6, r:st.diver.r*1.5}; }
  Sfx.cue(); }
function tutPass(){ st.flash=now()+400; Sfx.win(); burst(st.diver.x,st.diver.y,'#ffe27a',18);
  if(st.ti>=TUT.length-1){ popText(W/2,H*0.3,'學會了！先鋒來了！','#7cffb0',1.3); st.tdone=now()+1400; }
  else { st.ti++; setTut(); } }
const ST_TUT={ update(evs){ if(st.tdone){ if(now()>=st.tdone) goPhase('wave',0); return; }
  updateTutDiver(); const k=TUT[st.ti].key, d=st.diver, L=st.lead;
  if(k==='move'){ if(st.target && dist(d.x,d.y,st.target.x,st.target.y)<=st.target.r+d.r){ tutPass(); } }
  else if(k==='atk'){ for(const e of evs){ if((e.t==='menu')||(e.t==='down'&&e.btn===2)){ if(dist(e.x,e.y,L.x,L.y)<=L.sz*0.6){ playPov('atk',{x:L.x,y:L.y}); burst(L.x,L.y,'#ff8a3c',16); tutPass(); return; } else popText(e.x,e.y-30,'對準章魚！','#9fb6c8',1); } } }
  else if(k==='block'){ for(const e of evs){ if(e.t==='down'&&e.btn===0){ playPov('block',{x:d.x,y:d.y}); tutPass(); return; } } }
  else if(k==='dodge'){ if(st.safe && dist(d.x,d.y,st.safe.x,st.safe.y)<=st.safe.r){ playPov('dodge',{x:d.x,y:d.y,sx:st.zx}); tutPass(); } }
  else if(k==='magic'){ for(const e of evs){ if(e.t==='wheel'){ const fwd=Math.max(0,-e.dy); if(fwd>0){ st.charge=clamp(st.charge+Math.min(20,fwd*0.4),0,50); Sfx.tone(470+st.charge/50*540,0.04,'square',0.03); if(st.charge>=50){ playPov('magic',{x:L.x,y:L.y}); burst(L.x,L.y,'#2bd17e',16); tutPass(); return; } } } } } },
  draw(){ seaBg(); drawCover('seabed',0.45); const A=arena(), d=st.diver, L=st.lead, k=TUT[st.ti].key, T=TUT[st.ti];
    // 章魚（除了 move 那步）
    if(k!=='move') drawOctoLead(L, false);
    // 目標/安全圈
    if(k==='move'&&st.target){ const p=pulse(); ctx.save(); ctx.globalAlpha=0.5+p*0.4; ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(st.target.x,st.target.y,st.target.r+p*6,0,7); ctx.fill(); ctx.restore(); }
    if(k==='atk'){ const p=pulse(); ctx.save(); ctx.globalAlpha=0.5+p*0.4; ctx.strokeStyle='#ff8a3c'; ctx.lineWidth=4; ctx.setLineDash([8,6]); ctx.beginPath(); ctx.arc(L.x,L.y,L.sz*0.55+p*6,0,7); ctx.stroke(); ctx.setLineDash([]); ctx.restore(); }
    if(k==='block'){ const p=pulse(); ctx.save(); ctx.globalAlpha=0.4+p*0.4; drawSprite('ink',lerp(L.x,d.x,0.5),lerp(L.y,d.y,0.5),80)||0; ctx.restore(); }
    if(k==='dodge'){ ctx.save(); ctx.globalAlpha=0.3+pulse()*0.2; ctx.fillStyle='rgba(255,80,80,.3)'; ctx.beginPath(); ctx.arc(st.zx,st.zy,st.zr,0,7); ctx.fill(); ctx.restore();
      const p=pulse(); ctx.save(); ctx.globalAlpha=0.5+p*0.35; ctx.strokeStyle='#2bd17e'; ctx.lineWidth=4; ctx.setLineDash([8,7]); ctx.beginPath(); ctx.arc(st.safe.x,st.safe.y,st.safe.r,0,7); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='#7cff9e'; ctx.font='800 13px "Noto Sans TC",sans-serif'; ctx.textAlign='center'; ctx.fillText('安全圈',st.safe.x,st.safe.y-st.safe.r-10); ctx.restore(); }
    if(k==='magic'){ const bw=140,bx=W/2-bw/2,by=L.y+L.sz*0.7; ctx.save(); rr(bx,by,bw,12,6); ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fill(); ctx.fillStyle='#2bd17e'; rr(bx,by,bw*clamp(st.charge/50,0,1),12,6); ctx.fill(); ctx.restore(); }
    vDiver(d.x,d.y,d.r,k==='block');
    drawPov(); drawFx();
    // 教學橫幅：大字＋注音＋指令晶片（W02 滑鼠/WASD 圖）
    ctx.save(); ctx.fillStyle='rgba(3,14,26,.72)'; rr(W/2-Math.min(300,W*0.46),H*0.055,Math.min(600,W*0.92),Math.min(96,H*0.18),16); ctx.fill(); ctx.restore();
    drawRuby(T.title, W/2, H*0.09, Math.min(24,W*0.05), '#fff');
    drawRuby(T.sub, W/2, H*0.135, Math.min(15,W*0.033), '#cfe8ff');
    if(k!=='move') cmdChip(W/2, H*0.185, k==='atk'?'atk':k==='block'?'block':k==='dodge'?'dodge':'magic');
    else { gWASD(W/2, H*0.185, 26, 'all'); }
    // 步驟點
    for(let i=0;i<TUT.length;i++){ ctx.fillStyle=i<st.ti?'#7cffb0':i===st.ti?'#ffce47':'#3a5872'; ctx.beginPath(); ctx.arc(W/2-(TUT.length-1)*11+i*22, H*0.24, 5,0,7); ctx.fill(); }
    // 跳過教學
    const j=skipBtn(); ctx.save(); rr(j.x,j.y,j.w,j.h,j.h/2); ctx.fillStyle='rgba(4,18,32,.7)'; ctx.fill(); ctx.strokeStyle='#5a7893'; ctx.lineWidth=1; ctx.stroke(); ctx.restore(); drawRuby(P('跳過','ㄊㄧㄠˋ ㄍㄨㄛˋ'), j.x+j.w/2, j.y+j.h/2, 12, '#9fc4e0');
    if(st.tdone){ ctx.save(); ctx.fillStyle='rgba(3,17,31,.45)'; ctx.fillRect(0,0,W,H); ctx.restore(); drawRuby(P('學會了！先鋒來了！','ㄒㄩㄝˊ ㄏㄨㄟˋ ㄌㄜ˙ ㄒㄧㄢ ㄈㄥ ㄌㄞˊ ㄌㄜ˙'), W/2, H*0.44, Math.min(30,W*0.07), '#7cffb0'); } } };
function updateTutDiver(){ const A=arena(), d=st.diver; let ax=(keys.right-keys.left), ay=(keys.down-keys.up); const m=Math.hypot(ax,ay); if(m>0){ const spd=Math.min(W,H)*0.012; d.x+=ax/m*spd; d.y+=ay/m*spd; } d.x=clamp(d.x,A.x+d.r,A.x+A.w-d.r); d.y=clamp(d.y,A.y+d.r,A.y+A.h-d.r); }
const ST_TUT_skip=()=>{ st.tdone=now(); goPhase('wave',0); };

/* ================= WAVE（沿用 W02 縮圈節奏戰鬥；閃避改 WASD） ================= */
function arena(){ return { x:W*0.06, y:H*0.16, w:W*0.88, h:H*0.64 }; }
function drawOctoLead(L, hurtFlash, captain){ let bx=L.x; if(st.bossShake&&now()<st.bossShake.until) bx+=Math.sin(now()/22)*st.bossShake.mag;
  const spr=captain?'captain':(st.cfg?st.cfg.sprite:'octo');
  ctx.save(); if(hurtFlash) ctx.globalAlpha=0.55;
  if(!drawSprite(spr, bx, L.y, L.sz)) vOcto(bx,L.y,L.sz*0.5,captain?'#e0623c':'#a45bd6',0,captain);
  ctx.restore();
  if(st.bossFlashUntil&&now()<st.bossFlashUntil){ ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(bx,L.y,L.sz*0.4,0,7); ctx.fill(); ctx.restore(); } }
function buildBeats(hp,cfg){ const dmg=[]; let left=hp;
  while(left>0){ let v='atk'; if(left>=2){ const r=Math.random(); let acc=0; if(cfg.dmgV.includes('heavy')&&r<(acc+=(cfg.heavyW||0))) v='heavy'; else if(cfg.dmgV.includes('magic')&&r<(acc+=(cfg.magicW||0))) v='magic'; } dmg.push(v); left-=DMG[v]; }
  shuffle(dmg);
  const beats=[]; dmg.forEach((v,i)=>{ beats.push(v); if(i<dmg.length-1 && Math.random()<(cfg.defR||0.5)) beats.push(pick(cfg.defV)); });
  cfg.defV.forEach((dv,k)=>{ if(!beats.includes(dv)) beats.splice(Math.min(1+k,beats.length),0,dv); });
  return beats; }
function initWave(n){ n=clamp(n,0,N_WAVE-1); S.wave=n; const cfg=WAVES[n]; const A=arena();
  st.cfg=cfg; st.hp=cfg.hp; st.ghost=cfg.hp; st.php=PLAYER_HP; st.combo=0; st.retries=0; st.eased=false; st.busy=false;
  st.diver={x:A.x+A.w*0.5,y:A.y+A.h*0.72,r:Math.min(W,H)*0.045,inv:0};
  st.lead={x:A.x+A.w*0.5,y:A.y+A.h*0.26,sz:Math.min(W*0.30,H*0.20)*cfg.sizeK}; st.bossShake=null; st.bossFlashUntil=0; pov=null;
  st.qi=0; st.queue=buildBeats(cfg.hp,cfg); st.ring=null; st.o=null; st.proj=null; st.verb=null; st.charge=0;
  st.mode='intro'; st.introT=now(); st.banner={txt:cfg.title,until:now()+1800}; Sfx.cue(); }
function startFight(){ st.mode='fight'; popText(W/2,H*0.42,'開打！','#ffe27a',1.2); spawnBeat(); }
function spawnBeat(){ const cfg=st.cfg;
  if(st.qi>=st.queue.length){ if(st.hp>0) st.queue=st.queue.concat(buildBeats(st.hp,cfg)); else { roundClear(); return; } }
  const v=st.queue[st.qi]; st.verb=v; st.actLocked=false; st.spawnAt=now(); st.lastAct=0; st.charge=0; st.o=null; st.proj=null;
  const L=st.lead;
  if(v==='atk'||v==='heavy'){ st.o={x:L.x+(Math.random()*2-1)*L.sz*0.3, y:L.y}; st.limitMs=cfg.ringMs; }
  else if(v==='block'){ st.o={x:st.diver.x,y:st.diver.y}; st.limitMs=Math.round(cfg.ringMs*1.15); st.proj={sx:L.x,sy:L.y,kind:'ink'}; }
  else if(v==='magic'){ st.o={x:L.x,y:L.y+L.sz*0.1,charge:0,goal:cfg.goal}; st.limitMs=cfg.chargeMs; }
  else { st.safe={x:arena().x+arena().w*(st.diver.x<W/2?0.72:0.28), y:arena().y+arena().h*0.6, r:st.diver.r*1.5}; st.zx=st.diver.x; st.zy=st.diver.y; st.zr=Math.min(W,H)*0.14; st.o={x:st.diver.x,y:st.diver.y}; st.limitMs=Math.round(cfg.ringMs*1.1); st.proj={sx:L.x,sy:L.y,kind:'slash'}; }
  st.ring={state:'shrink',t0:now(),r:cfg.startR}; }
function bossHurt(m){ st.bossFlashUntil=now()+120; st.bossShake={mag:5*(m||1),until:now()+220}; }
function beatHit(perfect,silent){ const v=st.verb, o=st.o||{x:W/2,y:H*0.4}, dmg=DMG[v]; st.combo++; st.lastAct=now();
  if(dmg>0){ st.hp-=dmg; persist(); bossHurt(perfect?1:0.7); }
  playPov(v,o);
  if(!silent){ const col=VERB[v].col; burst(o.x,o.y,perfect?'#ffe27a':col,perfect?24:15); ripple(o.x,o.y,col);
    if(v==='block'||v==='dodge') drawShockAt=o; // 命中特效
    const txt=v==='block'?'擋住了！':v==='dodge'?'閃過了！':v==='magic'?'魔法！':v==='heavy'?'用力打！':'命中！';
    if(perfect){ shake(6,180); Sfx.ding(); popText(o.x,o.y-56,'PERFECT！'+txt+(st.combo>=3?' x'+st.combo:''),'#ffe27a',1.15); }

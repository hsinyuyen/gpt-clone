<script>
/* =========================================================
   章魚軍團前哨：兩手齊發 QTE（P1U-W03 · v2）· 承 W02
   單檔 canvas。打法以 W02 的「節奏拍」為基礎：一次一拍，圈縮到判定窗時出手。
   W03 的新東西＝每一拍都要「左手按住指定鍵」＋「右手把滑鼠移到圈裡做對動作」，
   兩手同時成立才算打中（四種滑鼠操作：左鍵／右鍵／連點兩下／滾輪 各對應一個鍵）。
   只有一個很寬鬆的難度：圈很慢、判定窗很大、按錯／太早都不扣血，只有整拍沒跟上才扣，
   連續沒跟上兩次會自動再放慢。3 波先鋒＋前哨隊長；死了有 GAME OVER 可重來。
   劇情：每講一段就考一段（泡泡題）。全文注音、圖示非 emoji。
   v1 彈幕版已封存在 p1u-w03-octopus-vanguard-v1-bullet.html。
   ========================================================= */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize',resize); resize();
const now=()=>performance.now();
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
const pulse=()=>0.5+0.5*Math.sin(now()/350);
const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

/* ---------- 精靈圖（可選；未載入退回向量） ---------- */
const SPRITES={}; let ASSET_TOTAL=0, ASSET_DONE=0;
function loadSprite(key,src){ ASSET_TOTAL++; const im=new Image(); const o={im,ready:false,sx:0,sy:0,sw:0,sh:0};
  im.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=im.width; c.height=im.height; const g=c.getContext('2d'); g.drawImage(im,0,0);
      const d=g.getImageData(0,0,c.width,c.height).data; let minx=c.width,miny=c.height,maxx=0,maxy=0; const step=4;
      for(let y=0;y<c.height;y+=step){ for(let x=0;x<c.width;x+=step){ if(d[(y*c.width+x)*4+3]>200){ if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; } } }
      if(maxx>minx&&maxy>miny){ o.sx=minx;o.sy=miny;o.sw=maxx-minx;o.sh=maxy-miny; } else { o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; }
    }catch(e){ o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; } o.ready=true; ASSET_DONE++; };
  im.onerror=()=>{ ASSET_DONE++; }; im.src=src; SPRITES[key]=o; }
function assetsSettled(){ return ASSET_TOTAL===0 || ASSET_DONE>=ASSET_TOTAL; }
// 沿用 W02 已生成的美術（風格一致、本來就是圖生）：小兵/潛水員/背景/POV打擊圖
loadSprite('octo','assets/w2-oct1.png'); loadSprite('octo2','assets/w2-oct2.png'); loadSprite('diver','assets/w2-diver.png'); loadSprite('seabed','assets/w2-seabed.png');
['Sword','Hammer','Shield','Wand'].forEach(k=>loadSprite('pov'+k,'assets/pov-'+k.toLowerCase()+'.png'));
// W03 新生成：前哨隊長、封面、攻擊特效（噴墨/衝擊波/觸手斬）
['captain','cover','ink','shock','slash'].forEach(k=>loadSprite(k,'assets/w3-'+k+'.png'));
// W03 每關不同章魚（斥候/噴墨/漩渦）＋彈幕素材（墨滴/能量球/觸手橫掃）
loadSprite('octoScout','assets/w3-oct-scout.png'); loadSprite('octoInker','assets/w3-oct-inker.png'); loadSprite('octoSwirl','assets/w3-oct-swirl.png');
loadSprite('bInk','assets/w3-b-ink.png'); loadSprite('bOrb','assets/w3-b-orb.png'); loadSprite('tentacle','assets/w3-tentacle.png');
// W03 劇情圖：每一頁一張整幅場景圖（承 W02 結尾 → 本集復仇），做法同 W02 的 INTRO
for(let i=1;i<=5;i++) loadSprite('st'+i,'assets/w3-st'+i+'.jpg');
// 幕間劇情圖：每打完一關插一段
for(let i=1;i<=3;i++) loadSprite('it'+i,'assets/w3-it'+i+'.jpg');
const mouseImg=new Image(); let mouseImgReady=false; ASSET_TOTAL++; mouseImg.onload=()=>{mouseImgReady=true; ASSET_DONE++;}; mouseImg.onerror=()=>{ASSET_DONE++;}; mouseImg.src='assets/mouse-big.png';
function drawSprite(key,x,y,size,rot,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh; let w,h; if(ar>=1){ w=size; h=size/ar; } else { h=size; w=size*ar; }
  ctx.save(); if(alpha!==undefined) ctx.globalAlpha=alpha; ctx.translate(x,y); if(rot) ctx.rotate(rot); ctx.drawImage(s.im,s.sx,s.sy,s.sw,s.sh,-w/2,-h/2,w,h); ctx.restore(); return true; }
function drawCover(key,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh, war=W/H; let sw,sh,sx,sy;
  if(ar>war){ sh=s.sh; sw=s.sh*war; sx=s.sx+(s.sw-sw)/2; sy=s.sy; } else { sw=s.sw; sh=s.sw/war; sx=s.sx; sy=s.sy+(s.sh-sh)/2; }
  ctx.save(); ctx.globalAlpha=alpha===undefined?1:alpha; ctx.drawImage(s.im,sx,sy,sw,sh,0,0,W,H); ctx.restore(); return true; }

/* ---------- 音效 ---------- */
const Sfx=(function(){ let ac=null,on=true;
  function A(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } return ac; }
  function tone(f,d,t,v){ if(!on)return; const a=A(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),s=a.currentTime; o.type=t||'sine'; o.frequency.setValueAtTime(f,s); g.gain.setValueAtTime(v||0.05,s); g.gain.exponentialRampToValueAtTime(0.0001,s+d); o.connect(g).connect(a.destination); o.start(s); o.stop(s+d); }
  return { hit(n){tone(720+(clamp(n||0,0,12))*45,0.12,'sine',0.06);}, ding(){tone(920,0.12,'sine',0.06);},
    tick(){tone(320,0.045,'square',0.03);}, cue(){tone(500,0.09,'triangle',0.05); setTimeout(()=>tone(760,0.1,'sine',0.05),80);},
    bad(){tone(180,0.16,'sawtooth',0.05);}, block(){tone(300,0.14,'square',0.05); setTimeout(()=>tone(520,0.1,'sine',0.04),60);},
    win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'square',0.05),i*90)); }, tone(f,d,t,v){tone(f,d,t,v);}, setOn(v){on=v;} };
})();

/* ---------- 帳號綁定（gameKey p1uw03） ---------- */
const FB_CONFIG={ apiKey:"AIzaSyDVnab3BCfnlJH5cRCz_EqaHlP7yQUpK78", authDomain:"gpt-clone-68b9f.firebaseapp.com", projectId:"gpt-clone-68b9f", storageBucket:"gpt-clone-68b9f.firebasestorage.app", messagingSenderId:"436942056069", appId:"1:436942056069:web:8762675dfff7b7e92017ec" };
const GAMEKEY='p1uw03';
const COINKEY='p1uw03'; // 金幣 id：跟封存的彈幕版共用，玩過任一版都不會重複發幣
const Account=(function(){ let uid=null,uname='',db=null,ready=false;
  function su(){ try{ const r=(sessionStorage.getItem('@session/currentUser')||localStorage.getItem('@session/currentUser')); return r?JSON.parse(r):null; }catch(e){ return null; } }
  function init(){ const u=su(); if(u&&u.id){ uid=u.id; uname=u.displayName||u.username||''; } if(uid&&window.firebase){ try{ if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG); db=firebase.firestore(); ready=true; }catch(e){} } }
  async function load(){ if(!ready)return null; try{ const s=await db.collection('gameProgress').doc(uid).get(); return s.exists?(s.data()[GAMEKEY]||null):null; }catch(e){ return null; } }
  async function save(state){ if(!ready)return; try{ await db.collection('gameProgress').doc(uid).set({ [GAMEKEY]:state, name:uname, updatedAt:new Date().toISOString() },{merge:true}); }catch(e){} }
  async function creditCoins(id,amount,reason){ if(!ready||!(amount>0))return; const ref=db.collection('coins').doc(uid);
    try{ await db.runTransaction(async tx=>{ const s=await tx.get(ref); const c=s.exists?s.data():{balance:0,totalEarned:0,transactions:[]}; const txs=Array.isArray(c.transactions)?c.transactions:[]; if(txs.some(t=>t&&t.id===id))return; txs.push({id,amount,reason,timestamp:new Date().toISOString()}); tx.set(ref,{balance:(c.balance||0)+amount,totalEarned:(c.totalEarned||0)+amount,transactions:txs.slice(-160)}); }); }catch(e){} }

})();

function renderAcct(){ const a=document.getElementById('acct'); const on=navigator.onLine;
  if(Account.ready) a.innerHTML='<span class="dot ok"></span> 已綁定：'+(Account.name||'已登入')+(on?'':'　·　離線');

/* ---------- 粒子 / 回饋 ---------- */
let parts=[],ripples=[],pops=[],sh={mag:0,until:0};
const MAX_PARTS=280, MAX_RIPPLES=44;
function burst(x,y,col,n){ n=n||16; for(let i=0;i<n && parts.length<MAX_PARTS;i++){ const a=Math.random()*7,s=1.5+Math.random()*4; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col}); } }
function confetti(){ for(let i=0;i<110 && parts.length<MAX_PARTS;i++){ parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*2,vy:2+Math.random()*4,life:1.7,col:['#ff5d6c','#ffce47','#2bd17e','#5bc0ff','#ff7ab0'][i%5],fall:true}); } }
function ripple(x,y,col){ if(ripples.length>=MAX_RIPPLES) return; ripples.push({x,y,r:6,col:col||'#8fd0ff',t:1}); }
function popText(x,y,txt,col,sc){ pops.push({x,y,txt,col:col||'#fff',t:0,vy:-0.85,sc:sc||1}); }
function shake(m,ms){ sh.mag=m; sh.until=now()+ms; }
function shakeOffset(){ if(now()>=sh.until) return [0,0]; const d=Math.min(1,(sh.until-now())/160); return [(Math.random()-0.5)*sh.mag*d,(Math.random()-0.5)*sh.mag*d]; }
function updateFx(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.fall?0.03:0.06; p.life-=p.fall?0.006:0.02; if(p.life<=0||p.y>H+30) parts.splice(i,1); }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.r+=3.2; r.t-=0.04; if(r.t<=0) ripples.splice(i,1); }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.t+=0.045; p.y+=p.vy; p.vy*=0.96; if(p.t>=1) pops.splice(i,1); } }
function drawFx(){ parts.forEach(p=>{ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; if(p.fall){ ctx.fillRect(p.x,p.y,6,9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); } }); ctx.globalAlpha=1;
  ripples.forEach(r=>{ ctx.globalAlpha=clamp(r.t,0,1)*0.6; ctx.strokeStyle=r.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }); ctx.globalAlpha=1;
  pops.forEach(p=>{ ctx.save(); ctx.globalAlpha=clamp(1-p.t,0,1); const bp=1+0.4*(1-Math.min(1,p.t*4)); const fs=Math.round(24*p.sc*bp); ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(2,10,20,.55)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); ctx.restore(); }); ctx.globalAlpha=1; }
function gHeart(x,y,r,filled){ ctx.save(); ctx.beginPath(); ctx.moveTo(x,y+r*0.85); ctx.bezierCurveTo(x-r*1.3,y-r*0.15,x-r*0.55,y-r*1.15,x,y-r*0.35); ctx.bezierCurveTo(x+r*0.55,y-r*1.15,x+r*1.3,y-r*0.15,x,y+r*0.85); ctx.closePath(); if(filled){ ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=6; ctx.fillStyle='#ff5d6c'; ctx.fill(); } else { ctx.strokeStyle='#5a6b7a'; ctx.lineWidth=2.5; ctx.stroke(); } ctx.restore(); }
const GEMS=[{col:'#ff5d6c',hi:'#ffd0d5'},{col:'#ffa63c',hi:'#ffe3b0'},{col:'#7cff9e',hi:'#d6ffe2'},{col:'#5bc0ff',hi:'#cdeeff'},{col:'#c48ae8',hi:'#eddaf7'}];
function gGemIcon(x,y,r,safe,idx){ const gm=GEMS[idx%5]; ctx.save(); ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.72,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r*0.72,y); ctx.closePath();
  ctx.shadowColor=gm.col; ctx.shadowBlur=safe?10:3; ctx.globalAlpha=safe?1:0.5; ctx.fillStyle=gm.col; ctx.fill(); ctx.shadowBlur=0;
  ctx.globalAlpha=0.7; ctx.fillStyle=gm.hi; ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.36,y-r*0.22); ctx.lineTo(x,y+r*0.05); ctx.closePath(); ctx.fill(); ctx.restore(); }
function gCoin(x,y,r){ ctx.save(); ctx.shadowColor='#ffd75e'; ctx.shadowBlur=7; ctx.fillStyle='#ffce47'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#c8912a'; ctx.lineWidth=Math.max(1.5,r*0.16); ctx.stroke(); ctx.fillStyle='#c8912a'; ctx.font='900 '+Math.round(r*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',x,y+1); ctx.restore(); ctx.textBaseline='alphabetic'; }
const TOTAL_COINS=300;
let coinDisp=-1, coinSeen=0, coinPop=null;
function drawCoinHUD(){ if(coinDisp<0){ coinDisp=S.coins; coinSeen=S.coins; }
  if(S.coins>coinSeen){ coinPop={amt:S.coins-coinSeen, t0:now()}; coinSeen=S.coins; } else if(S.coins<coinSeen-0.5){ coinSeen=S.coins; coinDisp=S.coins; coinPop=null; }
  coinDisp+=(S.coins-coinDisp)*0.14; if(Math.abs(S.coins-coinDisp)<0.5) coinDisp=S.coins;
  const val=Math.round(coinDisp), fs=Math.min(16,W*0.034), cr=fs*0.74, x=12, y=10, gap=7, padL=12, padR=13;
  ctx.save(); ctx.font='800 '+fs+'px "Noto Sans TC",sans-serif'; const txt=val+' / '+TOTAL_COINS, tw=ctx.measureText(txt).width, w=padL+cr*2+gap+tw+padR, h=fs*2.0;
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; rr(x,y,w,h,h/2); ctx.fillStyle='rgba(4,18,32,.9)'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,206,71,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  const coinX=x+padL+cr, coinY=y+h/2; gCoin(coinX,coinY,cr);
  ctx.fillStyle='#ffe27a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt, coinX+cr+gap, coinY+1); ctx.restore(); ctx.textBaseline='alphabetic';
  if(coinPop){ const k=(now()-coinPop.t0)/1200; if(k>=1) coinPop=null; else { ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle='#ffe27a'; ctx.font='900 '+Math.min(20,W*0.044)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('+'+coinPop.amt, x+w+10, y+h/2-k*26); ctx.restore(); ctx.textBaseline='alphabetic'; } } }

/* ---------- 海底背景 ---------- */
function seaBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0b3a5e'); g.addColorStop(1,'#041d33'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle='#bfeaff'; for(let i=0;i<14;i++){ const sp=18+(i%5)*7; const bx=((i*173)%Math.max(W,1))+Math.sin(now()/2600+i)*18; const byy=H-(((now()/sp)+i*149)%(H+60))+30; ctx.beginPath(); ctx.arc(bx,byy,3+(i%4)*2,0,7); ctx.fill(); } ctx.restore(); }

/* ---------- 注音渲染（台灣課本樣式：注音直排在漢字右側） ---------- */
function isCJK(ch){ const c=ch.codePointAt(0); return c>=0x4E00 && c<=0x9FFF; }
// 注意：只有漢字吃注音 token，英數/標點不吃。所以句中的 WASD、數字「5」不可以在注音字串裡放佔位符，
// 否則那個 token 會被下一個漢字吃掉，整句後半的注音全部位移一格（下面的 warn 就是在擋這件事）。
function P(han,zhu){ const toks=(zhu&&zhu.trim().length)?zhu.trim().split(/\s+/):[]; const out=[]; let zi=0;
  for(const ch of han){ if(isCJK(ch)) out.push({c:ch,z:toks[zi++]||''}); else out.push({c:ch,z:null}); }
  if(toks.length!==zi) console.warn('[注音對位] 漢字 '+zi+' 個、注音 '+toks.length+' 個：'+han+' / '+zhu);
  return out; }
const TONES=new Set(['ˊ','ˇ','ˋ','˙','ˉ']);
function splitZhu(z){ if(!z) return {syms:[],tone:''}; const a=[...z]; let tone=''; if(a.length&&TONES.has(a[a.length-1])) tone=a.pop(); return {syms:a,tone}; }
function rubyMetrics(fs){ const zf=Math.max(8,Math.round(fs*0.46)); return { zf, zcol:zf, toneW:Math.round(zf*0.72), gap:Math.round(fs*0.10), cellGap:Math.round(fs*0.10), stepY:Math.round(zf*0.84) }; }
function rubyWidth(line,fs){ const m=rubyMetrics(fs); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; let total=0;
  for(const p of line){ const hw=ctx.measureText(p.c).width; total += hw + (p.z?(m.gap+m.zcol+m.toneW):0) + m.cellGap; } return total; }
function drawRuby(line,cx,cy,fs,col,align){ align=align||'center';
  let total=rubyWidth(line,fs); const maxW=W*0.94; if(total>maxW){ fs=Math.max(9,Math.floor(fs*maxW/total)); total=rubyWidth(line,fs); }
  const m=rubyMetrics(fs); let x=align==='center'?cx-total/2:(align==='left'?cx:cx-total);
  ctx.save(); ctx.textBaseline='middle'; ctx.fillStyle=col;
  for(const p of line){ ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; const hw=ctx.measureText(p.c).width;
    ctx.textAlign='left'; ctx.fillText(p.c, x, cy+fs*0.02);
    if(p.z){ const s=splitZhu(p.z); const zx=x+hw+m.gap+m.zcol/2; const n=s.syms.length; const blockH=n*m.stepY;
      let sy=cy-blockH/2+m.stepY/2; ctx.font='700 '+m.zf+'px sans-serif'; ctx.textAlign='center';
      for(const sym of s.syms){ const sw=ctx.measureText(sym).width; if(sw>m.zcol+0.5){ ctx.save(); ctx.translate(zx,sy); ctx.scale(m.zcol/sw,1); ctx.fillText(sym,0,0); ctx.restore(); } else ctx.fillText(sym,zx,sy); sy+=m.stepY; }

// 純文字（無注音）大字置中

/* ---------- 向量圖：小章魚兵 / 隊長 / 潛水員 ---------- */
function vOcto(x,y,s,col,ang,captain){ ctx.save(); ctx.translate(x,y);

function drawOcto(o,s,col,captain){ if(!drawSprite(captain?'captain':'octo',o.x,o.y,s*(captain?2.0:1.7))) vOcto(o.x,o.y,s,col,o.ang||0,captain); }
function vDiver(x,y,s,shield){ ctx.save(); ctx.translate(x,y);

/* ---------- 沿用 W02 的滑鼠指令 UI（會高亮該按的鍵）＋ WASD 圖示 ---------- */
const MOUSE_HL_COL={left:'#3f8bff',right:'#ff8a3c',wheel:'#2bd17e'};
const MOUSE_SRC={sx:236,sy:106,sw:550,sh:776};
function gArrowSm(x,y,dir,col){ ctx.save(); ctx.fillStyle=col||'#ffe27a'; ctx.beginPath(); if(dir<0){ ctx.moveTo(x,y-8); ctx.lineTo(x+8,y+5); ctx.lineTo(x-8,y+5); } else { ctx.moveTo(x,y+8); ctx.lineTo(x+8,y-5); ctx.lineTo(x-8,y-5); } ctx.closePath(); ctx.fill(); ctx.restore(); }
function drawMouseSprite(x,y,s){ const M=MOUSE_SRC; ctx.drawImage(mouseImg,M.sx,M.sy,M.sw,M.sh,x-s*0.7,y-s,s*1.4,s*2); }
function mouseBtn(x,y,s,hl){ if(hl==='right') return {x:x+s*0.336,y:y-s*0.462}; if(hl==='wheel') return {x:x,y:y-s*0.69}; return {x:x-s*0.336,y:y-s*0.462}; }

      ctx.globalAlpha=0.6+p*0.4; ctx.strokeStyle=col; ctx.lineWidth=Math.max(3,s*0.12); ctx.beginPath(); ctx.arc(b.x,b.y,r0+p*4,0,7); ctx.stroke(); ctx.restore(); }

  ctx.save(); ctx.beginPath(); rr(-s*0.7,-s,s*0.68,s*0.9,s*0.6); ctx.clip(); ctx.fillStyle=hl==='left'?'#3f8bff':'#bcd7f2'; ctx.fillRect(-s*0.7,-s,s*0.7,s); ctx.restore();
  ctx.save(); ctx.beginPath(); rr(s*0.02,-s,s*0.68,s*0.9,s*0.6); ctx.clip(); ctx.fillStyle=hl==='right'?'#ff8a3c':'#f2ceb0'; ctx.fillRect(0,-s,s*0.7,s); ctx.restore();
  ctx.strokeStyle='#7a93a8'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,-s*0.1); ctx.stroke();
  ctx.fillStyle=hl==='wheel'?'#2bd17e':'#9fb6c8'; rr(-s*0.13,-s*0.82,s*0.26,s*0.5,s*0.13); ctx.fill();
  if(hl){ const p=pulse(); ctx.globalAlpha=0.55+p*0.4; const col=hl==='left'?'#3f8bff':hl==='right'?'#ff8a3c':'#2bd17e'; ctx.strokeStyle=col; ctx.lineWidth=3.5; rr(-s*0.72,-s*1.02,s*1.44,s*2.04,s*0.72); ctx.stroke(); }

// WASD 四鍵圖示（highlight 可指定要亮哪個方向）
function gWASD(x,y,s,hlDir){ const k=s*0.5, g=k*1.12; const pos={W:[0,-g*0.55],A:[-g,g*0.45],S:[0,g*0.45],D:[g,g*0.45]};
  ctx.save(); ctx.translate(x,y); for(const ch in pos){ const P0=pos[ch]; const on=hlDir===ch||hlDir==='all'; ctx.save(); rr(P0[0]-k/2,P0[1]-k/2,k,k,k*0.22);
    ctx.fillStyle=on?'#ffe27a':'#eaf4ff'; ctx.fill(); ctx.strokeStyle=on?'#c8912a':'#7a93a8'; ctx.lineWidth=2; ctx.stroke();

function gCmd(kind,x,y,s){ ctx.save(); ctx.translate(x,y);

// 招式設定（沿用 W02：打=右鍵 / 用力打=左鍵×2 / 擋=左鍵 / 魔法=滾輪；W03 改：閃避=WASD）
const DMG={atk:1,heavy:2,magic:2,block:0,dodge:0};
const VERB={

// 指令晶片：[滑鼠/WASD 圖] [注音大字] [小字按鍵]
function cmdChip(x,y,v){ const m=VERB[v]; const iconW=(m.cmd==='wasd')?40:38; const labW=rubyWidth(m.label,18);

/* POV 玩家視角打擊動畫（沿用 W02：劍/鎚/盾/杖；圖未載退回向量） */
let pov=null;
function playPov(v,o){ pov={v,t0:now(),dur:v==='heavy'?500:v==='magic'?560:400,tx:o?o.x:W/2,ty:o?o.y:H*0.33,dir:(o&&o.sx!==undefined&&o.sx<W/2)?-1:1}; }
function drawPov(){ if(!pov) return; const t=clamp((now()-pov.t0)/pov.dur,0,1); if(t>=1){ pov=null; return; } const v=pov.v; const D=Math.min(W,H);
  if(v==='atk'){ const tt=Math.min(1,t*1.5); const px=lerp(W*0.78,W*0.42,tt), py=lerp(H*0.92,H*0.45,tt); const ang=lerp(0.9,-0.7,tt);
    if(!drawSprite('povSword',px,py,D*0.55,ang,1-Math.max(0,t-0.65)/0.35)){ ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.strokeStyle='#dff2ff'; ctx.lineWidth=12; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-D*0.3); ctx.stroke(); ctx.restore(); }
    ctx.save(); ctx.globalAlpha=0.55*(1-t); ctx.strokeStyle='#fff'; ctx.lineWidth=9; ctx.lineCap='round'; ctx.beginPath(); ctx.arc(pov.tx,pov.ty,54+t*60,-1.4+t*2.4,-0.5+t*2.4); ctx.stroke(); ctx.restore(); }
  else if(v==='heavy'){ const drop=t<0.5?lerp(-H*0.4,0,t*2):Math.sin((t-0.5)*20)*6*(1-t); const px=pov.tx, py=pov.ty-70+drop;
    if(!drawSprite('povHammer',px,py,D*0.5,t<0.5?-0.45:0.03)){ ctx.save(); ctx.translate(px,py); ctx.fillStyle='#8a5a2c'; rr(-16,-D*0.22,32,D*0.22,10); ctx.fill(); ctx.restore(); }
    if(t>=0.5&&t<0.6){ ctx.save(); ctx.globalAlpha=0.45; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.restore(); } }
  else if(v==='block'){ const rise=Math.sin(Math.min(1,t*1.25)*Math.PI); const py=H*1.05-rise*H*0.38;
    if(!drawSprite('povShield',W/2,py,D*0.5)){ ctx.save(); ctx.fillStyle='#2a6b5a'; ctx.beginPath(); ctx.arc(W/2,py,D*0.2,0,7); ctx.fill(); ctx.restore(); }
    if(t>0.25&&t<0.5){ ctx.save(); ctx.globalAlpha=(0.5-t)*2; ctx.strokeStyle='#dff2ff'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(W/2,py-D*0.16,40+t*80,0,7); ctx.stroke(); ctx.restore(); } }
  else if(v==='magic'){ const wx=W*0.8, wy=H*0.9;
    if(!drawSprite('povWand',wx,wy,D*0.45,-0.5)){ ctx.save(); ctx.strokeStyle='#c98a52'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(wx+30,wy+40); ctx.lineTo(wx-40,wy-60); ctx.stroke(); ctx.restore(); }
    const bx=pov.tx, by=pov.ty; ctx.save(); ctx.globalAlpha=0.8*(1-Math.abs(t-0.4)); ctx.strokeStyle='#2bd17e'; ctx.shadowColor='#2bd17e'; ctx.shadowBlur=18; ctx.lineWidth=10-6*t; ctx.beginPath(); ctx.moveTo(wx-52,wy-74); ctx.lineTo(bx,by); ctx.stroke(); ctx.restore();
    if(t>0.3&&t<0.45) burst(bx,by,'#2bd17e',3); }

    for(let i=0;i<5;i++){ const ly=H*0.3+i*H*0.12; ctx.beginPath(); ctx.moveTo(W/2-pov.dir*t*W*0.5, ly); ctx.lineTo(W/2-pov.dir*(t*W*0.5+90), ly); ctx.stroke(); } ctx.restore(); } }

/* ---------- 輸入層（Pointer + wheel + 右鍵→menu；左鍵單/雙/長按/hold） ---------- */
const mouse={x:W/2,y:H/2,down:false,downBtn:0};
const TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0;
let evQ=[], lastLeft=null, singleTimer=null, longTimer=null, leftDownAt=0, leftHeld=false;
const DBL_MS=380, DBL_DIST=120, LONG_MS=500;
function xy(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
cv.addEventListener('pointerdown',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=true; mouse.downBtn=e.button; try{cv.setPointerCapture(e.pointerId);}catch(_){}
  if(dpadHit(x,y,true)) { return; }
  if(e.button===2){ evQ.push({t:'menu',x,y}); return; }
  evQ.push({t:'down',x,y,btn:e.button});
  if(e.button===0){ leftDownAt=now(); leftHeld=true; const tt=now();
    if(lastLeft && (tt-lastLeft.t)<=DBL_MS && dist(x,y,lastLeft.x,lastLeft.y)<=DBL_DIST){ evQ.push({t:'dbl',x,y}); lastLeft=null; }
    else { lastLeft={t:tt,x,y}; } } });
cv.addEventListener('pointermove',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; dpadHit(x,y,mouse.down); });
cv.addEventListener('pointerup',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=false;
  if(dpadRelease()) { leftHeld=false; return; }
  evQ.push({t:'up',x,y}); if(e.button===0||mouse.downBtn===0){ leftHeld=false; } try{cv.releasePointerCapture(e.pointerId);}catch(_){} });
cv.addEventListener('pointercancel',()=>{ mouse.down=false; leftHeld=false; dpadRelease(); evQ.push({t:'cancel'}); });
cv.addEventListener('wheel',e=>{ e.preventDefault(); let dy=e.deltaY; if(e.deltaMode===1) dy*=16; else if(e.deltaMode===2) dy*=(H||600); evQ.push({t:'wheel',dy}); },{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
function clearInput(){ evQ=[]; lastLeft=null; mouse.down=false; leftHeld=false; held.W=held.A=held.S=held.D=0; padDown=null; }

/* ---------- 左手按鍵（QTE 要「按住」的那個鍵）＋ 觸控用的螢幕鍵 ---------- */
const held={W:0,A:0,S:0,D:0};
const KEYMAP={w:'W',a:'A',s:'S',d:'D',arrowup:'W',arrowleft:'A',arrowdown:'S',arrowright:'D'};
window.addEventListener('keydown',e=>{ const k=KEYMAP[(e.key||'').toLowerCase()]; if(!k) return;
  if(!held[k]) evQ.push({t:'key',k});   // 只在「剛按下」時送一次（長按不重複）→ 大招連段才能判順序
  held[k]=1; if(S.phase==='wave'||S.phase==='tut'||S.phase==='swim') e.preventDefault(); });
window.addEventListener('keyup',e=>{ const k=KEYMAP[(e.key||'').toLowerCase()]; if(k) held[k]=0; });
window.addEventListener('blur',()=>{ held.W=held.A=held.S=held.D=0; });
function keyHeld(k){ return held[k]?1:0; }
// 觸控：左下角四顆螢幕鍵，按住哪一顆就等於按住那個鍵（沒鍵盤也玩得到）
let padDown=null;
function keypadGeo(){ const s=Math.min(W,H)*0.115, g=s*0.16, x0=s*0.5, y0=H-(s*2+g)-Math.min(24,H*0.03);
  return { s, list:[ {k:'W',x:x0+s+g,y:y0}, {k:'A',x:x0,y:y0+s+g}, {k:'S',x:x0+s+g,y:y0+s+g}, {k:'D',x:x0+(s+g)*2,y:y0+s+g} ] }; }
function dpadHit(x,y,isDown){ if(!TOUCH||!isDown) return false; const G=keypadGeo();
  for(const b of G.list){ if(x>=b.x&&x<=b.x+G.s&&y>=b.y&&y<=b.y+G.s){
    if(padDown&&padDown!==b.k) held[padDown]=0;
    if(padDown!==b.k) evQ.push({t:'key',k:b.k});   // 觸控也要送按下事件，大招連段才玩得到
    padDown=b.k; held[b.k]=1; return true; } }
  return false; }
function dpadRelease(){ if(padDown){ held[padDown]=0; padDown=null; return true; } return false; }
function drawKeypad(){ if(!TOUCH) return; const G=keypadGeo();
  for(const b of G.list) gKeyCap(b.k, b.x+G.s/2, b.y+G.s/2, G.s*0.92, !!held[b.k]); }
/* ---------- 狀態（存檔續玩） ---------- */
const VERSION=2; // v2＝節奏拍 QTE 版（v1 彈幕版已封存成 -v1-bullet.html）
function defaultState(){ return { v:VERSION, phase:'cover', wave:0, waveMax:0, coins:0, done:false, pct:0, quizOK:false }; }
// 只有一個難度：整體很寬鬆（圈慢、判定窗大、按錯不扣血、連續沒跟上會自動再放慢）
let S=defaultState();
const N_WAVE=4; // 3 波先鋒 + 1 隊長
function overallPct(){ if(S.done) return 1; return clamp(S.waveMax/N_WAVE,0,1); }
const SKEY=(function(){ // 存檔鍵綁使用者：共用電腦時下一位學生不會繼承上一位的進度
  var base='game:'+GAMEKEY;
  try{ localStorage.removeItem(base); }catch(e){}   // 清掉舊版沒綁人的存檔，避免被繼承
  try{ var r=sessionStorage.getItem('@session/currentUser')||localStorage.getItem('@session/currentUser');
       var u=r?JSON.parse(r):null; return base+':'+((u&&u.id)||'anon'); }catch(e){ return base+':anon'; } })();
function persist(){ S.pct=overallPct(); try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} Account.save(S); }
function loadLocal(){ try{ const r=localStorage.getItem(SKEY); if(r){ const o=JSON.parse(r); if(o&&o.v===VERSION) return o; } }catch(e){} return null; }

/* ---------- 關卡設定：節奏拍 QTE（打法以 W02 為基礎）＋ 左手按鍵要同時成立 ----------
   每一拍 ＝ 章魚身上出現一個縮圈 ＋ 一道指令：「按住某個鍵」＋「做某個滑鼠動作」。
   要三件事同時成立才算打中：①按住指定的鍵 ②做對滑鼠動作 ③滑鼠位置在圈裡、而且圈已經縮進判定窗。
   這就是「兩手齊發」——左手按鍵盤、右手移動＋操作滑鼠，缺一不可。
   只有一個很寬鬆的難度：圈很慢、判定窗很大、按錯／太早都不扣血，只有整拍沒跟上才扣，
   而且連續沒跟上兩次會自動把圈再放慢。 */
const COIN_WAVE=45, COIN_DONE=75;
const PLAYER_HP=6;
const LATE=0.22;            // 稍微慢一點點也還算中（判定窗往後多開一截）

// 拍子序列：打人的拍（扣王血）中間穿插章魚攻擊的拍（要擋），順序每次不一樣
function buildBeats(cfg){
  const dmgM=cfg.moves.filter(m=>MOVES[m].dmg>0), defM=cfg.moves.filter(m=>MOVES[m].dmg===0);
  const seq=[]; let left=cfg.hp;
  while(left>0){ const m=pick(dmgM); seq.push(m); left-=MOVES[m].dmg; }
  shuffle(seq);
  const out=[];
  seq.forEach((m,i)=>{ out.push(m); if(defM.length && i<seq.length-1 && Math.random()<0.42) out.push(pick(defM)); });
  if(defM.length && !out.some(m=>MOVES[m].dmg===0)) out.splice(1,0,pick(defM));
  return out; }

// 幕間第 k 段結束 → 游去第 k+1 關（最後一段接隊長關）
function afterInterlude(k){ goPhase('swim', Math.min(k+1,N_WAVE-1)); }
// 這一頁講完 → 先考這一頁；開場劇情已經全部答對過的玩家（重看）就不再考
function storyNext(){
  if(st.set==='inter'){ Sfx.tick(); goPhase('quiz',{set:'inter',i:st.step}); return; }
  if(S.quizOK){ if(st.step>=st.pages.length-1){ Sfx.win(); afterStory(); } else { Sfx.tick(); st.step++; st.t0=now(); } }
  else { Sfx.tick(); goPhase('quiz', st.step); } }
const ST_STORY={ update(evs){ for(const e of evs){ if(e.t==='down'){ if(st.set!=='inter'&&S.quizOK&&inBtn(e,storySkip())){ Sfx.tick(); afterStory(); return; } if(inBtn(e,storyBtn())) storyNext(); } } },
  draw(){ const s=st.pages[st.step], cx=W/2; if(!s) return;
    // 整幅劇情圖鋪滿；沒載到才退回海底底圖
    seaBg(); if(!drawCover(s.art,1)) drawCover('seabed',0.5);
    ctx.save(); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'rgba(3,14,26,.62)'); g.addColorStop(0.42,'rgba(3,14,26,.12)'); g.addColorStop(1,'rgba(3,14,26,.94)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();
    const inter=st.set==='inter';
    drawRuby(inter?P('打完第 '+(st.step+1)+' 關','ㄉㄚˇ ㄨㄢˊ ㄉㄧˋ ㄍㄨㄢ'):P('章魚軍團前哨 · 第三章','ㄓㄤ ㄩˊ ㄐㄩㄣ ㄊㄨㄢˊ ㄑㄧㄢˊ ㄕㄠˋ ㄉㄧˋ ㄙㄢ ㄓㄤ'), cx, H*0.075, Math.min(20,W*0.04), '#ffe27a');
    const c=storyCard(); ctx.save(); rr(c.x,c.y,c.w,c.h,18); ctx.fillStyle='rgba(3,14,26,.86)'; ctx.fill(); ctx.strokeStyle='rgba(124,208,255,.45)'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
    drawRuby(s.t, cx, c.y+c.h*0.30, Math.min(30,W*0.055), '#ffce47');
    drawRuby(s.s, cx, c.y+c.h*0.72, Math.min(24,W*0.04), '#eaf4ff');
    const n=st.pages.length;
    for(let i=0;i<n;i++){ ctx.fillStyle=i===st.step?'#ffce47':'rgba(255,255,255,.28)'; ctx.beginPath(); ctx.arc(cx-(n-1)*12+i*24, c.y+c.h+20, 6, 0,7); ctx.fill(); }
    const b=storyBtn(); ctx.save(); const pl=pulse(); ctx.shadowColor='#7cd0ff'; ctx.shadowBlur=12+pl*8; rr(b.x,b.y,b.w,b.h,b.h/2); ctx.fillStyle='#1f6f9f'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#7cd0ff'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
    drawRuby(inter?P('我看完了，考我！','ㄨㄛˇ ㄎㄢˋ ㄨㄢˊ ㄌㄜ˙ ㄎㄠˇ ㄨㄛˇ')
      :(S.quizOK?(st.step>=n-1?P('出發！','ㄔㄨ ㄈㄚ'):P('下一頁','ㄒㄧㄚˋ ㄧˊ ㄧㄝˋ')):P('我看完了，考我！','ㄨㄛˇ ㄎㄢˋ ㄨㄢˊ ㄌㄜ˙ ㄎㄠˇ ㄨㄛˇ')),
      b.x+b.w/2, b.y+b.h/2, Math.min(22,W*0.045), '#eafaff');
    // 「跳過」只給已經全部答對過的玩家；第一次玩一定要一段一段看＋答對；幕間一律要看
    if(!inter&&S.quizOK){ const j=storySkip(); ctx.save(); rr(j.x,j.y,j.w,j.h,j.h/2); ctx.fillStyle='rgba(4,18,32,.7)'; ctx.fill(); ctx.strokeStyle='#5a7893'; ctx.lineWidth=1; ctx.stroke(); ctx.restore(); drawRuby(P('跳過','ㄊㄧㄠˋ ㄍㄨㄛˋ'), j.x+j.w/2, j.y+j.h/2, 12, '#9fc4e0'); } } };
/* 每段劇情後的檢核：泡泡理解題（同 W02）——三顆漂浮泡泡，點錯 → 鎖 2+N 秒、重新洗牌換位置 */
function initQuiz(a){ const o=pageArg(a); st.set=o.set||'main'; st.pages=pageSet(st.set);
  st.si=clamp(o.i||0,0,st.pages.length-1); st.done=0; makeQBubbles(); }
function reviewBtn(){ const w=Math.min(120,W*0.24), h=34; return {x:12, y:12, w, h}; }
function makeQBubbles(){ const cur=st.pages[st.si].quiz;
  st.q={ question:cur.q, opts:shuffle(cur.opts.map((t,i)=>({t, ok:i===cur.a}))), wrongN:0, lockUntil:0, finished:0, bubbles:[] };
  layoutQBubbles(st.q); }
function layoutQBubbles(q,reshuffle){ if(reshuffle) shuffle(q.opts); // 點錯就換位置
  const n=q.opts.length, R=Math.min(120, W*0.16, H*0.14, (W-40)/(n*2.5)), gap=Math.max(R*2.2+16, Math.min(W*0.30,270));
  // 用「泡泡邊緣＋漂浮振幅」抓邊界：上不壓到進度點、下不壓到鎖定倒數、左右不出界
  const RY=R*1.10, RX=R*1.08, cTop=H*0.375+18+RY, cBot=Math.max(cTop, H*0.86-6-RY);
  q.bubbles=q.opts.map((o,i)=>{ const bx=clamp(W/2+(i-(n-1)/2)*gap, RX+8, W-RX-8), by=cTop+Math.random()*(cBot-cTop);
    return { bx, by, x:bx, y:by, r:R, phase:Math.random()*7, ox:o }; });
  q.R=R; }
// 漂浮＝相對基準點的正弦位移（不是每幀累加），才不會愈飄愈遠／被幀率影響
function floatBubbles(q){ for(const b of q.bubbles){ b.x=b.bx+Math.cos(now()/1300+b.phase)*b.r*0.07; b.y=b.by+Math.sin(now()/900+b.phase)*b.r*0.09; } }
function rubyFit(line,maxW,fs){ const w=rubyWidth(line,fs); return w<=maxW?fs:Math.max(11,Math.floor(fs*maxW/w)); }
const ST_QUIZ={ update(evs){
    if(st.done){ if(now()>=st.done) afterStory(); return; }
    const q=st.q; if(!q) return;
    floatBubbles(q);
    // 答對 → 這一段過了
    if(q.finished){ if(now()>=q.finished){
      if(st.set==='inter'){ afterInterlude(st.si); return; }                       // 幕間 → 游去下一關
      if(st.si>=st.pages.length-1){ st.done=now()+1100; S.quizOK=true; persist(); } // 開場最後一段 → 教學／關卡
      else goPhase('story', st.si+1);
    } return; }
    const locked=now()<q.lockUntil;
    for(const e of evs){ if(e.t!=='down'||e.btn!==0) continue;
      if(inBtn(e,reviewBtn())){ Sfx.tick(); goPhase('story',{set:st.set,i:st.si}); return; } // 回去再看一次剛剛那段
      let hit=-1; for(let i=0;i<q.bubbles.length;i++){ const b=q.bubbles[i]; if(dist(e.x,e.y,b.x,b.y)<=b.r+16){ hit=i; break; } }
      if(hit<0){ ripple(e.x,e.y); continue; }
      if(locked){ ripple(e.x,e.y,'#ff9b6b'); continue; }
      const b=q.bubbles[hit];
      if(b.ox.ok){ q.finished=now()+750; Sfx.win(); burst(b.x,b.y,'#7cffb0',26); ripple(b.x,b.y,'#7cffb0'); popText(b.x,b.y-24,'答對了！','#7cffb0',1.3); }
      else { Sfx.bad(); q.wrongN++; q.lockUntil=now()+(2000+(q.wrongN-1)*1000); shake(6,180); burst(b.x,b.y,'#ff8a3c',12); popText(b.x,b.y-24,'再想想～','#ff9b6b',1.15); layoutQBubbles(q,true); }
      return; } },
  draw(){ seaBg(); drawCover('seabed',0.4); const cx=W/2, q=st.q; if(!q) return;
    ctx.save(); ctx.fillStyle='rgba(3,17,31,.5)'; ctx.fillRect(0,0,W,H); ctx.restore();
    drawRuby(P('考考你：剛剛那一段說了什麼？','ㄎㄠˇ ㄎㄠˇ ㄋㄧˇ ㄍㄤ ㄍㄤ ㄋㄚˋ ㄧˊ ㄉㄨㄢˋ ㄕㄨㄛ ㄌㄜ˙ ㄕㄜˊ ㄇㄜ˙'), cx, H*0.13, Math.min(24,W*0.044,H*0.034), '#ffce7a');
    drawRuby(q.question, cx, H*0.27, Math.min(32,W*0.052,H*0.045), '#fff');
    const remain=Math.max(0,Math.ceil((q.lockUntil-now())/1000)), locked=remain>0;
    for(const b of q.bubbles){ const p=pulse(); ctx.save();
      const gr=ctx.createRadialGradient(b.x-b.r*0.32,b.y-b.r*0.32,2,b.x,b.y,b.r);
      // 泡泡要夠實，深藍字才讀得清楚（半透明會讓對比掉到 3:1 以下）
      gr.addColorStop(0,'rgba(238,252,255,.99)'); gr.addColorStop(0.7,'rgba(152,216,255,.92)'); gr.addColorStop(1,'rgba(108,180,250,.72)');
      ctx.globalAlpha=locked?0.55:1; ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+(locked?0:p*2),0,7); ctx.fill();
      ctx.strokeStyle='rgba(220,245,255,.85)'; ctx.lineWidth=2.5; ctx.stroke();
      ctx.globalAlpha=(locked?0.35:0.7); ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.ellipse(b.x-b.r*0.34,b.y-b.r*0.42,b.r*0.20,b.r*0.13,-0.5,0,7); ctx.fill(); // 高光
      ctx.restore();
      const fs=rubyFit(b.ox.t, b.r*1.68, Math.min(26,b.r*0.44));
      drawRuby(b.ox.t, b.x, b.y, fs, '#062a45'); }
    if(locked){ drawRuby(P('等一下下… '+remain,'ㄉㄥˇ ㄧˊ ㄒㄧㄚˋ ㄒㄧㄚˋ'), cx, H*0.88, Math.min(20,W*0.036,H*0.028), '#ffce47');
      drawRuby(P('答案就在剛剛的故事裡喔！','ㄉㄚˊ ㄢˋ ㄐㄧㄡˋ ㄗㄞˋ ㄍㄤ ㄍㄤ ㄉㄜ˙ ㄍㄨˋ ㄕˋ ㄌㄧˇ ㄡ˙'), cx, H*0.94, Math.min(18,W*0.033,H*0.025), '#ff9b6b'); }
    for(let i=0;i<st.pages.length;i++){ ctx.fillStyle=i<st.si?'#7cffb0':i===st.si?'#ffce47':'#3a5872'; ctx.beginPath(); ctx.arc(cx-(st.pages.length-1)*13+i*26, H*0.375, 6,0,7); ctx.fill(); }
    // 再看一次：答不出來可以回去看剛剛那一段（不是跳過，還是要答對才會過）
    const rb=reviewBtn(); ctx.save(); rr(rb.x,rb.y,rb.w,rb.h,rb.h/2); ctx.fillStyle='rgba(4,18,32,.78)'; ctx.fill(); ctx.strokeStyle='#7cd0ff'; ctx.lineWidth=1.5; ctx.stroke(); ctx.restore();
    drawRuby(P('再看一次','ㄗㄞˋ ㄎㄢˋ ㄧˊ ㄘˋ'), rb.x+rb.w/2, rb.y+rb.h/2, 13, '#bfe6ff');
    drawFx();
    if(st.done){ ctx.save(); ctx.fillStyle='rgba(3,17,31,.5)'; ctx.fillRect(0,0,W,H); ctx.restore(); drawRuby(P('全部答對！出發守衛寶石！','ㄑㄩㄢˊ ㄅㄨˋ ㄉㄚˊ ㄉㄨㄟˋ ㄔㄨ ㄈㄚ ㄕㄡˇ ㄨㄟˋ ㄅㄠˇ ㄕˊ'), cx, H*0.5, Math.min(32,W*0.06), '#7cffb0'); } } };

/* ================= 兩手齊發 QTE 引擎（節奏拍以 W02 的打法為基礎） ================= */
function mwh(){ return Math.min(W,H); }
function inBtn(e,r){ return e.x>=r.x&&e.x<=r.x+r.w&&e.y>=r.y&&e.y<=r.y+r.h; }
function skipBtn(){ const w=Math.min(96,W*0.2), h=34; return {x:W-w-12, y:12, w, h}; }
function startWaveBtn(){ const w=Math.min(280,W*0.55), h=Math.min(66,H*0.1); return {x:W/2-w/2, y:H*0.83, w, h}; }

/* ---------- 章魚 ---------- */
function bossHurt(m){ st.boss.hurtUntil=now()+130; st.boss.shake={mag:6*(m||1),until:now()+240}; }
function drawBoss(){ const B=st.boss; if(!B) return; let bx=B.x, by=B.y+Math.sin(now()/700)*B.sz*0.02;
  if(B.shake&&now()<B.shake.until) bx+=Math.sin(now()/22)*B.shake.mag;
  ctx.save(); if(B.hurtUntil&&now()<B.hurtUntil) ctx.globalAlpha=0.62;
  if(!drawSprite(B.sprite,bx,by,B.sz)) vOcto(bx,by,B.sz*0.5,B.tint||'#a45bd6',0,B.captain);
  ctx.restore();
  if(B.hurtUntil&&now()<B.hurtUntil){ ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(bx,by,B.sz*0.36,0,7); ctx.fill(); ctx.restore(); } }
function makeBoss(cfg){ return { x:W/2, y:H*0.47, sz:Math.min(W*0.52,H*0.56)*(cfg.sizeK||1), sprite:cfg.sprite, tint:cfg.tint, captain:!!cfg.captain, hurtUntil:0, shake:null }; }

/* ---------- 大鍵帽：按住的時候會亮起來（小孩最需要的「我真的有按住」回饋） ---------- */
function gKeyCap(ch,x,y,s,on){ ctx.save(); ctx.translate(x,y);
  if(on){ ctx.shadowColor='#ffe27a'; ctx.shadowBlur=14+pulse()*10; }
  rr(-s/2,-s/2,s,s,s*0.22); ctx.fillStyle=on?'#ffe27a':'#eaf4ff'; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle=on?'#c8912a':'#7a93a8'; ctx.lineWidth=Math.max(2,s*0.07); ctx.stroke();
  ctx.fillStyle='#2a3b4d'; ctx.font='900 '+(s*0.56)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ch,0,1);
  ctx.restore(); ctx.textBaseline='alphabetic'; }

/* ---------- 指令面板：[按住][鍵帽] ＋ [滑鼠圖][招式大字] 全部排成一行 ---------- */
function moveCardH(){ return Math.max(Math.min(56,W*0.055,H*0.072), Math.min(34,W*0.036,H*0.045)*1.5)*1.3; }
function hudBottom(){ const hh=Math.min(22,H*0.028); return hh*2+21; } // 王血條＋「第 N 關」那行字的下緣
function drawMoveCard(mvKey,topY){ const mv=MOVES[mvKey]; if(!mv) return; const on=!!keyHeld(mv.key);
  const ks=Math.min(56,W*0.055,H*0.072), ms=Math.min(32,W*0.032,H*0.042);
  const fs=Math.min(34,W*0.036,H*0.045), pf=Math.min(20,fs*0.62), plus=Math.min(26,fs*0.78);
  const preW=rubyWidth(HOLD_LBL,pf), labW=rubyWidth(mv.label,fs);
  const w=22+preW+8+ks+12+plus+12+ms*1.5+10+labW+22, x0=W/2-w/2, h=moveCardH(), cy=topY+h/2;
  ctx.save(); rr(x0,cy-h/2,w,h,h/2); ctx.fillStyle='rgba(3,14,26,.9)'; ctx.fill();
  if(on){ ctx.shadowColor=mv.col; ctx.shadowBlur=12; } ctx.strokeStyle=mv.col; ctx.lineWidth=3; ctx.stroke(); ctx.restore();
  let x=x0+22;
  drawRuby(HOLD_LBL, x, cy, pf, on?'#ffe27a':'#9fc4e0', 'left'); x+=preW+8;
  gKeyCap(mv.key, x+ks/2, cy, ks, on); x+=ks+12;
  ctx.save(); ctx.fillStyle='#cfe8ff'; ctx.font='900 '+plus+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('+',x+plus/2,cy); ctx.restore(); ctx.textBaseline='alphabetic'; x+=plus+12;
  gCmd(mv.mouse, x+ms*0.75, cy, ms); x+=ms*1.5+10;
  drawRuby(mv.label, x, cy, fs, '#fff', 'left'); }

/* ---------- 節奏拍 ---------- */
function targetRad(){ return Math.min(mwh()*0.088, 74); }
function beatRad(p){ return lerp(mwh()*0.22, targetRad(), clamp(p,0,1)); }
function beatSpots(){ const B=st.boss, r=B.sz*0.30; return [ {x:B.x,y:B.y-r}, {x:B.x-r*1.05,y:B.y+r*0.12}, {x:B.x+r*1.05,y:B.y+r*0.12}, {x:B.x,y:B.y+r} ]; }
function spawnBeat(){ if(!st.tut && st.bi>=st.beats.length){ roundClear(); return; }
  const mv=st.tut?TUT[st.ti].mv:st.beats[st.bi];
  const sp=beatSpots(); let i=Math.floor(Math.random()*sp.length); if(i===st.lastSpot) i=(i+1)%sp.length; st.lastSpot=i;
  const pad=targetRad()*2.2;
  st.beat={ mv, x:clamp(sp[i].x,pad,W-pad), y:clamp(sp[i].y,H*0.26,H-pad), t0:now(), dur:st.ringMs, resolved:false };
  Sfx.cue(); }
function beatP(){ const b=st.beat; return b?(now()-b.t0)/b.dur:0; }
function beatInWin(){ const b=st.beat; if(!b) return false; const p=beatP(); return p>=1-st.cfg.win && p<=1+LATE; }
function mouseActOf(e){
  if(e.t==='dbl') return {a:'dbl',x:e.x,y:e.y};
  if(e.t==='menu'||(e.t==='down'&&e.btn===2)) return {a:'right',x:e.x,y:e.y};
  if(e.t==='down'&&e.btn===0) return {a:'click',x:e.x,y:e.y};
  if(e.t==='wheel'&&e.dy<0) return {a:'scroll',x:mouse.x,y:mouse.y};
  return null; }
function beatSay(txt,col){ const b=st.beat; popText(b?b.x:W/2, (b?b.y:H*0.5)-targetRad()-26, txt, col||'#ff9b6b', 1.15); }
function nudge(){ st.lockUntil=now()+360; Sfx.tick(); }
// 判定：鍵、滑鼠動作、位置、時機——四個都要對。任何一項不對都只給提示，不扣血。
function judgeBeat(act){ const b=st.beat; if(!b||b.resolved) return; const mv=MOVES[b.mv];
  if(mv.mouse==='dbl' && act.a==='click') return;      // 連點兩下的第一下不算做錯
  if(now()<st.lockUntil) return;
  if(act.a!==mv.mouse && !(TOUCH&&act.a==='click')){ beatSay('按錯了，看上面的圖！'); nudge(); return; }
  if(dist(act.x,act.y,b.x,b.y)>targetRad()*1.75){ beatSay('滑鼠要移到圈圈裡！','#ffce47'); nudge(); return; }
  if(!keyHeld(mv.key)){ beatSay('左手要按住 '+mv.key+' 鍵！','#ff9b6b'); nudge(); return; }
  const p=beatP();
  if(p<1-st.cfg.win){ beatSay('太早了，等圈圈變小！','#7cd0ff'); nudge(); return; }
  beatHit(p>=0.90&&p<=1.08); }
function beatHit(perfect){ const b=st.beat, mv=MOVES[b.mv]; b.resolved=true;
  playPov(mv.pov,{x:b.x,y:b.y,sx:b.x});
  burst(b.x,b.y,mv.col,perfect?28:16); ripple(b.x,b.y,mv.col);
  if(st.tut){ Sfx.win(); popText(b.x,b.y-targetRad()-26,'做到了！','#7cffb0',1.3); st.beat=null; tutPass(); return; }
  st.combo++; st.miss=0;
  const dmg=mv.dmg+(perfect&&mv.dmg>0?1:0);
  if(dmg>0){ st.hp=Math.max(0,st.hp-dmg); bossHurt(perfect?1.7:1); Sfx.hit(st.combo); }
  else { Sfx.block(); }
  popText(b.x,b.y-targetRad()-26, perfect?'剛剛好！':(mv.dmg?'命中！':'擋住了！'), perfect?'#ffe27a':'#7cffb0', perfect?1.35:1.15);
  st.beat=null; st.bi++;
  if(st.hp<=0){ roundClear(); return; }
  checkUlt(); if(st.ult) return;   // 血量過門檻 → 先進大招連段
  st.nextAt=now()+st.cfg.gap; }
function beatMiss(){ const b=st.beat;
  if(st.tut){ st.beat=null; st.nextAt=now()+500; popText(W/2,H*0.30,'沒關係，再來一次','#7cd0ff',1.1); return; } // 教學關不扣血
  st.combo=0; st.php-=1; shake(14,320); Sfx.bad(); st.flash={col:'#ff5d6c',until:now()+320};
  popText(b.x,b.y-targetRad()-26,'沒跟上！','#ff9b6b',1.2);
  st.miss=(st.miss||0)+1;
  if(st.miss>=2){ st.ringMs=Math.min(st.ringMs*1.2, st.cfg.ringMs*1.9); st.miss=0; popText(W/2,H*0.30,'圈圈變慢了，慢慢來','#7cd0ff',1.1); }
  st.beat=null;                       // 同一拍重來（st.bi 不動）
  if(st.php<=0){ battleLost(); return; }
  st.nextAt=now()+st.cfg.gap; }

    const fa=clamp(1-(T-0.2)/1.6,0,1);
    if(fa>0.01&&st.flee){ ctx.save(); ctx.globalAlpha=fa*0.9; st.flee.forEach(o=>{ if(!drawSprite(o.k,o.x,o.y,o.s*2)) vOcto(o.x,o.y,o.s,'#a45bd6'); }); ctx.restore(); }
    if(T<1.9){ ctx.save(); ctx.globalAlpha=clamp(1-Math.abs(T-0.8)/1.1,0,1); drawRuby(P('章魚大軍撤退了！','ㄓㄤ ㄩˊ ㄉㄚˋ ㄐㄩㄣ ㄔㄜˋ ㄊㄨㄟˋ ㄌㄜ˙'), cx, H*0.20, Math.min(36,W*0.062), '#7cffb0'); ctx.restore(); }
    // ② 寶石升起發光
    if(T>1.0&&T<2.0){ const gp=clamp((T-1.0)/1.0,0,1), gy=lerp(H*0.60,H*0.47,gp);
      ctx.save(); ctx.globalAlpha=gp; for(let i=0;i<5;i++){ const p=0.5+0.5*Math.sin(now()/300+i); ctx.save(); ctx.globalAlpha=gp*(0.2+p*0.25); ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(cx-2*gap+i*gap, gy, gr*1.7,0,7); ctx.fill(); ctx.restore(); gGemIcon(cx-2*gap+i*gap, gy, gr, true, i); } ctx.restore(); }
    // ③ 通關畫面
    if(T>2.0){ const k=clamp((T-2.0)/0.8,0,1);
      ctx.save(); ctx.globalAlpha=k*0.6; ctx.fillStyle='#030c18'; ctx.fillRect(0,0,W,H); ctx.restore();
      gTrophy(cx, H*0.17, Math.min(W*0.085,H*0.115)*(0.6+0.4*Math.min(1,k*1.4)));
      drawRuby(P('全部通關！','ㄑㄩㄢˊ ㄅㄨˋ ㄊㄨㄥ ㄍㄨㄢ'), cx, H*0.31, Math.min(46,W*0.075)*(0.82+0.18*k), '#ffe27a');
      drawRuby(P('你守住了國王的五顆寶石！','ㄋㄧˇ ㄕㄡˇ ㄓㄨˋ ㄌㄜ˙ ㄍㄨㄛˊ ㄨㄤˊ ㄉㄜ˙ ㄨˇ ㄎㄜ ㄅㄠˇ ㄕˊ'), cx, H*0.385, Math.min(23,W*0.039), '#cfe8ff');
      for(let i=0;i<5;i++){ const p=0.5+0.5*Math.sin(now()/300+i); ctx.save(); ctx.globalAlpha=0.18+p*0.2; ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(cx-2*gap+i*gap, H*0.47, gr*1.6,0,7); ctx.fill(); ctx.restore(); gGemIcon(cx-2*gap+i*gap, H*0.47, gr, true, i); }
      drawRuby(P('你學會了兩手齊發！　金幣 +'+(COIN_DONE+COIN_WAVE*N_WAVE),'ㄋㄧˇ ㄒㄩㄝˊ ㄏㄨㄟˋ ㄌㄜ˙ ㄌㄧㄤˇ ㄕㄡˇ ㄑㄧˊ ㄈㄚ ㄐㄧㄣ ㄅㄧˋ'), cx, H*0.545, Math.min(19,W*0.034), '#ffd89a');
      if(T>2.4){ const t=taBtn(); ctx.save(); rr(t.x,t.y,t.w,t.h,t.h/2); ctx.fillStyle=st.ta?'#2b6f4a':'#1f8f5a'; ctx.fill(); ctx.strokeStyle='#7cffb0'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
        drawRuby(st.ta?P('已當小老師','ㄧˇ ㄉㄤ ㄒㄧㄠˇ ㄌㄠˇ ㄕ'):P('我是小老師','ㄨㄛˇ ㄕˋ ㄒㄧㄠˇ ㄌㄠˇ ㄕ'), t.x+t.w/2, t.y+t.h/2, Math.min(21,W*0.038), '#eafff2');
        const r=raiseBtn(); ctx.save(); rr(r.x,r.y,r.w,r.h,r.h/2); ctx.fillStyle=st.raised?'#7a5a1a':'#b8871f'; ctx.fill(); ctx.strokeStyle='#ffe27a'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
        drawRuby(st.raised?P('已舉手','ㄧˇ ㄐㄩˇ ㄕㄡˇ'):P('舉手告訴老師','ㄐㄩˇ ㄕㄡˇ ㄍㄠˋ ㄙㄨˋ ㄌㄠˇ ㄕ'), r.x+r.w/2, r.y+r.h/2, Math.min(20,W*0.036), '#fff6e0');
        const hb=homeBtn(); ctx.save(); rr(hb.x,hb.y,hb.w,hb.h,hb.h/2); ctx.fillStyle='rgba(4,18,32,.8)'; ctx.fill(); ctx.strokeStyle='#5a7893'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
        drawRuby(P('回封面','ㄏㄨㄟˊ ㄈㄥ ㄇㄧㄢˋ'), hb.x+hb.w/2, hb.y+hb.h/2, Math.min(20,W*0.036), '#9fc4e0'); }
      drawRuby(P('更大的章魚王還在後面……','ㄍㄥˋ ㄉㄚˋ ㄉㄜ˙ ㄓㄤ ㄩˊ ㄨㄤˊ ㄏㄞˊ ㄗㄞˋ ㄏㄡˋ ㄇㄧㄢˋ'), cx, H*0.94, Math.min(16,W*0.03), '#cfa8e0'); }
    drawFx(); } };

/* ================= 主迴圈 ================= */
const DISPATCH={ cover:ST_COVER, story:ST_STORY, quiz:ST_QUIZ, tut:ST_TUT, swim:ST_SWIM, wave:ST_WAVE, deliver:ST_DELIVER };
let bootT=0;
// 所有圖都有向量 fallback，不需等素材載入 → 直接開跑，避免載入閘門卡住
function frame1(){
  const evs=evQ; evQ=[];
  const cur=DISPATCH[S.phase]||ST_COVER;
  const so=shakeOffset(); ctx.save(); ctx.translate(so[0],so[1]);
  try{ cur.update(evs); }catch(e){ console.error('update',e); }
  // update 可能切換 phase（並重置 st）→ 重新取當前 phase 的 draw，避免舊 draw 讀到新 st
  const cur2=DISPATCH[S.phase]||ST_COVER;
  try{ cur2.draw(); }catch(e){ console.error('draw',e); }
  updateFx();
  if(S.phase==='wave') drawCoinHUD();
  ctx.restore(); }
function frame(){ frame1(); requestAnimationFrame(frame); }

function boot(){ bootT=now();
  const local=loadLocal(); if(local) S=local;
  renderAcct(); window.addEventListener('online',renderAcct); window.addEventListener('offline',renderAcct);
  goPhase('cover'); // 一律從封面進（選難度 → 看劇情 → 關卡），不直接跳回存檔的相位，否則會略過劇情
  requestAnimationFrame(frame); // 立刻啟動主迴圈，不被雲端載入卡住
  // 背景載入雲端進度：較遠者才覆蓋；只吃進度數字，不動玩家當下所在的相位
  (async()=>{ try{ const cloud=await Account.load(); if(cloud && (cloud.waveMax||0)>(S.waveMax||0)){ const ph=S.phase; S=cloud; S.phase=DISPATCH[ph]?ph:'cover'; } }catch(e){} })(); }
boot();

/* ---------- 測試接口（免截圖驗證） ---------- */
window.W3={ S:()=>S, st:()=>st, phase:(p,x)=>goPhase(p,x), wave:(n)=>goPhase('wave',n),
  ev:(e)=>evQ.push(e), frame:()=>frame1(), setWH:(w,h)=>{ W=w; H=h; }, TOUCH,
  hold:(k,v)=>{ held[k]=v?1:0; }, held:()=>({...held}), keyHeld:(k)=>keyHeld(k),
  mode:()=>st.mode, ti:()=>st.ti, hp:()=>st.hp, php:()=>st.php, combo:()=>st.combo,
  boss:()=>st.boss, beat:()=>st.beat, beats:()=>st.beats, bi:()=>st.bi, beatP:()=>beatP(), inWin:()=>beatInWin(),
  moves:()=>MOVES, ringMs:()=>st.ringMs, lockUntil:()=>st.lockUntil,
  startFight:()=>startFight(), tutPass:()=>tutPass(), spawn:()=>spawnBeat(),
  // 直接把「這一拍該做的動作」正確做出來（按住鍵＋在圈裡做對滑鼠動作）
  doBeat:(opts)=>{ const b=st.beat; if(!b) return 'no-beat'; const mv=MOVES[b.mv]; const o=opts||{};
    if(o.noKey!==true) held[mv.key]=1;
    const x=(o.x!=null?o.x:b.x), y=(o.y!=null?o.y:b.y); mouse.x=x; mouse.y=y;
    const a=o.mouse||mv.mouse;
    if(a==='scroll') evQ.push({t:'wheel',dy:-1});
    else if(a==='dbl') evQ.push({t:'dbl',x,y});
    else if(a==='right') evQ.push({t:'menu',x,y});
    else evQ.push({t:'down',btn:0,x,y});
    return 'queued'; },
  clearWave:()=>roundClear(), lose:()=>battleLost() };
</script>

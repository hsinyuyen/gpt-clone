  .recall-quiz{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.recall-quiz h3,.recall-quiz>.btn{grid-column:1/-1}.recall-quiz .choice-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.recall-quiz .choice{min-height:38px;padding:7px 9px}

  .summary-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.summary-item{border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px}.summary-item .q{font-weight:950;margin-bottom:6px}.summary-item .choice-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.summary-item .choice{min-height:38px;padding:7px 9px}
  .score{padding:16px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;text-align:center;font-weight:950}.score b{font-size:40px;color:var(--text)}

  .collage-wave{width:100%;height:76px;border-radius:8px;background:repeating-linear-gradient(90deg,color-mix(in srgb,var(--c) 76%,#fff) 0 9px,transparent 9px 18px)}

  .teacher-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{padding:12px;border:1px solid #e4e9f2;border-radius:8px;background:#f8fafc}.metric span{display:block;color:var(--muted);font-size:12px;font-weight:950}.metric b{font-size:22px}
  .modal{position:fixed;inset:0;z-index:60;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px}.modal.on{display:flex}.modal-card{width:min(720px,100%);max-height:90vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 24px 80px rgba(16,24,40,.34);padding:18px}.modal-card.flow-modal{width:min(980px,100%)}

  .sentence{padding:14px;border:2px dashed #98a2b3;border-radius:8px;background:#f8fafc;text-align:center;font-size:20px;font-weight:950}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(14px);max-width:min(700px,calc(100% - 32px));padding:12px 16px;border-radius:12px;background:#101828;color:#fff;font-weight:950;box-shadow:0 18px 44px rgba(16,24,40,.25);opacity:0;pointer-events:none;z-index:80;transition:.18s ease}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .shake{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  /* Octopus Kingdom inspired dark-neon theme */
  :root{
    --bg:#031221;
    --ink:#ecfbff;
    --muted:#9cc8da;
    --line:rgba(137,225,255,.34);
    --panel:rgba(7,24,44,.92);
    --panel2:rgba(9,36,64,.86);
    --text:#a78bfa;
    --image:#2dd4bf;
    --video:#38bdf8;
    --music:#facc15;
    --good:#7cff9e;
    --bad:#ff5d6c;
    --gold:#ffce47;
    --shadow:0 18px 48px rgba(0,0,0,.42);
  }
  body{
    color:var(--ink);
    background:
      radial-gradient(740px 360px at 15% 8%, rgba(124,58,237,.36), transparent 62%),
      radial-gradient(620px 360px at 82% 12%, rgba(45,212,191,.28), transparent 60%),
      radial-gradient(520px 300px at 46% 96%, rgba(250,204,21,.16), transparent 60%),
      linear-gradient(180deg,#020712 0%,#06182b 48%,#020914 100%);
  }
  body:before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
    background:
      radial-gradient(circle at 12% 78%, rgba(91,192,255,.13) 0 4px, transparent 5px),
      radial-gradient(circle at 76% 70%, rgba(255,206,71,.12) 0 5px, transparent 6px),
      radial-gradient(circle at 48% 30%, rgba(124,255,158,.10) 0 3px, transparent 4px);
    background-size:170px 150px,220px 180px,140px 130px;
    opacity:.78;
  }
  #hud{
    background:linear-gradient(180deg,rgba(3,10,22,.92),rgba(5,20,38,.86));
    border-bottom:1px solid rgba(137,225,255,.38);
    box-shadow:0 8px 28px rgba(0,0,0,.35),0 0 28px rgba(56,189,248,.16);
  }
  .brand h1,.progress-top,h2,h3,.guide-card b,.tool-card b,.map-tool-chip b,.missing-tools b,.task-title,.wall-zone h4{color:#f4fdff}
  .brand small,.lead,.eyebrow,.progress-top,.tool-card small,.map-tool-chip small,.tool-story-copy p,.tool-work-title .lead,.guide-step,.exam-progress,.story-count,.account{color:var(--muted)}

    background:linear-gradient(180deg,rgba(9,32,57,.96),rgba(4,16,31,.96));
    color:var(--ink);
    border-color:rgba(137,225,255,.56);
    box-shadow:0 12px 0 rgba(0,0,0,.36),0 0 26px rgba(56,189,248,.13);
  }

    background:#fff url("assets/s3-w01/agong.png") center/cover no-repeat;

    background:linear-gradient(90deg,rgba(5,18,34,.96),rgba(11,47,76,.94),rgba(31,20,72,.92));

    box-shadow:0 10px 0 rgba(0,0,0,.38),0 0 24px rgba(91,192,255,.34),inset 0 0 24px rgba(124,58,237,.15);

    border-color:rgba(137,225,255,.42);
  }
  .btn{box-shadow:0 6px 0 rgba(0,0,0,.5),0 0 20px rgba(91,192,255,.22)}
  .btn.primary{background:linear-gradient(180deg,#8b5cf6,#5b21b6)}

  .btn.warn{background:linear-gradient(180deg,#ffce47,#f97316);color:#211100}
  .softbtn,.hud-btn,.choice,.tool-choice,.phrase-card{

const Account=(()=>{
  let uid=null,uname='',db=null,ready=false;
  function sessionUser(){try{const r=localStorage.getItem('@session/currentUser');return r?JSON.parse(r):null;}catch(e){return null;}}
  function init(){const u=sessionUser();if(u&&u.id){uid=u.id;uname=u.displayName||u.username||'';}if(uid&&window.firebase){try{if(!firebase.apps.length)firebase.initializeApp(FB);db=firebase.firestore();ready=true;$('#account').classList.add('ready');$('#account span').textContent='帳號同步模式';}catch(e){}}}
  async function load(){if(!ready)return null;try{const s=await db.collection('gameProgress').doc(uid).get();return s.exists?(s.data()[GAMEKEY]||null):null;}catch(e){return null;}}
  async function save(state){if(!ready)return;try{await db.collection('gameProgress').doc(uid).set({[GAMEKEY]:state,name:uname,updatedAt:new Date().toISOString()},{merge:true});P.syncPending=false;}catch(e){P.syncPending=true;}}
  async function creditCoins(id,amount,reason){if(!ready)throw new Error('account-not-ready');const ref=db.collection('coins').doc(uid);await db.runTransaction(async tx=>{const s=await tx.get(ref);const c=s.exists?s.data():{balance:0,totalEarned:0,transactions:[]};const txs=Array.isArray(c.transactions)?c.transactions:[];if(txs.some(t=>t&&t.id===id))return;txs.push({id,amount,reason,timestamp:new Date().toISOString()});tx.set(ref,{balance:(c.balance||0)+amount,totalEarned:(c.totalEarned||0)+amount,transactions:txs.slice(-180)},{merge:true});});}
  return {init,load,save,creditCoins,get ready(){return ready;}};
})();

function loadLocal(){try{const s=JSON.parse(localStorage.getItem(STORE));if(s&&s.v===VERSION&&Number.isInteger(s.screenIndex))return Object.assign(defaultProgress(),s);}catch(e){}return defaultProgress();}
function save(){try{localStorage.setItem(STORE,JSON.stringify(P));}catch(e){}renderHud();if(Account.ready){clearTimeout(save._t);save._t=setTimeout(()=>Account.save(P),650);}}
function progressScore(s){if(!s||s.v!==VERSION)return -1;return (s.screenIndex||0)*1000+(s.introDone||[]).length*80+Object.keys(s.recallMatches||{}).length*20+Object.keys(s.recallGenerated||{}).length*40+Object.keys(s.recallFinished||{}).length*80+(s.factoryDone?120:0)+(s.completedPracticeCards||[]).length*120+Object.keys(s.summaryAnswers||{}).length*20+(s.wallSkills||[]).length*10+(s.doneAt?500:0);}
function tool(type){return TOOLS.find(t=>t.type===type);}
function setToolVar(n,type){n.style.setProperty('--c',tool(type).color);}
function typeLabel(type){return tool(type).label;}
function addCoins(id,amount){if(P.coinEvents[id])return;P.coinEvents[id]=amount;P.coins+=amount;save();burst();}
async function awardMainCoinsOnce(){if(P.coinsAwarded[MAIN_COIN_TX])return 'already';try{await Account.creditCoins(MAIN_COIN_TX,MAIN_COIN_AMOUNT,'S3-W01 工具地圖探索主線完成');P.coinsAwarded[MAIN_COIN_TX]=true;P.syncPending=false;save();return 'synced';}catch(e){P.syncPending=true;save();return 'pending';}}
function updateWrong(key,type){P.wrongAttempts[key]=(P.wrongAttempts[key]||0)+1;if(type)P.wrongAttempts['type:'+type]=(P.wrongAttempts['type:'+type]||0)+1;save();return P.wrongAttempts[key];}
function lockWrong(key,opt){P.lockedWrongOptions[key]=P.lockedWrongOptions[key]||[];if(!P.lockedWrongOptions[key].includes(opt))P.lockedWrongOptions[key].push(opt);save();}
function isLocked(key,opt){return (P.lockedWrongOptions[key]||[]).includes(opt);}
function penaltyLeft(key){const until=P.penalties?.[key]||0;return Math.max(0,Math.ceil((until-Date.now())/1000));}
function isPenaltyActive(key){return penaltyLeft(key)>0;}
function applyPenalty(key,type){
  const n=updateWrong(key,type);
  const seconds=clamp(2+n,3,8);
  P.penalties=P.penalties||{};
  P.penalties[key]=Date.now()+seconds*1000;
  save();
  clearTimeout(applyPenalty._t);
  applyPenalty._t=setTimeout(render,seconds*1000+80);
  return {n,seconds};
}
function penaltyNotice(key){
  const left=penaltyLeft(key);
  if(!left)return null;
  const n=el('div','penalty-bar');
  n.dataset.penaltyKey=key;
  n.append(el('span',null,'剛剛答錯，先停一下再試。'),el('b',null,left+' 秒'));
  return n;
}
function validateTool(card,selected){return card.type===selected;}
function validatePrompt(card,st){
  const missingSlots=card.slots.filter(slot=>st.slots?.[slot.key]!==slot.answer).map(slot=>slot.name);
  const prompt=normalize(st.prompt||composePrompt(card,st));
  const missingWords=card.checkWords.filter(w=>!prompt.includes(normalize(w)));
  const vague=/^(幫我做|做一個|好看一點|隨便|aaaa|1234)+$/i.test(prompt);
  return {pass:missingSlots.length===0&&missingWords.length===0&&!vague,missingSlots,missingWords,vague};
}
function blockPasteAndDrop(input){['paste','drop'].forEach(evt=>input.addEventListener(evt,e=>{e.preventDefault();toast('用卡造句。');}));}
function unique(list){return Array.from(new Set(list));}
function stableHash(text){
  let h=2166136261;
  for(let i=0;i<text.length;i++){
    h^=text.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}
function stableShuffle(key,list,idFn=x=>String(x)){
  const arr=[...list];
  const original=arr.map(idFn).join('|');
  arr.sort((a,b)=>stableHash(key+'|'+idFn(a))-stableHash(key+'|'+idFn(b)));
  if(arr.length>1&&arr.map(idFn).join('|')===original)arr.push(arr.shift());
  return arr;
}
function resultNoun(type){return ({text:'文字',image:'圖片',video:'影片',music:'音樂'}[type]||'內容');}
function resultReady(card,st){
  if(!st.result)return false;
  if(st.result.skipped)return true;
  if(card.type==='text')return !!st.result.text;
  if(card.type==='image')return !!st.result.imageUrl;
  if(card.type==='video')return !!st.result.videoUrl;
  if(card.type==='music')return !!st.result.audioUrl;
  return false;
}

async function postJson(endpoint,payload){
  const response=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data=await response.json().catch(()=>({error:'生成服務回傳格式錯誤'}));
  if(!response.ok)throw new Error(data.error||data.message||'生成失敗');
  return data;
}

async function callGenerationApi(card,st){
  const data=tool(card.type);
  if(card.type==='text'){
    const result=await postJson(data.endpoint,{task:taskText(card),prompt:promptText(card,st)});
    const text=String(result.message||result.text||'').trim();
    if(!text)throw new Error('文字生成沒有回傳內容');
    return {success:true,kind:'text',text};
  }
  if(card.type==='image'){
    const result=await postJson(data.endpoint,{task:taskText(card),prompt:promptText(card,st)});
    if(!result.imageUrl)throw new Error('圖片生成沒有回傳圖片');
    return {success:true,kind:'image',imageUrl:result.imageUrl};
  }
  if(card.type==='video'){
    const result=await postJson(data.endpoint,{task:taskText(card),prompt:promptText(card,st),duration:card.duration||5});
    const videoUrl=(Array.isArray(result.videoUrls)&&result.videoUrls[0])||result.videoUrl;
    if(!videoUrl)throw new Error(result.message||'影片仍在處理中，請稍後再試');
    const videoUrls=Array.isArray(result.videoUrls)&&result.videoUrls.length?result.videoUrls:[videoUrl];
    return {success:true,kind:'video',videoUrl,videoUrls,segmentCount:result.segmentCount||videoUrls.length};
  }
  if(card.type==='music'){
    const result=await postJson(data.endpoint,{task:taskText(card),prompt:promptText(card,st),durationMs:card.durationMs});
    const audioUrl=result.audioUrl||(result.audio?'data:audio/mpeg;base64,'+result.audio:null);
    if(!audioUrl)throw new Error('音樂生成沒有回傳音檔');
    return {success:true,kind:'music',audioUrl};
  }
  throw new Error('不支援的工具類型');
}
function makeSentenceFromSlots(slots,state){return slots.map(slot=>state?.[slot.key]||'____').join('，');}
function renderPhraseButton(phrase,label,cfg,state,paused,extraClass=''){
  const used=Object.values(state).includes(phrase);
  const card=el('button','phrase-card'+(extraClass?' '+extraClass:'')+(pickedPhrase===phrase?' selected':'')+(used?' used':''),label||phrase);
  card.type='button';
  card.dataset.phrase=phrase;
  card.dataset.sentenceId=cfg.idPrefix||'';
  card.disabled=cfg.disabled||paused||used;
  card.draggable=!card.disabled;
  if(cfg.type)setToolVar(card,cfg.type);else card.style.setProperty('--c',cfg.color||'#7C3AED');
  card.addEventListener('dragstart',e=>{if(card.disabled)return;e.dataTransfer.setData('text/plain',phrase);pickedPhrase=phrase;refreshPhraseSelection();});
  card.addEventListener('dragend',()=>{pickedPhrase=null;refreshPhraseSelection();});
  card.addEventListener('click',()=>{if(card.disabled)return;pickedPhrase=pickedPhrase===phrase?null:phrase;refreshPhraseSelection();});
  return card;
}
function refreshPhraseSelection(){
  $$('.phrase-card').forEach(card=>{
    const selected=!!pickedPhrase&&card.dataset.phrase===pickedPhrase&&!card.disabled&&!card.classList.contains('used');
    card.classList.toggle('selected',selected);
  });
}
function refreshSentenceBuilderDom(cfg){
  const id=String(cfg.idPrefix||'');
  const state=cfg.state||{};
  const paused=isPenaltyActive(cfg.penaltyKey||cfg.idPrefix+':sentence');
  $$('.sentence-board').filter(board=>board.dataset.sentenceId===id).forEach(board=>{
    $$('.sentence-slot',board).forEach(box=>{
      const slot=cfg.slots.find(item=>item.key===box.dataset.slotKey);
      if(!slot)return;
      const filled=!!state[slot.key];
      box.classList.toggle('filled',filled);
      const value=$('span',box);
      if(value)value.textContent=filled?state[slot.key]:(box.dataset.emptyLabel||'____');
    });
    $$('.phrase-card',board).forEach(card=>{
      const used=Object.values(state).includes(card.dataset.phrase);
      card.classList.toggle('used',used);
      card.classList.toggle('selected',!!pickedPhrase&&card.dataset.phrase===pickedPhrase&&!used&&!card.disabled);
      card.disabled=!!cfg.disabled||paused||used;
      card.draggable=!card.disabled;
    });
    const preview=$('[data-prompt-preview]',board);
    if(preview)preview.textContent=(cfg.previewLabel||'提示詞：')+makeSentenceFromSlots(cfg.slots,state);
  });
  if(cfg.onLiveUpdate)cfg.onLiveUpdate();
}

function renderSentenceBuilder(cfg){
  const state=cfg.state||{};
  const penaltyKey=cfg.penaltyKey||cfg.idPrefix+':sentence';
  const paused=isPenaltyActive(penaltyKey);
  const board=el('div','sentence-board');
  board.dataset.sentenceId=cfg.idPrefix||'';

  const bank=el('div','phrase-bank');
  const phrases=stableShuffle(cfg.idPrefix+':phrases',unique(cfg.phrases||cfg.slots.flatMap(slot=>slot.options||[slot.answer])));
  if(!cfg.taskCard?.inlineTokens)phrases.forEach(phrase=>bank.append(renderPhraseButton(phrase,phrase,cfg,state,paused)));
  if(cfg.taskCard){
    bank.classList.add('inside-task');
    const taskCard=el('div','task-source-card'+(cfg.taskCard.floating?' floating':''));
    taskCard.append(el('h3',null,cfg.taskCard.title||'任務卡'));
    const art=renderTaskIllustration(cfg.taskCard.imageScene);if(art)taskCard.append(art);
    const taskTextBox=el('div','task-source-text');
    if(cfg.taskCard.inlineTokens)appendTaskTextWithTokens(taskTextBox,cfg,phrases,state,paused);
    else taskTextBox.textContent=cfg.taskCard.text||'';
    taskCard.append(taskTextBox);
    taskCard.append(el('div','review',cfg.taskCard.hint||'請從任務敘述中拖出亮起來的重點詞。'));

    board.append(taskCard);
  }else{
    board.append(el('div','review',cfg.instruction||'拖詞到三格。'),bank);
  }
  const slots=el('div','sentence-slots');
  cfg.slots.forEach(slot=>{
    const value=state[slot.key]||'放這裡';
    const box=el('div','sentence-slot'+(state[slot.key]?' filled':''));if(cfg.type)setToolVar(box,cfg.type);else box.style.setProperty('--c',cfg.color||'#7C3AED');
    box.dataset.slotKey=slot.key;
    box.dataset.emptyLabel=value;
    box.append(el('b',null,slot.name),el('span',null,value));
    const locked=P.lockedWrongOptions[cfg.idPrefix+':'+slot.key]||[];
    if(locked.length)box.append(el('div','lock-note','已鎖定：'+locked.join('、')));
    const accept=phrase=>dropPhraseToSlot(cfg,slot,phrase);
    box.addEventListener('dragover',e=>{if(cfg.disabled||paused)return;e.preventDefault();box.classList.add('over');});
    box.addEventListener('dragleave',()=>box.classList.remove('over'));
    box.addEventListener('drop',e=>{e.preventDefault();box.classList.remove('over');accept(e.dataTransfer.getData('text/plain')||pickedPhrase);});
    box.addEventListener('click',()=>{if(!paused&&pickedPhrase)accept(pickedPhrase);});
    slots.append(box);
  });
  board.append(slots);
  const line=el('div','prompt-preview',(cfg.previewLabel||'句子：')+makeSentenceFromSlots(cfg.slots,state));line.dataset.promptPreview='true';board.append(line);
  return board;
}
function dropPhraseToSlot(cfg,slot,phrase){
  if(cfg.disabled||!phrase)return;
  const penaltyKey=cfg.penaltyKey||cfg.idPrefix+':sentence';
  if(isPenaltyActive(penaltyKey))return;
  const key=cfg.idPrefix+':'+slot.key;
  if(isLocked(key,phrase)){toast('已鎖定。');return;}
  let quietUpdate=false;
  if(phrase===slot.answer){
    cfg.state[slot.key]=phrase;
    pickedPhrase=null;
    if(cfg.onChange)cfg.onChange();
    quietUpdate=!!cfg.liveUpdate;
    toast('對。');
  }else{
    lockWrong(key,phrase);
    const p=applyPenalty(penaltyKey,cfg.type);
    pickedPhrase=null;
    if(cfg.onWrong)cfg.onWrong(slot,phrase);
    toast('錯，鎖 '+p.seconds+' 秒。');
  }
  save();
  if(quietUpdate){
    refreshSentenceBuilderDom(cfg);
    schedulePenaltyRender();
  }else{
    render();
  }
}

function renderIntroGeneration(step,state){
  state.slots=state.slots||{};
  const box=el('div','grid');
  box.append(renderSentenceBuilder({
    idPrefix:'intro:'+step.id,
    slots:step.slots,
    phrases:step.phrases,
    state:state.slots,
    type:step.type,
    disabled:resultReady(step,state)||state.loading,
    previewLabel:'提示詞句：',
    taskCard:{title:'試用卡',text:step.trialTask,hint:'拖詞，生成。'},
    onChange:()=>{state.prompt=composePrompt(step,state);state.reviewed=false;state.error=null;state.reviewText=null;}
  }));
  state.prompt=composePrompt(step,state);
  const slotsDone=step.slots.every(slot=>state.slots?.[slot.key]===slot.answer);
  const review=el('div','review',state.error||state.reviewText||'三格都要填。');
  if(state.reviewed)review.classList.add('good');
  if(state.error)review.classList.add('bad');
  box.append(review);
  const row=el('div','chip-row');
  const pKey='intro:'+step.id+':review';
  const check=el('button','btn warn','審查');
  check.disabled=state.reviewed||resultReady(step,state)||state.loading||isPenaltyActive(pKey);
  check.addEventListener('click',()=>{
    const r=validatePrompt(step,state);
    if(r.pass){
      state.reviewed=true;
      state.error=null;
      state.reviewText='可生成。';
      toast('審查通過。');
    }else{
      state.reviewed=false;
      const parts=[];
      if(r.missingSlots.length)parts.push('缺：'+r.missingSlots.join('、'));
      if(r.missingWords.length)parts.push('漏：'+r.missingWords.join('、'));
      if(r.vague)parts.push('太空');
      state.error=parts.join('。');
      const p=applyPenalty(pKey,step.type);
      toast('未通過，鎖 '+p.seconds+' 秒。');
    }
    save();render();
  });
  const reviewPenalty=penaltyNotice(pKey);if(reviewPenalty)box.append(reviewPenalty);
  const gen=el('button','btn good','生成'+resultNoun(step.type));
  gen.disabled=!state.reviewed||resultReady(step,state)||state.loading;
  gen.addEventListener('click',()=>generateResult(step,state));
  const skip=el('button','softbtn','跳過生成');
  skip.textContent='跳過生成';
  skip.disabled=(!state.reviewed&&!slotsDone)||resultReady(step,state)||state.loading;
  skip.addEventListener('click',()=>{
    if(!state.reviewed){
      const r=validatePrompt(step,state);
      if(!r.pass){
        state.reviewed=false;
        state.error='請先把任務卡的三個重點放到句子裡。';
        save();render();
        return;
      }
      state.reviewed=true;
      state.error=null;
      state.reviewText='可生成。';
    }
    skipGeneration(step,state);
  });
  row.append(check,gen,skip);
  box.append(row,renderPreview(step,state));
  return box;
}

function renderSortCard(step,state,card,disabled){
  const assigned=!!state.sort?.[card.id];
  const n=el('button','sort-card'+(pickedSortCard===card.id?' selected':'')+(assigned?' done':''),card.text);
  n.type='button';
  n.disabled=disabled||assigned;
  n.draggable=!n.disabled;
  n.addEventListener('dragstart',e=>{if(n.disabled)return;e.dataTransfer.setData('text/plain',card.id);pickedSortCard=card.id;});
  n.addEventListener('dragend',()=>{pickedSortCard=null;});
  n.addEventListener('click',()=>{if(n.disabled)return;pickedSortCard=pickedSortCard===card.id?null:card.id;render();});
  return n;
}
function handleIntroSortDrop(step,state,cardId,zone){
  const penaltyKey='intro-sort:'+step.id;
  if(isPenaltyActive(penaltyKey)||!cardId)return;
  const card=step.sortCards.find(c=>c.id===cardId);
  if(!card||state.sort?.[card.id])return;
  const correctZone=card.fit?'fit':'miss';
  const lockKey='intro-sort:'+step.id+':'+card.id;
  if(isLocked(lockKey,zone)){toast('這張工作卡在此欄已鎖定。');return;}
  if(zone===correctZone){
    state.sort[card.id]=zone;
    pickedSortCard=null;
    toast('分類正確。');
  }else{
    lockWrong(lockKey,zone);
    const p=applyPenalty(penaltyKey,step.type);
    pickedSortCard=null;
    toast('放錯，鎖 '+p.seconds+' 秒。');
  }
  save();
  render();
}

  if(eyebrow.includes('Screen 2'))return ['拿任務詞造句',['找出重點','放進句子','完成提示詞']];
  if(eyebrow.includes('Screen 3'))return ['處理正式任務',['讀任務卡','選工具','生成結果']];

function introReviewButton(step,state,reviewNode,nextButton){
  const pKey='intro:'+step.id+':review';
  const check=el('button','btn warn','審查關鍵字');
  check.disabled=state.reviewed||state.loading||isPenaltyActive(pKey);
  check.addEventListener('click',()=>{
    state.prompt=composePrompt(step,state);
    const r=validatePrompt(step,state);
    if(r.pass){
      state.reviewed=true;
      state.error=null;
      state.reviewText='關鍵字放對了，可以前往生成頁。';
      toast('審查通過。');
    }else{
      state.reviewed=false;
      const parts=[];
      if(r.missingSlots.length)parts.push('缺：'+r.missingSlots.join('、'));
      if(r.missingWords.length)parts.push('漏：'+r.missingWords.join('、'));
      if(r.vague)parts.push('太空');
      state.error=parts.join('。')||'請把任務卡重點放到正確位置。';
      const p=applyPenalty(pKey,step.type);
      toast('未通過，鎖 '+p.seconds+' 秒。');
    }
    if(reviewNode){
      reviewNode.classList.toggle('good',!!state.reviewed);
      reviewNode.classList.toggle('bad',!!state.error);
      reviewNode.textContent=state.error||state.reviewText||'把三個重點放進正確格子。';
    }
    if(nextButton)nextButton.disabled=!state.reviewed;
    save();render();
  });
  return check;
}

function handleRecallTokenDrop(card,token,slot){
  if(!token||!card.tokens.some(t=>t.text===token))return;
  const collected=recallCollected(card);
  if(collected.includes(token))return;
  if(Number.isInteger(slot)&&slot>=0&&slot<card.tokens.length&&!collected[slot])collected[slot]=token;
  else{
    const empty=Array.from({length:card.tokens.length}).findIndex((_,i)=>!collected[i]);
    if(empty>=0)collected[empty]=token;
  }
  pickedRecallToken=null;
  save();
  render();
}

function composePrompt(card,st){return card.promptTemplate.replace(/\{(\w+)\}/g,(m,k)=>st.slots?.[k]||'____');}
async function generateResult(card,st){
  st.loading=true;st.error=null;save();render();
  try{
    const result=await callGenerationApi(card,st);
    st.result=result;st.loading=false;st.error=null;save();burst();render();
  }catch(e){st.loading=false;const localHint=location.protocol==='file:'?'需上線，可跳過。':'';st.error=((e&&e.message)||'生成失敗')+(localHint?' '+localHint:'');save();render();toast(st.error);}
}
function skippedTextResult(card,st){
  const task=taskText(card)+' '+promptText(card,st);
  if(task.includes('森林規則')){
    return '森林規則提醒：\n1. 先看地圖，再走進森林。\n2. 看到路牌要停下來讀一讀。\n3. 不確定方向時，回到入口重新確認。';
  }
  return '整理後的提醒：\n1. 先看清楚任務。\n2. 找出最重要的三個重點。\n3. 把結果交給需要的人。';
}
function skippedResult(card,st){
  const result={success:true,kind:card.type,skipped:true,message:'已跳過生成，使用本機示範結果。'};
  if(card.type==='text')result.text=skippedTextResult(card,st);
  return result;
}
function skipGeneration(card,st){
  st.loading=false;
  st.error=null;
  st.result=skippedResult(card,st);
  save();burst();render();
}
function renderPreview(card,st){
  const p=el('div','preview'+(st.result?' on':''));setToolVar(p,card.type);
  if(st.loading){p.append(el('div','spinner'),el('div',null,'正在生成內容，請稍候。'));return p;}
  if(!st.result){p.textContent=st.error?'生成失敗後可以修正提示詞句再試一次。':'生成結果會出現在這裡。';return p;}
  if(st.result.skipped){
    p.append(el('div','review good',st.result.message||'已跳過生成。'));
    if(card.type==='text'&&st.result.text){
      const r=el('div','text-result');
      String(st.result.text).split('\n').filter(Boolean).forEach(line=>r.append(el('div',null,line)));
      p.append(r);
    }else{
      p.append(el('div','lead','本機示範：已建立 '+resultNoun(card.type)+' 成果。'));
    }
    return p;
  }
  if(card.type==='text'){const r=el('div','text-result');String(st.result.text||'已生成文字').split('\n').filter(Boolean).forEach(line=>r.append(el('div',null,line)));p.append(r);}
  else if(card.type==='image'&&st.result.imageUrl){const img=el('img');img.src=st.result.imageUrl;img.alt='Lab Image 生成圖片';p.append(img);}
  else if(card.type==='video'&&st.result.videoUrl){const v=el('video');v.src=st.result.videoUrl;v.controls=true;v.playsInline=true;p.append(v);}
  else if(card.type==='music'&&st.result.audioUrl){const a=el('audio');a.src=st.result.audioUrl;a.controls=true;p.append(a);}
  else{p.append(el('div',null,st.result.message||'已送出生成，結果仍在處理中。'));}
  p.append(el('div','lead','內容生成完成。'));
  return p;
}

function showRehearsalB(){
  if(P.rehearsalB)return gotoScreen(4);
  const node=modalBase('句子接龍 B');
  node.classList.add('flow-modal');
  node.append(el('p','lead','把阿工四步拖到正確順序，再按確認。'));
  const steps=[
    {id:'read',mark:'讀',title:'讀任務卡',desc:'先看任務想要什麼成果。',color:'#7C3AED'},
    {id:'tool',mark:'選',title:'選合適工具',desc:'依照要產生的內容選工具。',color:'#14B8A6'},
    {id:'prompt',mark:'抓',title:'抓重點造句',desc:'把任務卡裡的重要詞放進提示詞句。',color:'#2563EB'},
    {id:'make',mark:'生',title:'生成內容',desc:'確認結果出現後再前往下一步。',color:'#F59E0B'}
  ];
  const answer=steps.map(s=>s.id).join('|');
  let bankOrder=stableShuffle('rehearsal-b-sort-v1',steps,s=>s.id).map(s=>s.id);
  if(bankOrder.join('|')===answer){const first=bankOrder[0];bankOrder[0]=bankOrder[1];bankOrder[1]=first;}
  const placed=[null,null,null,null];
  let picked=null;
  const feedback=el('div','review','請把四張步驟卡拖到右邊四個位置。');
  const board=el('div','flow-sort-board');
  const bank=el('div','flow-sort-panel');
  const slotsPanel=el('div','flow-sort-panel');
  function stepById(id){return steps.find(s=>s.id===id);}
  function clearDragMarks(){$$('.flow-slot',board).forEach(slot=>slot.classList.remove('over'));}
  function sourceIndex(id){return placed.findIndex(x=>x===id);}
  function moveToSlot(id,slotIndex){
    if(!id||!stepById(id))return;
    const from=sourceIndex(id);
    const target=placed[slotIndex];
    if(from>=0)placed[from]=target||null;
    else if(target)placed[slotIndex]=null;
    placed[slotIndex]=id;
    picked=null;
    feedback.className='review';
    feedback.textContent='排好後按確認。';
    renderSort();
  }
  function makeStepCard(step){
    const c=el('button','flow-step-card flow-sort-card'+(picked===step.id?' selected':''));c.type='button';c.draggable=true;c.style.setProperty('--c',step.color);
    c.dataset.step=step.id;
    c.append(el('i',null,step.mark),el('b',null,step.title),el('small',null,step.desc));
    c.addEventListener('dragstart',e=>{picked=step.id;e.dataTransfer.setData('text/plain',step.id);e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',clearDragMarks);
    c.addEventListener('click',()=>{picked=picked===step.id?null:step.id;renderSort();});
    return c;
  }
  function renderSort(){
    board.innerHTML='';
    bank.innerHTML='';
    slotsPanel.innerHTML='';
    bank.append(el('h4',null,'待排序步驟'));
    const list=el('div','flow-card-list');
    bankOrder.filter(id=>!placed.includes(id)).forEach(id=>list.append(makeStepCard(stepById(id))));
    if(!list.children.length)list.append(el('div','flow-slot-empty','四張卡都放到右邊了。'));
    bank.append(list);
    slotsPanel.append(el('h4',null,'排序區'));
    const slots=el('div','flow-sort-slots');
    placed.forEach((id,idx)=>{
      const slot=el('div','flow-slot');slot.dataset.slot=String(idx);
      slot.append(el('div','flow-slot-label','第 '+(idx+1)+' 步'));
      const content=el('div');
      if(id)content.append(makeStepCard(stepById(id)));
      else content.append(el('div','flow-slot-empty',picked?'放到這裡':'拖曳到這裡'));
      slot.append(content);
      slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('over');});
      slot.addEventListener('dragleave',()=>slot.classList.remove('over'));
      slot.addEventListener('drop',e=>{e.preventDefault();clearDragMarks();moveToSlot(e.dataTransfer.getData('text/plain')||picked,idx);});
      slot.addEventListener('click',()=>{if(picked)moveToSlot(picked,idx);});
      slots.append(slot);
    });
    slotsPanel.append(slots);
    board.append(bank,slotsPanel);
  }
  renderSort();
  const b=el('button','btn good','確認排序，前往下一步');
  b.addEventListener('click',()=>{
    if(placed.join('|')!==answer){
      placed.fill(null);
      picked=null;
      feedback.className='review bad';
      feedback.textContent='回答錯誤！再來一次。';
      renderSort();
      return;
    }
    P.rehearsalB=true;addCoins('rehearsal-b-20',20);closeModal();gotoScreen(4);
  });
  node.append(feedback,board,b);openModal(node,true);
}

function examQuestions(part){return SUMMARY_QUESTIONS.filter(q=>q.part===part);}
function examPageKey(part){return part===4?'summaryPage4':'summaryPage5';}
function scheduleExamAdvance(part,pageKey,idx){
  clearTimeout(scheduleExamAdvance._t);
  const screenName=part===4?'summary':'wall';
  scheduleExamAdvance._t=setTimeout(()=>{
    if(SCREENS[P.screenIndex]!==screenName)return;
    if((P[pageKey]||0)!==idx)return;
    P[pageKey]=idx+1;
    save();
    render();
  },1000);
}
function renderExamTaskCard(q){
  const card=el('article','exam-card');
  const color=q.type&&tool(q.type)?.color?tool(q.type).color:'#7C3AED';
  card.style.setProperty('--c',color);
  card.append(el('h3',null,q.title));
  const art=renderTaskIllustration(q.scene);
  if(art)card.append(art);
  card.append(el('div','exam-task',q.task),el('div','exam-question',q.q));
  return card;
}
function renderExam(part){
  const list=examQuestions(part);
  const pageKey=examPageKey(part);
  P[pageKey]=clamp(P[pageKey]||0,0,list.length);
  const idx=P[pageKey];
  const isPart4=part===4;
  const s=screenShell(isPart4?'Screen 4｜工具抽考':'Screen 5｜提示詞抽考',isPart4?'看任務卡選工具':'看任務卡判斷提示詞流程',isPart4?'一頁只有一張任務卡，請判斷要用哪一種工具。':'一頁只有一張任務卡，請判斷提示詞或流程是否正確。');
  const shell=el('div','exam-shell');
  if(idx>=list.length){
    const score=list.filter(q=>P.summaryAnswers[q.id]===q.answer).length;
    if(!isPart4){
      P.summaryScore=SUMMARY_QUESTIONS.filter(q=>P.summaryAnswers[q.id]===q.answer).length;
      save();
    }
    const done=el('div','score');
    done.innerHTML='<b>'+score+'/'+list.length+'</b><div>'+(isPart4?'工具判斷抽考完成。':'提示詞抽考完成。')+'</div>';
    const next=el('button','btn good',isPart4?'前往提示詞抽考':'完成抽考');
    next.addEventListener('click',()=>{if(isPart4){addCoins('summary-30',30);gotoScreen(5);}else{addCoins('wall-30',30);gotoScreen(6);}});
    shell.append(done,next);
    s.append(shell);stage.append(s);return;
  }
  const q=list[idx];
  const lockKey='summary:'+q.id;
  const legacyAnswer=P.summaryAnswers[q.id];
  if(isPart4&&legacyAnswer&&legacyAnswer!==q.answer){
    P.lockedWrongOptions[lockKey]=P.lockedWrongOptions[lockKey]||[];
    if(!P.lockedWrongOptions[lockKey].includes(legacyAnswer))P.lockedWrongOptions[lockKey].push(legacyAnswer);
    delete P.summaryAnswers[q.id];
    save();
  }
  const answered=P.summaryAnswers[q.id];
  const lockedOptions=P.lockedWrongOptions[lockKey]||[];
  const paused=isPart4&&isPenaltyActive(lockKey);
  const progress=el('div','exam-progress');
  progress.append(el('span',null,'題目 '+(idx+1)+' / '+list.length),el('span',null,answered?'已作答':'請先作答'));
  const progressStatus=progress.lastElementChild;
  const examCard=renderExamTaskCard(q);
  shell.append(progress,examCard);
  const notice=isPart4?penaltyNotice(lockKey):null;
  if(notice)shell.append(notice);
  const options=el('div','exam-options');
  stableShuffle('summary-options-v12:'+q.id,q.options,opt=>opt).forEach(opt=>{
    const b=el('button','choice',opt);
    const locked=lockedOptions.includes(opt);
    if(answered&&opt===q.answer)b.classList.add('right');
    else if(locked||(answered&&answered!==q.answer&&opt===answered))b.classList.add('wrong');
    b.disabled=isPart4?(!!answered||locked||paused):!!answered;
    b.addEventListener('click',()=>{
      if(isPart4){
        if(isPenaltyActive(lockKey))return;
        if(P.summaryAnswers[q.id])return;
        if(opt===q.answer){
          P.summaryAnswers[q.id]=opt;
          save();
          b.classList.add('right');
          examCard.classList.add('correct');
          if(progressStatus)progressStatus.textContent=idx<list.length-1?'答對，準備下一題':'答對，準備完成';
          $$('.choice',options).forEach(btn=>btn.disabled=true);
          burst();
          scheduleExamAdvance(part,pageKey,idx);
        }else{
          lockWrong(lockKey,opt);
          const p=applyPenalty(lockKey,q.type);
          b.classList.add('wrong','shake');
          $$('.choice',options).forEach(btn=>btn.disabled=true);
          if(progressStatus)progressStatus.textContent='這個選項已鎖定，請再試一次';
          setTimeout(()=>b.classList.remove('shake'),300);
          render();
          toast('答錯，這個選項鎖定，請再試一次。');
        }
        return;
      }
      P.summaryAnswers[q.id]=opt;
      if(opt!==q.answer)updateWrong(lockKey,q.type);
      else burst();
      save();
      render();
    });
    options.append(b);
  });
  shell.append(options);
  if(answered){
    if(answered===q.answer){
      examCard.classList.add('correct');
      shell.append(el('div','review good','答對，1 秒後進入下一題。'));
      scheduleExamAdvance(part,pageKey,idx);
    }else{
    shell.append(el('div','review '+(answered===q.answer?'good':'bad'),answered===q.answer?'答對，這張任務卡判斷正確。':'正解：'+q.answer));
    const nav=el('div','exam-nav');
    nav.append(el('span','lead',idx<list.length-1?'按下一題繼續抽考。':'這是本段最後一題。'));
    const next=el('button','btn good',idx<list.length-1?'下一題':'看成績');
    next.addEventListener('click',()=>{P[pageKey]=idx+1;save();render();});
    nav.append(next);shell.append(nav);
    }
  }
  s.append(shell);stage.append(s);
}
function renderSummary(){renderExam(4);}
function summaryComplete(){return examQuestions(4).every(q=>P.summaryAnswers[q.id]);}

function renderWall(){renderExam(5);}
function handleWallDrop(taskLabel,type,target){
  if(!taskLabel)return;
  const task=WALL_TASKS.find(x=>x.label===taskLabel);
  if(!task||P.wallSkills.includes(task.label))return;
  const pKey='wall:'+task.label;
  if(isPenaltyActive(pKey))return;
  if(isLocked(pKey,type)){toast('這個錯誤工具已鎖定。');return;}
  if(task.type===type){
    P.wallSkills.push(task.label);
    pickedWallSkill=null;
    toast('工具配對正確。');
  }else{
    lockWrong(pKey,type);
    const p=applyPenalty(pKey,type);
    pickedWallSkill=null;
    if(target){target.classList.add('shake');setTimeout(()=>target.classList.remove('shake'),300);}
    toast('不適合，鎖 '+p.seconds+' 秒。');
  }
  save();render();
}

function collectGeneratedResults(){
  const items=[];
  INTRO_STEPS.forEach(step=>{
    const st=P.introAnswers?.[step.id];
    if(st&&resultReady(step,st))items.push({label:'試用 '+tool(step.type).label,card:step,st});
  });
  (P.practiceOrder||[]).forEach(id=>{
    const card=PRACTICE_CARDS.find(c=>c.id===id);
    const st=card?P.practiceState?.[id]:null;
    if(card&&st&&resultReady(card,st))items.push({label:'任務 '+id,card,st});
  });
  return items;
}
function renderCollageItem(item){
  const card=item.card,st=item.st;
  const tile=el('div','collage-item');setToolVar(tile,card.type);
  tile.append(el('b',null,item.label+'｜'+resultNoun(card.type)));
  const media=el('div','collage-media');setToolVar(media,card.type);
  const result=st.result||{};
  if(card.type==='text'){
    const lines=String(result.text||st.prompt||composePrompt(card,st)).split('\n').filter(Boolean).slice(0,3);
    const wrap=el('div','text-result');
    lines.forEach(line=>wrap.append(el('div',null,line)));
    media.append(wrap);
  }else if(card.type==='image'&&result.imageUrl){
    const img=el('img');img.src=result.imageUrl;img.alt='生成圖片成果';media.append(img);
  }else if(card.type==='video'&&result.videoUrl){
    const v=el('video');v.src=result.videoUrl;v.muted=true;v.loop=true;v.autoplay=true;v.playsInline=true;media.append(v);
  }else if(card.type==='music'&&result.audioUrl){
    media.append(el('div','collage-wave'),el('span',null,'音樂已生成'));
  }else if(card.type==='music'){
    media.append(el('div','collage-wave'),el('span',null,result.skipped?'本機跳過生成':'音樂成果'));
  }else{
    const poster=el('div','collage-poster');setToolVar(poster,card.type);
    media.append(poster,el('span',null,result.skipped?'本機跳過生成':resultNoun(card.type)+'成果'));
  }
  tile.append(media);
  return tile;
}
function renderDone(){
  const s=screenShell('Screen 6｜完成','阿工任務完成','請告訴老師你已完成，也可以主動幫同學檢查四步驟。');
  if(!P.doneAt){P.doneAt=new Date().toISOString();save();awardMainCoinsOnce().then(status=>{toast(status==='synced'?'250 金幣已同步。':'完成，待同步。');render();});}
  const items=collectGeneratedResults();
  const collage=el('div','result-collage');
  if(items.length)items.forEach(item=>collage.append(renderCollageItem(item)));
  else collage.append(el('div','collage-item','還沒有成果紀錄'));
  const detail=el('div','panel pad grid done-badge-panel');
  detail.innerHTML='<h3>阿工徽章</h3>';
  const facts=el('ul');facts.className='grid';
  ['工具全亮','任務 '+P.completedPracticeCards.length+' / 4','審查 '+P.promptReviewPasses+' 次',P.coinsAwarded[MAIN_COIN_TX]?'金幣已領':(P.syncPending?'待同步':'同步中')].forEach(x=>facts.append(el('li','review good',x)));
  detail.append(facts,el('div','review good','請跟老師說你已完成，接著可以提醒同學：先讀任務卡，再選工具，最後抓重點生成內容。'));
  const wrap=el('div','done-grid');wrap.append(collage,detail);
  s.append(wrap);stage.append(s);
}

function modalBase(title){const n=el('div','modal-card');n.append(el('h3',null,title));return n;}
function openModal(content,locked=false){modal.innerHTML='';modal.dataset.locked=locked?'1':'0';modal.append(content);modal.classList.add('on');}
function closeModal(){modal.classList.remove('on');modal.innerHTML='';modal.dataset.locked='0';}
function startAutoDemo(type){const t=tool(type);const node=modalBase('阿工提示');setToolVar(node,type);node.append(el('p','lead',t.label+' 看：'+t.slots.join('、')));node.append(el('div','review','問自己：做什麼？用在哪？細節？'));const ok=el('button','btn tool','我知道了');setToolVar(ok,type);ok.addEventListener('click',closeModal);node.append(ok);P.teacher.lastAssist=t.label;openModal(node);}
function showTeacherPanel(){const node=modalBase('老師面板');const grid=el('div','teacher-grid');[['所在頁面',SCREEN_LABELS[SCREENS[P.screenIndex]]],['完成任務卡',P.completedPracticeCards.length+' / 4'],['提示詞句通過',String(P.promptReviewPasses)],['總複習分數',P.summaryScore==null?'未作答':P.summaryScore+' / '+SUMMARY_QUESTIONS.length],['舉手',P.teacher.handRaised?'已按下':'尚未'],['小老師',P.teacher.peerTutor?'已按下':'尚未']].forEach(m=>{const box=el('div','metric');box.innerHTML='<span>'+m[0]+'</span><b>'+m[1]+'</b>';grid.append(box);});node.append(grid);node.append(el('div','review','錯誤類型：'+TOOLS.map(t=>t.label+' '+(P.wrongAttempts['type:'+t.type]||0)).join('　')));const row=el('div','chip-row');const verify=el('button','softbtn','標記已驗收');verify.addEventListener('click',()=>{P.teacher.verified=true;save();toast('老師驗收已記錄。');showTeacherPanel();});const assign=el('button','softbtn','派任小老師');assign.addEventListener('click',()=>{P.teacher.assignedTutor=true;save();toast('已標記派任小老師。');showTeacherPanel();});const close=el('button','btn primary','關閉');close.addEventListener('click',closeModal);row.append(verify,assign,close);node.append(row);openModal(node);}
function showHelp(){const screen=SCREENS[P.screenIndex];if(screen==='taskB'){const c=nextPracticeCard();if(c)return startAutoDemo(c.type);}const node=modalBase('阿工提示');node.append(el('div','review','請先讀任務卡，判斷要產生哪一種內容，再選工具並抓出重點詞。'));const ok=el('button','btn primary','回去試試看');ok.addEventListener('click',closeModal);node.append(ok);openModal(node);}
function burst(){const cols=['#7c3aed','#14b8a6','#2563eb','#f59e0b','#f7c948'];for(let i=0;i<36;i++){const c=el('div','confetti');c.style.left=Math.random()*100+'%';c.style.background=cols[i%cols.length];c.style.transform='rotate('+Math.random()*360+'deg)';document.body.append(c);const d=900+Math.random()*1000;c.animate([{top:'-20px',opacity:1},{top:'110vh',opacity:.7}],{duration:d,easing:'cubic-bezier(.3,.7,.5,1)'});setTimeout(()=>c.remove(),d);}}

document.addEventListener('click',e=>{const b=e.target.closest('.btn');if(!b||b.disabled)return;const r=b.getBoundingClientRect();const s=el('span','ripple');const size=Math.max(r.width,r.height);s.style.width=s.style.height=size+'px';s.style.left=(e.clientX-r.left-size/2)+'px';s.style.top=(e.clientY-r.top-size/2)+'px';b.append(s);setTimeout(()=>s.remove(),560);});
$('#teacherBtn').addEventListener('click',showTeacherPanel);
$('#helpBtn').addEventListener('click',showHelp);
$('#resetBtn').addEventListener('click',()=>{const node=modalBase('重新開始？');node.append(el('p','lead','這會清除本機 S3-W01 進度。'));const row=el('div','chip-row');const yes=el('button','btn warn','清除並重來');yes.addEventListener('click',()=>{P=defaultProgress();localStorage.setItem(STORE,JSON.stringify(P));closeModal();render();});const no=el('button','softbtn','取消');no.addEventListener('click',closeModal);row.append(yes,no);node.append(row);openModal(node);});
modal.addEventListener('click',e=>{if(e.target===modal&&modal.dataset.locked!=='1')closeModal();});

Account.init();
Account.load().then(remote=>{if(progressScore(remote)>progressScore(P)){P=Object.assign(defaultProgress(),remote);save();}render();});
render();

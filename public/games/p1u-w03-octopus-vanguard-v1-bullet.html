const Sfx=(function(){ let ac=null,on=true;
  function A(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } return ac; }
  function tone(f,d,t,v){ if(!on)return; const a=A(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),s=a.currentTime; o.type=t||'sine'; o.frequency.setValueAtTime(f,s); g.gain.setValueAtTime(v||0.05,s); g.gain.exponentialRampToValueAtTime(0.0001,s+d); o.connect(g).connect(a.destination); o.start(s); o.stop(s+d); }
  return { hit(n){tone(720+(clamp(n||0,0,12))*45,0.12,'sine',0.06);}, ding(){tone(920,0.12,'sine',0.06);},

    bad(){tone(180,0.16,'sawtooth',0.05);}, block(){tone(300,0.14,'square',0.05); setTimeout(()=>tone(520,0.1,'sine',0.04),60);},

})();

const Account=(function(){ let uid=null,uname='',db=null,ready=false;

let parts=[],ripples=[],pops=[],sh={mag:0,until:0};
const MAX_PARTS=280, MAX_RIPPLES=44;
function burst(x,y,col,n){ n=n||16; for(let i=0;i<n && parts.length<MAX_PARTS;i++){ const a=Math.random()*7,s=1.5+Math.random()*4; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col}); } }
function confetti(){ for(let i=0;i<110 && parts.length<MAX_PARTS;i++){ parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*2,vy:2+Math.random()*4,life:1.7,col:['#ff5d6c','#ffce47','#2bd17e','#5bc0ff','#ff7ab0'][i%5],fall:true}); } }
function ripple(x,y,col){ if(ripples.length>=MAX_RIPPLES) return; ripples.push({x,y,r:6,col:col||'#8fd0ff',t:1}); }
function popText(x,y,txt,col,sc){ pops.push({x,y,txt,col:col||'#fff',t:0,vy:-0.85,sc:sc||1}); }
function shake(m,ms){ sh.mag=m; sh.until=now()+ms; }
function shakeOffset(){ if(now()>=sh.until) return [0,0]; const d=Math.min(1,(sh.until-now())/160); return [(Math.random()-0.5)*sh.mag*d,(Math.random()-0.5)*sh.mag*d]; }
function updateFx(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.fall?0.03:0.06; p.life-=p.fall?0.006:0.02; if(p.life<=0||p.y>H+30) parts.splice(i,1); }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.r+=3.2; r.t-=0.04; if(r.t<=0) ripples.splice(i,1); }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.t+=0.045; p.y+=p.vy; p.vy*=0.96; if(p.t>=1) pops.splice(i,1); } }
function drawFx(){ parts.forEach(p=>{ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; if(p.fall){ ctx.fillRect(p.x,p.y,6,9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); } }); ctx.globalAlpha=1;
  ripples.forEach(r=>{ ctx.globalAlpha=clamp(r.t,0,1)*0.6; ctx.strokeStyle=r.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }); ctx.globalAlpha=1;
  pops.forEach(p=>{ ctx.save(); ctx.globalAlpha=clamp(1-p.t,0,1); const bp=1+0.4*(1-Math.min(1,p.t*4)); const fs=Math.round(24*p.sc*bp); ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(2,10,20,.55)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); ctx.restore(); }); ctx.globalAlpha=1; }
function gHeart(x,y,r,filled){ ctx.save(); ctx.beginPath(); ctx.moveTo(x,y+r*0.85); ctx.bezierCurveTo(x-r*1.3,y-r*0.15,x-r*0.55,y-r*1.15,x,y-r*0.35); ctx.bezierCurveTo(x+r*0.55,y-r*1.15,x+r*1.3,y-r*0.15,x,y+r*0.85); ctx.closePath(); if(filled){ ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=6; ctx.fillStyle='#ff5d6c'; ctx.fill(); } else { ctx.strokeStyle='#5a6b7a'; ctx.lineWidth=2.5; ctx.stroke(); } ctx.restore(); }
const GEMS=[{col:'#ff5d6c',hi:'#ffd0d5'},{col:'#ffa63c',hi:'#ffe3b0'},{col:'#7cff9e',hi:'#d6ffe2'},{col:'#5bc0ff',hi:'#cdeeff'},{col:'#c48ae8',hi:'#eddaf7'}];
function gGemIcon(x,y,r,safe,idx){ const gm=GEMS[idx%5]; ctx.save(); ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.72,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r*0.72,y); ctx.closePath();
  ctx.shadowColor=gm.col; ctx.shadowBlur=safe?10:3; ctx.globalAlpha=safe?1:0.5; ctx.fillStyle=gm.col; ctx.fill(); ctx.shadowBlur=0;
  ctx.globalAlpha=0.7; ctx.fillStyle=gm.hi; ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.36,y-r*0.22); ctx.lineTo(x,y+r*0.05); ctx.closePath(); ctx.fill(); ctx.restore(); }
function gCoin(x,y,r){ ctx.save(); ctx.shadowColor='#ffd75e'; ctx.shadowBlur=7; ctx.fillStyle='#ffce47'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#c8912a'; ctx.lineWidth=Math.max(1.5,r*0.16); ctx.stroke(); ctx.fillStyle='#c8912a'; ctx.font='900 '+Math.round(r*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',x,y+1); ctx.restore(); ctx.textBaseline='alphabetic'; }
const TOTAL_COINS=300;
let coinDisp=-1, coinSeen=0, coinPop=null;

  coinDisp+=(S.coins-coinDisp)*0.14; if(Math.abs(S.coins-coinDisp)<0.5) coinDisp=S.coins;
  const val=Math.round(coinDisp), fs=Math.min(16,W*0.034), cr=fs*0.74, x=12, y=10, gap=7, padL=12, padR=13;
  ctx.save(); ctx.font='800 '+fs+'px "Noto Sans TC",sans-serif'; const txt=val+' / '+TOTAL_COINS, tw=ctx.measureText(txt).width, w=padL+cr*2+gap+tw+padR, h=fs*2.0;
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; rr(x,y,w,h,h/2); ctx.fillStyle='rgba(4,18,32,.9)'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,206,71,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  const coinX=x+padL+cr, coinY=y+h/2; gCoin(coinX,coinY,cr);
  ctx.fillStyle='#ffe27a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt, coinX+cr+gap, coinY+1); ctx.restore(); ctx.textBaseline='alphabetic';
  if(coinPop){ const k=(now()-coinPop.t0)/1200; if(k>=1) coinPop=null; else { ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle='#ffe27a'; ctx.font='900 '+Math.min(20,W*0.044)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('+'+coinPop.amt, x+w+10, y+h/2-k*26); ctx.restore(); ctx.textBaseline='alphabetic'; } } }

/* ---------- жіЁйҹіжёІжҹ“пјҲеҸ°зҒЈиӘІжң¬жЁЈејҸпјҡжіЁйҹізӣҙжҺ’еңЁжјўеӯ—еҸіеҒҙпјү ---------- */

/* ---------- ијёе…ҘеұӨпјҲPointer + wheel + еҸійҚөвҶ’menuпјӣе·ҰйҚөе–®/йӣҷ/й•·жҢү/holdпјү ---------- */

/* ---------- WASD иө°дҪҚпјҲе·ҰжүӢпјүпјӢ и§ёжҺ§ж–№еҗ‘йҲ• ---------- */
const keys={up:0,down:0,left:0,right:0};
window.addEventListener('keydown',e=>{ if(S.phase!=='wave'&&S.phase!=='tut')return; const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')keys.up=1; else if(k==='s'||k==='arrowdown')keys.down=1; else if(k==='a'||k==='arrowleft')keys.left=1; else if(k==='d'||k==='arrowright')keys.right=1; else return; e.preventDefault(); });
window.addEventListener('keyup',e=>{ const k=e.key.toLowerCase(); if(k==='w'||k==='arrowup')keys.up=0; else if(k==='s'||k==='arrowdown')keys.down=0; else if(k==='a'||k==='arrowleft')keys.left=0; else if(k==='d'||k==='arrowright')keys.right=0; });
window.addEventListener('blur',()=>{ keys.up=keys.down=keys.left=keys.right=0; });
// и§ёжҺ§ж–№еҗ‘йҲ•пјҲе·ҰдёӢи§’еҚҒеӯ—пјүпјҡз„ЎйҚөзӣӨиЈңе„ҹ
let dpadActive=false;
function dpadGeo(){ const r=Math.min(W,H)*0.11, cx=r*1.5, cy=H-r*1.5; return {cx,cy,r}; }
function dpadHit(x,y,isDown){ if(!TOUCH) return false; const g=dpadGeo(); if(!isDown){ if(dpadActive){/*keep*/} return false; }
  if(dist(x,y,g.cx,g.cy)<=g.r*2.1){ dpadActive=true; keys.up=keys.down=keys.left=keys.right=0; const dx=x-g.cx, dy=y-g.cy; if(Math.abs(dx)>g.r*0.3) (dx<0?keys.left=1:keys.right=1); if(Math.abs(dy)>g.r*0.3) (dy<0?keys.up=1:keys.down=1); return true; }
  return false; }
function dpadRelease(){ if(dpadActive){ dpadActive=false; keys.up=keys.down=keys.left=keys.right=0; return true; } return false; }
function drawDpad(){ if(!TOUCH) return; const g=dpadGeo(); ctx.save(); ctx.globalAlpha=0.5; ctx.fillStyle='rgba(4,18,32,.6)'; ctx.beginPath(); ctx.arc(g.cx,g.cy,g.r*1.6,0,7); ctx.fill();
  ctx.fillStyle='#8fd0ff'; const a=g.r*0.55; [[0,-1],[0,1],[-1,0],[1,0]].forEach(d=>{ const ax=g.cx+d[0]*g.r*0.95, ay=g.cy+d[1]*g.r*0.95; ctx.save(); ctx.translate(ax,ay); ctx.rotate(Math.atan2(d[1],d[0])+Math.PI/2); ctx.beginPath(); ctx.moveTo(0,-a*0.5); ctx.lineTo(a*0.42,a*0.4); ctx.lineTo(-a*0.42,a*0.4); ctx.closePath(); ctx.fill(); ctx.restore(); });
  ctx.globalAlpha=0.8; ctx.font='700 '+Math.round(g.r*0.42)+'px "Noto Sans TC",sans-serif'; ctx.fillStyle='#cfe8ff'; ctx.textAlign='center'; ctx.fillText('иө°дҪҚ',g.cx,g.cy+g.r*1.95); ctx.restore(); }

function fireRing(cx,cy,n,gap,speedF){ const spd=(speedF||st.cfg.speed)*mwh(); const off=Math.random()*7, gc=Math.PI*1.5, gh=(gap||0)/2;
  for(let i=0;i<n;i++){ const a=off+i*(Math.PI*2/n); let da=Math.abs(((a-gc+Math.PI)%(Math.PI*2))-Math.PI); if(gh&&da<gh) continue; spawnBullet(cx,cy,Math.cos(a)*spd,Math.sin(a)*spd, 'orb'); } Sfx.tone(420,0.05,'triangle',0.02); }

    spawnBullet(A.x+A.w*t, A.y-8, 0, spd, 'orb');            // дёҠвҶ’дёӢ

    spawnBullet(A.x+A.w+8, A.y+A.h*t, -spd, 0, 'ink'); }      // еҸівҶ’е·Ұ
  Sfx.tone(360,0.05,'square',0.02); }

function updateBullets(hurtOn){ const A=arena(), d=st.diver, m=A.x-40, M=A.x+A.w+40, ty=A.y-40, by=A.y+A.h+40;
  for(let i=st.bullets.length-1;i>=0;i--){ const b=st.bullets[i]; b.x+=b.vx; b.y+=b.vy;
    if(b.x<m||b.x>M||b.y<ty||b.y>by){ st.bullets.splice(i,1); continue; }

/* ---------- ејұй»һпјҲжү“ж“Ҡй»һпјҡеӨ§йҮҸеҮәзҸҫпјҢж»‘йј й»һжҺүйҖ жҲҗеӮ·е®іпјү ---------- */
const SPOT_COL={click:'#5bc0ff', right:'#ff8a3c', dbl:'#3f8bff', gold:'#ffe27a'};
function spawnSpot(){ const B=st.boss, A=arena(); const kinds=st.cfg.spotKinds||['click']; let k=pick(kinds), gold=false; if(k==='gold'){ gold=true; k='click'; }
  const a=Math.random()*7, rr2=B.sz*(0.14+Math.random()*0.30), pad=Math.min(34,B.sz*0.14);
  let x=clamp(B.x+Math.cos(a)*rr2, A.x+pad, A.x+A.w-pad);
  let y=clamp(B.y+Math.sin(a)*rr2*0.9, A.y+pad, A.y+A.h*0.66); // йҒҝй–ӢдёӢж–№иө°дҪҚеҚҖ
  st.spots.push({x,y, r:clamp(B.sz*0.10,20,30), kind:k, gold, born:now(), life:st.cfg.spotLife||2500}); }
function updateSpots(){ for(let i=st.spots.length-1;i>=0;i--){ if(now()-st.spots[i].born>st.spots[i].life) st.spots.splice(i,1); } }
function hitTestSpot(x,y){ for(let i=st.spots.length-1;i>=0;i--){ const s=st.spots[i]; if(dist(x,y,s.x,s.y)<=s.r+14) return s; } return null; }
function spotActionOf(e){ if(e.t==='dbl') return 'dbl'; if(e.t==='menu'||(e.t==='down'&&e.btn===2)) return 'right'; if(e.t==='down'&&e.btn===0) return 'click'; return null; }
function tryHitSpot(e){ const a=spotActionOf(e); if(!a) return; const s=hitTestSpot(e.x,e.y); if(!s) return;
  const ok=(s.kind===a)||(s.kind==='click'&&a==='dbl')||(TOUCH&&a==='click'); // йҖЈй»һе…©дёӢеҸҜжү“дёҖиҲ¬й»һпјӣи§ёжҺ§дёҖеҫӢй»һж“Ҡ
  if(ok){ popSpot(s); return; }
  if(s.kind==='dbl'&&a==='click') popText(s.x,s.y-s.r-8,'еҶҚй»һдёҖдёӢпјҒ','#9fd0ff',0.9);
  else if(s.kind==='right'){ popText(s.x,s.y-s.r-8,'иҰҒжҢүеҸійҚөпјҒ','#ffb27a',0.9); Sfx.tick(); }
  else { popText(s.x,s.y-s.r-8,'иҰҒжҢүе·ҰйҚөпјҒ','#9fd0ff',0.9); Sfx.tick(); } }
function popSpot(s){ const i=st.spots.indexOf(s); if(i>=0) st.spots.splice(i,1);

  else { Sfx.hit(st.combo); popText(s.x,s.y-40,'е‘ҪдёӯпјҒ','#fff'); } }
function drawSpots(){ for(const s of st.spots){ const age=(now()-s.born)/s.life, p=pulse(); const col=s.gold?'#ffe27a':(SPOT_COL[s.kind]||'#ff8a3c'); ctx.save();

    // и©Із”Ёе“ӘеҖӢж»‘йј ж“ҚдҪңпјҲж”ҫеӨ§пјӢж–Үеӯ—жЁҷзұӨпјҢжё…жҘҡеҘҪиҫЁиӯҳпјү

/* ---------- зҺ©е®¶пјҲжҪӣж°ҙе“Ўпјӣе°Ҹе‘ҪдёӯжЎҶд»Ҙдә®еҝғйЎҜзӨәпјү ---------- */

        drawRuby(st.ta?P('е·Із•¶е°ҸиҖҒеё«','г„§ЛҮ г„үг„Ө г„’г„§г„ ЛҮ г„Ңг„ ЛҮ г„•'):P('жҲ‘жҳҜе°ҸиҖҒеё«','г„Ёг„ӣЛҮ г„•ЛӢ г„’г„§г„ ЛҮ г„Ңг„ ЛҮ г„•'), t.x+t.w/2, t.y+t.h/2, Math.min(21,W*0.038), '#eafff2');
        const r=raiseBtn(); ctx.save(); rr(r.x,r.y,r.w,r.h,r.h/2); ctx.fillStyle=st.raised?'#7a5a1a':'#b8871f'; ctx.fill(); ctx.strokeStyle='#ffe27a'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
        drawRuby(st.raised?P('е·ІиҲүжүӢ','г„§ЛҮ г„җг„©ЛҮ г„•г„ЎЛҮ'):P('иҲүжүӢе‘ҠиЁҙиҖҒеё«','г„җг„©ЛҮ г„•г„ЎЛҮ г„Қг„ ЛӢ г„ҷг„ЁЛӢ г„Ңг„ ЛҮ г„•'), r.x+r.w/2, r.y+r.h/2, Math.min(20,W*0.036), '#fff6e0');
        const hb=homeBtn(); ctx.save(); rr(hb.x,hb.y,hb.w,hb.h,hb.h/2); ctx.fillStyle='rgba(4,18,32,.8)'; ctx.fill(); ctx.strokeStyle='#5a7893'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
        drawRuby(P('еӣһе°Ғйқў','г„Ҹг„Ёг„ҹЛҠ г„Ҳг„Ҙ г„Үг„§г„ўЛӢ'), hb.x+hb.w/2, hb.y+hb.h/2, Math.min(20,W*0.036), '#9fc4e0'); }
      drawRuby(P('жӣҙеӨ§зҡ„з« йӯҡзҺӢйӮ„еңЁеҫҢйқўвҖҰвҖҰ','г„Қг„ҘЛӢ г„үг„ҡЛӢ г„үг„ңЛҷ г„“г„Ө г„©ЛҠ г„Ёг„ӨЛҠ г„Ҹг„һЛҠ г„—г„һЛӢ г„Ҹг„ЎЛӢ г„Үг„§г„ўЛӢ'), cx, H*0.94, Math.min(16,W*0.03), '#cfa8e0'); }
    drawFx(); } };

/* ================= дё»иҝҙеңҲ ================= */
const DISPATCH={ cover:ST_COVER, story:ST_STORY, quiz:ST_QUIZ, tut:ST_TUT, wave:ST_WAVE, deliver:ST_DELIVER };
let bootT=0;
// жүҖжңүең–йғҪжңүеҗ‘йҮҸ fallbackпјҢдёҚйңҖзӯүзҙ жқҗијүе…Ҙ вҶ’ зӣҙжҺҘй–Ӣи·‘пјҢйҒҝе…Қијүе…Ҙй–ҳй–ҖеҚЎдҪҸ
function frame1(){
  const evs=evQ; evQ=[];
  const cur=DISPATCH[S.phase]||ST_COVER;
  const so=shakeOffset(); ctx.save(); ctx.translate(so[0],so[1]);
  try{ cur.update(evs); }catch(e){ console.error('update',e); }
  // update еҸҜиғҪеҲҮжҸӣ phaseпјҲдёҰйҮҚзҪ® stпјүвҶ’ йҮҚж–°еҸ–з•¶еүҚ phase зҡ„ drawпјҢйҒҝе…ҚиҲҠ draw и®ҖеҲ°ж–° st
  const cur2=DISPATCH[S.phase]||ST_COVER;
  try{ cur2.draw(); }catch(e){ console.error('draw',e); }
  updateFx();
  if(S.phase==='wave') drawCoinHUD();
  ctx.restore(); }
function frame(){ frame1(); requestAnimationFrame(frame); }

function boot(){ bootT=now();
  const local=loadLocal(); if(local) S=local;
  renderAcct(); window.addEventListener('online',renderAcct); window.addEventListener('offline',renderAcct);
  goPhase('cover'); // дёҖеҫӢеҫһе°ҒйқўйҖІпјҲйҒёйӣЈеәҰ вҶ’ зңӢеҠҮжғ… вҶ’ й—ңеҚЎпјүпјҢдёҚзӣҙжҺҘи·іеӣһеӯҳжӘ”зҡ„зӣёдҪҚпјҢеҗҰеүҮжңғз•ҘйҒҺеҠҮжғ…
  requestAnimationFrame(frame); // з«ӢеҲ»е•ҹеӢ•дё»иҝҙеңҲпјҢдёҚиў«йӣІз«Ҝијүе…ҘеҚЎдҪҸ
  // иғҢжҷҜијүе…ҘйӣІз«ҜйҖІеәҰпјҡијғйҒ иҖ…жүҚиҰҶи“ӢпјӣеҸӘеҗғйҖІеәҰж•ёеӯ—пјҢдёҚеӢ•зҺ©е®¶з•¶дёӢжүҖеңЁзҡ„зӣёдҪҚ
  (async()=>{ try{ const cloud=await Account.load(); if(cloud && (cloud.waveMax||0)>(S.waveMax||0)){ const ph=S.phase; S=cloud; S.phase=DISPATCH[ph]?ph:'cover'; } }catch(e){} })(); }
boot();

/* ---------- жё¬и©ҰжҺҘеҸЈпјҲе…ҚжҲӘең–й©—иӯүпјү ---------- */
window.W3={ S:()=>S, st:()=>st, phase:(p,x)=>goPhase(p,x), wave:(n)=>goPhase('wave',n),
  key:(k,v)=>{keys[k]=v?1:0;}, ev:(e)=>evQ.push(e), frame:()=>frame1(), setWH:(w,h)=>{ W=w; H=h; },
  mode:()=>st.mode, ti:()=>st.ti, hp:()=>st.hp, php:()=>st.php, bomb:()=>st.bomb, combo:()=>st.combo,
  diver:()=>st.diver, boss:()=>st.boss, bullets:()=>st.bullets, spots:()=>st.spots, special:()=>st.special,
  startFight:()=>startFight(), tutPass:()=>tutPass(),
  spawnSpot:()=>spawnSpot(), hitSpot:(e)=>{ const s=st.spots[0]; if(s){ if(e) tryHitSpot(e); else popSpot(s); } return !!s; },
  emit:()=>emitPattern(), fireAimed:(n,sp)=>fireAimed(st.boss.x,st.boss.y+st.boss.sz*0.28,n||3,sp||0.5,st.cfg.speed),
  startSpecial:()=>startSpecial(), special_:()=>st.special, bombNow:()=>{ st.bomb=100; fireBomb(); }, hurt:()=>hurtPlayer(),
  clearWave:()=>roundClear(), TOUCH };
</script>

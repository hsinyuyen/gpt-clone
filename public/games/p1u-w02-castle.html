/* =========================================================
   海底王城與章魚軍團：滑鼠英雄（P1U-W02）· 承 W01 王城入關
   單檔 canvas。控制沿用 W01 成品（全滑鼠，無鍵盤）：
   打=點右鍵 / 用力打=左鍵×2 / 擋=點左鍵 / 躲=按住拖 / 魔法=滾輪往前。
   劇情畫面（點/拖）→ 每畫面「剛剛發生什麼事?」漂浮泡泡理解題 →
   5 隻章魚節奏戰鬥（逐關升級 + 鐵甲 + 章魚王暴怒）→ 破關頒獎。
   全文注音、判定放大、失敗非致命、逾時放行、全程可跳關。
   ========================================================= */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize',resize); resize();
const now=()=>performance.now();
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
const pulse=()=>0.5+0.5*Math.sin(now()/350);
const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

/* ---------- 精靈圖（AI 生圖，透明自動裁切，未載入退回向量） ---------- */
const SPRITES={}; let ASSET_TOTAL=0, ASSET_DONE=0;
function loadSprite(key,src){ ASSET_TOTAL++; const im=new Image(); const o={im,ready:false,sx:0,sy:0,sw:0,sh:0};
  im.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=im.width; c.height=im.height; const g=c.getContext('2d'); g.drawImage(im,0,0);
      const d=g.getImageData(0,0,c.width,c.height).data; let minx=c.width,miny=c.height,maxx=0,maxy=0; const step=4;
      for(let y=0;y<c.height;y+=step){ for(let x=0;x<c.width;x+=step){ if(d[(y*c.width+x)*4+3]>200){ if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; } } }
      if(maxx>minx&&maxy>miny){ o.sx=minx;o.sy=miny;o.sw=maxx-minx;o.sh=maxy-miny; } else { o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; }
    }catch(e){ o.sx=0;o.sy=0;o.sw=im.width;o.sh=im.height; } o.ready=true; ASSET_DONE++; };
  im.onerror=()=>{ ASSET_DONE++; }; // 載入失敗也算完成，避免載入畫面卡住（drawSprite 會自動退回向量圖）
  im.src=src; SPRITES[key]=o; }
function assetsSettled(){ return ASSET_TOTAL>0 && ASSET_DONE>=ASSET_TOTAL; }
['diver','oct1','oct2','oct3','oct4','oct5','cover','gate','throne','path','maze','vault','seabed','win'].forEach(k=>loadSprite(k,'assets/w2-'+k+'.png'));

// 沿用 W01 共用素材：真實滑鼠教學圖 + POV 打擊動畫（同一款遊戲的不同章節，打擊/滑鼠設計比照 W01）

const mouseImg=new Image(); let mouseImgReady=false; ASSET_TOTAL++; mouseImg.onload=()=>{mouseImgReady=true; ASSET_DONE++;}; mouseImg.onerror=()=>{ASSET_DONE++;}; mouseImg.src='assets/mouse-big.png';
const MOUSE_HL_COL={left:'#3f8bff',right:'#ff8a3c',wheel:'#2bd17e'};
const MOUSE_SRC={sx:236,sy:106,sw:550,sh:776}; // AI 圖(1024²)中滑鼠本體實測範圍
function drawSprite(key,x,y,size,rot,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh; let w,h; if(ar>=1){ w=size; h=size/ar; } else { h=size; w=size*ar; }
  ctx.save(); if(alpha!==undefined) ctx.globalAlpha=alpha; ctx.translate(x,y); if(rot) ctx.rotate(rot); ctx.drawImage(s.im,s.sx,s.sy,s.sw,s.sh,-w/2,-h/2,w,h); ctx.restore(); return true; }
function drawCover(key,alpha){ const s=SPRITES[key]; if(!s||!s.ready) return false; const ar=s.sw/s.sh, war=W/H; let sw,sh,sx,sy;
  if(ar>war){ sh=s.sh; sw=s.sh*war; sx=s.sx+(s.sw-sw)/2; sy=s.sy; } else { sw=s.sw; sh=s.sw/war; sx=s.sx; sy=s.sy+(s.sh-sh)/2; }
  ctx.save(); ctx.globalAlpha=alpha===undefined?1:alpha; ctx.drawImage(s.im,sx,sy,sw,sh,0,0,W,H); ctx.restore(); return true; }

/* ---------- 音效 ---------- */
const Sfx=(function(){ let ac=null,on=true;
  function A(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } return ac; }
  function tone(f,d,t,v){ if(!on)return; const a=A(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),s=a.currentTime; o.type=t||'sine'; o.frequency.setValueAtTime(f,s); g.gain.setValueAtTime(v||0.05,s); g.gain.exponentialRampToValueAtTime(0.0001,s+d); o.connect(g).connect(a.destination); o.start(s); o.stop(s+d); }
  return { hit(n){tone(720+(n||0)*45,0.12,'sine',0.06);}, ding(){tone(920,0.12,'sine',0.06);}, pop(){tone(660,0.1,'triangle',0.05); setTimeout(()=>tone(990,0.12,'sine',0.05),70);},
    snap(){tone(1046,0.12,'sine',0.06);}, tick(){tone(320,0.045,'square',0.03);}, arrive(){tone(784,0.14,'sine',0.06); setTimeout(()=>tone(1046,0.2,'sine',0.06),120);},
    win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'square',0.05),i*90)); }, tone(f,d,t,v){tone(f,d,t,v);}, setOn(v){on=v;} };
})();

/* ---------- 粒子 / 回饋 ---------- */
let parts=[],ripples=[],pops=[],sh={mag:0,until:0};
function burst(x,y,col,n){ for(let i=0;i<(n||16);i++){ const a=Math.random()*7,s=1.5+Math.random()*4; parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col}); } }
function confetti(){ for(let i=0;i<180;i++){ parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*2,vy:2+Math.random()*4,life:1.7,col:['#ff5d6c','#ffce47','#2bd17e','#5bc0ff','#ff7ab0'][i%5],fall:true}); } }
function ripple(x,y,col){ ripples.push({x,y,r:6,col:col||'#8fd0ff',t:1}); }
function popText(x,y,txt,col,sc){ pops.push({x,y,txt,col:col||'#fff',t:0,vy:-0.85,sc:sc||1}); }
function shake(m,ms){ sh.mag=m; sh.until=now()+ms; }
function shakeOffset(){ if(now()>=sh.until) return [0,0]; const d=Math.min(1,(sh.until-now())/160); return [(Math.random()-0.5)*sh.mag*d,(Math.random()-0.5)*sh.mag*d]; }
function updateFx(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.fall?0.03:0.06; p.life-=p.fall?0.006:0.02; if(p.life<=0||p.y>H+30) parts.splice(i,1); }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.r+=3.2; r.t-=0.04; if(r.t<=0) ripples.splice(i,1); }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.t+=0.045; p.y+=p.vy; p.vy*=0.96; if(p.t>=1) pops.splice(i,1); } }
function drawFx(){ parts.forEach(p=>{ ctx.globalAlpha=clamp(p.life,0,1); ctx.fillStyle=p.col; if(p.fall){ ctx.fillRect(p.x,p.y,6,9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); } }); ctx.globalAlpha=1;
  ripples.forEach(r=>{ ctx.globalAlpha=clamp(r.t,0,1)*0.6; ctx.strokeStyle=r.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke(); }); ctx.globalAlpha=1;
  pops.forEach(p=>{ ctx.save(); ctx.globalAlpha=clamp(1-p.t,0,1); const bp=1+0.4*(1-Math.min(1,p.t*4)); const fs=Math.round(24*p.sc*bp); ctx.font='900 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(2,10,20,.55)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y); ctx.restore(); }); ctx.globalAlpha=1; }
function gHeart(x,y,r,filled){ ctx.save(); ctx.beginPath(); ctx.moveTo(x,y+r*0.85); ctx.bezierCurveTo(x-r*1.3,y-r*0.15,x-r*0.55,y-r*1.15,x,y-r*0.35); ctx.bezierCurveTo(x+r*0.55,y-r*1.15,x+r*1.3,y-r*0.15,x,y+r*0.85); ctx.closePath(); if(filled){ ctx.shadowColor='#ff5d6c'; ctx.shadowBlur=6; ctx.fillStyle='#ff5d6c'; ctx.fill(); } else { ctx.strokeStyle='#5a6b7a'; ctx.lineWidth=2.5; ctx.stroke(); } ctx.restore(); }
// 寶石（任務主線：搶回 5 顆王城寶石）— 每隻章魚掉不同顏色的寶石
const GEMS=[
 {col:'#ff5d6c', hi:'#ffd0d5', name:P('紅寶石','ㄏㄨㄥˊ ㄅㄠˇ ㄕˊ')},
 {col:'#ffa63c', hi:'#ffe3b0', name:P('橘寶石','ㄐㄩˊ ㄅㄠˇ ㄕˊ')},
 {col:'#7cff9e', hi:'#d6ffe2', name:P('綠寶石','ㄌㄩˋ ㄅㄠˇ ㄕˊ')},
 {col:'#5bc0ff', hi:'#cdeeff', name:P('藍寶石','ㄌㄢˊ ㄅㄠˇ ㄕˊ')},
 {col:'#c48ae8', hi:'#eddaf7', name:P('紫寶石','ㄗˇ ㄅㄠˇ ㄕˊ')},
];
function gGemIcon(x,y,r,filled,idx){ const gm=GEMS[idx!=null?idx:3]||GEMS[3]; ctx.save(); ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.72,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r*0.72,y); ctx.closePath();
  if(filled){ ctx.shadowColor=gm.col; ctx.shadowBlur=9; ctx.fillStyle=gm.col; ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=0.7; ctx.fillStyle=gm.hi; ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.36,y-r*0.22); ctx.lineTo(x,y+r*0.05); ctx.closePath(); ctx.fill(); }
  else { ctx.globalAlpha=0.42; ctx.strokeStyle=gm.col; ctx.lineWidth=2; ctx.stroke(); } ctx.restore(); }
function drawGemBar(cx,y,r,gap){ const g=S.octsDone||0, total=5, sx=cx-(total-1)/2*gap; for(let i=0;i<total;i++) gGemIcon(sx+i*gap,y,r,i<g,i); }
// 金幣圖示（畫的，不用 emoji 避免豆腐字）
function gCoin(x,y,r){ ctx.save(); ctx.shadowColor='#ffd75e'; ctx.shadowBlur=7; ctx.fillStyle='#ffce47'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#c8912a'; ctx.lineWidth=Math.max(1.5,r*0.16); ctx.stroke(); ctx.fillStyle='#c8912a'; ctx.font='900 '+Math.round(r*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',x,y+1); ctx.restore(); ctx.textBaseline='alphabetic'; }
// 金幣累積 HUD（左上角）：目前金幣 / 300，含跳動計數 + 得幣「+N」浮字
let coinDisp=-1, coinSeen=0, coinPop=null;
function drawCoinHUD(){ if(coinDisp<0){ coinDisp=S.coins; coinSeen=S.coins; }
  if(S.coins>coinSeen){ coinPop={amt:S.coins-coinSeen, t0:now()}; coinSeen=S.coins; }
  else if(S.coins<coinSeen-0.5){ coinSeen=S.coins; coinDisp=S.coins; coinPop=null; } // 重新開始
  coinDisp+=(S.coins-coinDisp)*0.14; if(Math.abs(S.coins-coinDisp)<0.5) coinDisp=S.coins;
  const val=Math.round(coinDisp), fs=Math.min(16,W*0.034), cr=fs*0.74, x=12, y=10, gap=7, padL=12, padR=13;
  ctx.save(); ctx.font='800 '+fs+'px "Noto Sans TC",sans-serif'; const txt=val+' / '+TOTAL_COINS, tw=ctx.measureText(txt).width, w=padL+cr*2+gap+tw+padR, h=fs*2.0;
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; rr(x,y,w,h,h/2); ctx.fillStyle='rgba(4,18,32,.9)'; ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,206,71,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  const coinX=x+padL+cr, coinY=y+h/2; gCoin(coinX,coinY,cr);
  ctx.fillStyle='#ffe27a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt, coinX+cr+gap, coinY+1); ctx.restore(); ctx.textBaseline='alphabetic';
  if(coinPop){ const k=(now()-coinPop.t0)/1200; if(k>=1) coinPop=null; else { ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle='#ffe27a'; ctx.font='900 '+Math.min(20,W*0.044)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('+'+coinPop.amt, x+w+10, y+h/2-k*26); ctx.restore(); ctx.textBaseline='alphabetic'; } } }

/* ---------- 海底背景 ---------- */
function seaBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0b3a5e'); g.addColorStop(1,'#041d33'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.06; ctx.fillStyle='#bfeaff'; for(let i=0;i<4;i++){ const bx=W*(0.15+i*0.24); ctx.beginPath(); ctx.moveTo(bx,0); ctx.lineTo(bx+60,0); ctx.lineTo(bx+160,H); ctx.lineTo(bx+40,H); ctx.closePath(); ctx.fill(); } ctx.globalAlpha=1;
  ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle='#bfeaff'; for(let i=0;i<12;i++){ const sp=18+(i%5)*7; const bx=((i*173)%Math.max(W,1))+Math.sin(now()/2600+i)*18; const byy=H-(((now()/sp)+i*149)%(H+60))+30; ctx.beginPath(); ctx.arc(bx,byy,3+(i%4)*2,0,7); ctx.fill(); } ctx.restore(); }

/* ---------- 注音渲染（小一：每個漢字上方標注音） ---------- */
// 只有中文字（CJK）才標注音；英文字母/數字/標點/空白一律不標（自動對齊，不用維護標點表）
function isCJK(ch){ const c=ch.codePointAt(0); return c>=0x4E00 && c<=0x9FFF; }
function P(han,zhu){ const toks=(zhu&&zhu.trim().length)?zhu.trim().split(/\s+/):[]; const out=[]; let zi=0;
  for(const ch of han){ if(isCJK(ch)) out.push({c:ch,z:toks[zi++]||''}); else out.push({c:ch,z:null}); } return out; }
// 注音放在漢字「右邊」直排（台灣課本樣式）；音調符號 ˊˇˋ˙ 水平置中（輕聲˙在上、其餘在下）
const TONES=new Set(['ˊ','ˇ','ˋ','˙','ˉ']);
function splitZhu(z){ if(!z) return {syms:[],tone:''}; const a=[...z]; let tone=''; if(a.length&&TONES.has(a[a.length-1])) tone=a.pop(); return {syms:a,tone}; }
function rubyMetrics(fs){ const zf=Math.max(8,Math.round(fs*0.46)); return { zf, zcol:zf, toneW:Math.round(zf*0.72), gap:Math.round(fs*0.10), cellGap:Math.round(fs*0.10), stepY:Math.round(zf*0.84) }; }
function rubyWidth(line,fs){ const m=rubyMetrics(fs); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; let total=0;
  for(const p of line){ const hw=ctx.measureText(p.c).width; total += hw + (p.z?(m.gap+m.zcol+m.toneW):0) + m.cellGap; } return total; }
function drawRuby(line,cx,cy,fs,col,align){ align=align||'center';
  let total=rubyWidth(line,fs); const maxW=W*0.94; if(total>maxW){ fs=Math.max(9,Math.floor(fs*maxW/total)); total=rubyWidth(line,fs); } // 過寬自動縮字
  const m=rubyMetrics(fs); let x=align==='center'?cx-total/2:(align==='left'?cx:cx-total);
  ctx.save(); ctx.textBaseline='middle'; ctx.fillStyle=col;
  for(const p of line){ ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; const hw=ctx.measureText(p.c).width;
    ctx.textAlign='left'; ctx.fillText(p.c, x, cy+fs*0.02);
    if(p.z){ const s=splitZhu(p.z); const zx=x+hw+m.gap+m.zcol/2; const n=s.syms.length; const blockH=n*m.stepY;
      let sy=cy-blockH/2+m.stepY/2; ctx.font='700 '+m.zf+'px sans-serif'; ctx.textAlign='center';
      for(const sym of s.syms){ const sw=ctx.measureText(sym).width; if(sw>m.zcol+0.5){ ctx.save(); ctx.translate(zx,sy); ctx.scale(m.zcol/sw,1); ctx.fillText(sym,0,0); ctx.restore(); } else ctx.fillText(sym,zx,sy); sy+=m.stepY; }
      if(s.tone){ if(s.tone==='˙'){ ctx.textAlign='center'; ctx.fillText('˙', zx, cy-blockH/2-m.stepY*0.5); } // 輕聲：注音上方置中
        else { ctx.textAlign='left'; ctx.fillText(s.tone, zx+m.zcol*0.5+1, cy); } } // ˊˇˋ：注音右側、垂直置中
      x += hw+m.gap+m.zcol+m.toneW; }
    else x += hw; // 非注音字（英文/空白/標點）也要前進自身寬度，否則會疊在一起
    x += m.cellGap; }
  ctx.restore(); return total; }

/* ---------- 滑鼠指令圖示（讓小一看圖就懂該按哪個鍵） ---------- */
function gArrowSm(x,y,dir,col){ ctx.save(); ctx.fillStyle=col||'#ffe27a'; ctx.beginPath(); if(dir<0){ ctx.moveTo(x,y-8); ctx.lineTo(x+8,y+5); ctx.lineTo(x-8,y+5); } else { ctx.moveTo(x,y+8); ctx.lineTo(x+8,y-5); ctx.lineTo(x-8,y-5); } ctx.closePath(); ctx.fill(); ctx.restore(); }
// 比照 W01：載到真實滑鼠圖就用真圖（裁到滑鼠緊緻範圍）+ 動態高亮該按的鍵；未載入退回向量
function drawMouseSprite(x,y,s){ const M=MOUSE_SRC; ctx.drawImage(mouseImg,M.sx,M.sy,M.sw,M.sh,x-s*0.7,y-s,s*1.4,s*2); }
function mouseBtn(x,y,s,hl){ if(hl==='right') return {x:x+s*0.336,y:y-s*0.462}; if(hl==='wheel') return {x:x,y:y-s*0.69}; return {x:x-s*0.336,y:y-s*0.462}; }
function gMouse(x,y,s,hl){
  if(mouseImgReady){ drawMouseSprite(x,y,s);
    if(hl){ const b=mouseBtn(x,y,s,hl), col=MOUSE_HL_COL[hl]||'#3f8bff', p=pulse(), r0=(hl==='wheel'?s*0.17:s*0.3);
      ctx.save(); ctx.globalAlpha=0.25+p*0.2; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(b.x,b.y,r0*0.7,0,7); ctx.fill();
      ctx.globalAlpha=0.55+p*0.4; ctx.strokeStyle=col; ctx.lineWidth=Math.max(3,s*0.12); ctx.shadowColor=col; ctx.shadowBlur=14; ctx.beginPath(); ctx.arc(b.x,b.y,r0+p*4,0,7); ctx.stroke(); ctx.restore(); }
    return; }
  ctx.save(); ctx.translate(x,y); rr(-s*0.7,-s,s*1.4,s*2,s*0.7); ctx.fillStyle='#e8f2fb'; ctx.fill(); ctx.strokeStyle='#7a93a8'; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.beginPath(); rr(-s*0.7,-s,s*0.68,s*0.9,s*0.6); ctx.clip(); ctx.fillStyle=hl==='left'?'#3f8bff':'#bcd7f2'; ctx.fillRect(-s*0.7,-s,s*0.7,s); ctx.restore();
  ctx.save(); ctx.beginPath(); rr(s*0.02,-s,s*0.68,s*0.9,s*0.6); ctx.clip(); ctx.fillStyle=hl==='right'?'#ff8a3c':'#f2ceb0'; ctx.fillRect(0,-s,s*0.7,s); ctx.restore();
  ctx.strokeStyle='#7a93a8'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,-s*0.1); ctx.stroke();
  ctx.fillStyle=hl==='wheel'?'#2bd17e':'#9fb6c8'; rr(-s*0.13,-s*0.82,s*0.26,s*0.5,s*0.13); ctx.fill();
  if(hl){ const p=pulse(); ctx.globalAlpha=0.5+p*0.4; const col=hl==='left'?'#3f8bff':hl==='right'?'#ff8a3c':'#2bd17e'; ctx.shadowColor=col; ctx.shadowBlur=18; ctx.strokeStyle=col; ctx.lineWidth=3; rr(-s*0.72,-s*1.02,s*1.44,s*2.04,s*0.72); ctx.stroke(); }
  ctx.restore(); }
function gCmd(kind,x,y,s){ ctx.save(); ctx.translate(x,y);
  if(kind==='click'){ gMouse(0,0,s*0.72,'left'); }
  else if(kind==='dbl'){ gMouse(0,s*0.06,s*0.72,'left'); ctx.fillStyle='#ffe27a'; ctx.font='900 '+(s*0.62)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('×2',s*0.8,-s*0.5); }
  else if(kind==='right'){ gMouse(0,0,s*0.72,'right'); }
  else if(kind==='scroll'){ gMouse(0,0,s*0.72,'wheel'); gArrowSm(s*0.95,-s*0.45,-1,'#2bd17e'); }
  else if(kind==='drag'){ gMouse(-s*0.45,s*0.05,s*0.6,'left'); ctx.strokeStyle='#ffe27a'; ctx.lineWidth=4; ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(-s*0.05,s*0.2); ctx.lineTo(s*0.85,-s*0.35); ctx.stroke(); ctx.setLineDash([]); gArrowSm(s*0.85,-s*0.35,-1,'#ffe27a'); }
  ctx.restore(); }

/* ---------- 輸入層（沿用 W01：Pointer + wheel + 右鍵→menu；左鍵單/雙/長按） ---------- */
const mouse={x:W/2,y:H/2,down:false,downBtn:0};
const TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0;
let evQ=[], lastLeft=null, singleTimer=null, longTimer=null;
const DBL_MS=450, DBL_DIST=120, LONG_MS=500;
function xy(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
cv.addEventListener('pointerdown',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=true; mouse.downBtn=e.button; try{cv.setPointerCapture(e.pointerId);}catch(_){}
  if(e.button===2){ evQ.push({t:'menu',x,y}); return; }
  evQ.push({t:'down',x,y,btn:e.button});
  if(e.button===0){ const tt=now();
    if(lastLeft && (tt-lastLeft.t)<=DBL_MS && dist(x,y,lastLeft.x,lastLeft.y)<=DBL_DIST){ evQ.push({t:'dbl',x,y}); lastLeft=null; if(singleTimer){clearTimeout(singleTimer);singleTimer=null;} }
    else { lastLeft={t:tt,x,y}; if(singleTimer)clearTimeout(singleTimer); const sx=x,sy=y; singleTimer=setTimeout(()=>{ evQ.push({t:'single',x:sx,y:sy}); singleTimer=null; lastLeft=null; }, DBL_MS+20); }
    if(TOUCH){ if(longTimer)clearTimeout(longTimer); const lx=x,ly=y; longTimer=setTimeout(()=>{ if(mouse.down) evQ.push({t:'menu',x:lx,y:ly}); longTimer=null; }, LONG_MS); }
  } });
cv.addEventListener('pointermove',e=>{ const {x,y}=xy(e); if(longTimer && dist(x,y,mouse.x,mouse.y)>10){ clearTimeout(longTimer); longTimer=null; } mouse.x=x; mouse.y=y; });
cv.addEventListener('pointerup',e=>{ const {x,y}=xy(e); mouse.x=x; mouse.y=y; mouse.down=false; evQ.push({t:'up',x,y}); if(longTimer){clearTimeout(longTimer);longTimer=null;} try{cv.releasePointerCapture(e.pointerId);}catch(_){} });
cv.addEventListener('pointercancel',()=>{ mouse.down=false; evQ.push({t:'cancel'}); if(longTimer){clearTimeout(longTimer);longTimer=null;} });
cv.addEventListener('wheel',e=>{ e.preventDefault(); let dy=e.deltaY; if(e.deltaMode===1) dy*=16; else if(e.deltaMode===2) dy*=(H||600); evQ.push({t:'wheel',dy}); },{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
function clearInput(){ evQ=[]; lastLeft=null; mouse.down=false; mouse.downBtn=0; if(singleTimer){clearTimeout(singleTimer);singleTimer=null;} if(longTimer){clearTimeout(longTimer);longTimer=null;} }

       var u=r?JSON.parse(r):null; return base+':'+((u&&u.id)||'anon'); }catch(e){ return base+':anon'; } })(), VERSION=3; // v3：進地圖前新增 WASD 教學關

function progressScore(s){ if(!s||s.v!==VERSION) return -1; const ord={cover:0,intro:0,scene:1,tut:2,find:2,battle:2,world:2,king:3,deliver:3,done:4}; return (ord[s.phase]||0)*100+(s.scenesDone||0)*10+(s.octsDone||0)*10+(s.done?50:0); }

function buildBeats(hp,cfg){ const dmg=[]; let left=hp;
  while(left>0){ let v='atk'; if(left>=2){ const r=Math.random(); let acc=0; if(cfg.dmgV.includes('heavy')&&r<(acc+=cfg.heavyW)) v='heavy'; else if(cfg.dmgV.includes('magic')&&r<(acc+=cfg.magicW)) v='magic'; } dmg.push(v); left-=DMG[v]; }
  if(cfg.armor){ if(!dmg.includes('heavy')) dmg[0]='heavy'; else { const i=dmg.indexOf('heavy'); dmg.splice(i,1); dmg.unshift('heavy'); } const rest=dmg.slice(1); shuffle(rest); dmg.length=1; dmg.push(...rest); }
  else shuffle(dmg);
  const beats=[]; dmg.forEach((v,i)=>{ beats.push(v); if(i<dmg.length-1 && Math.random()<cfg.defR) beats.push(pick(cfg.defV)); });
  cfg.defV.forEach((dv,k)=>{ if(!beats.includes(dv)) beats.splice(Math.min(1+k,beats.length),0,dv); });
  return beats; }

/* ---------- 泡泡理解題（3 顆漂浮泡泡；點錯鎖 2+N 秒並重置位置） ---------- */
function makeBubbles(quiz,question){ const opts=shuffle(quiz.opts.map((o,i)=>({o,i}))); const q={ question, opts, wrongN:0, lockUntil:0, lockIdx:-1, bubbles:[], done:false, msg:0 };
  layoutBubbles(q); return q; }
function layoutBubbles(q){ const n=q.opts.length; const R=Math.min(96, W*0.16, H*0.14); const yTop=H*0.42, yBot=H*0.82;
  q.bubbles=q.opts.map((o,i)=>{ const x=W*(0.5) + (i-(n-1)/2)*Math.min(W*0.30,260); return { x:clamp(x,R+10,W-R-10), y:clamp(yTop+Math.random()*(yBot-yTop),yTop,yBot), r:R, phase:Math.random()*7, ox:o.o, idx:o.i }; }); q.R=R; }
function updateBubbles(q,evs){ if(q.done) return;
  for(const b of q.bubbles){ b.y+=Math.sin(now()/900+b.phase)*0.25; b.x+=Math.cos(now()/1300+b.phase)*0.18; }
  const locked=now()<q.lockUntil;
  for(const e of evs){ if(e.t!=='down'||e.btn!==0) continue;
    let hit=-1; for(let i=0;i<q.bubbles.length;i++){ const b=q.bubbles[i]; if(dist(e.x,e.y,b.x,b.y)<=b.r+16){ hit=i; break; } }
    if(hit<0){ ripple(e.x,e.y); continue; }
    if(locked){ ripple(e.x,e.y,'#ff9b6b'); continue; }
    const b=q.bubbles[hit];
    if(b.ox.ok){ q.done=true; Sfx.win(); burst(b.x,b.y,'#7cff9e',24); ripple(b.x,b.y,'#7cff9e'); popText(b.x,b.y-20,'答對了！','#7cff9e',1.1); setTimeout(()=>{ if(st.q===q) q.finished=true; }, 700); }
    else { Sfx.pop(); q.wrongN++; q.lockUntil=now()+ (2000+ (q.wrongN-1)*1000); q.lockIdx=hit; shake(5,160); burst(b.x,b.y,'#ff8a3c',10); popText(b.x,b.y-20,'再想想～','#ff9b6b'); layoutBubbles(q); } // 重洗位置防硬A
  } }
function drawBubbles(q){ const remain=Math.max(0,Math.ceil((q.lockUntil-now())/1000)); const locked=remain>0;
  ctx.save(); ctx.fillStyle='rgba(3,17,31,.45)'; ctx.fillRect(0,H*0.30,W,H*0.62); ctx.restore();
  drawRuby(q.question,W/2,H*0.36,Math.min(30,W*0.062),'#eaf6ff');
  for(const b of q.bubbles){ const p=pulse();
    ctx.save(); ctx.shadowColor='#bfefff'; ctx.shadowBlur=14; const g=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,2,b.x,b.y,b.r); g.addColorStop(0,'rgba(230,250,255,.96)'); g.addColorStop(0.7,'rgba(120,195,255,.5)'); g.addColorStop(1,'rgba(90,160,255,.25)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); ctx.strokeStyle='rgba(220,245,255,.8)'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
    drawRuby(b.ox.t,b.x,b.y,Math.min(24,b.r*0.42),'#062a45'); }
  if(locked){ ctx.save(); ctx.fillStyle='#ffce47'; ctx.font='900 20px sans-serif'; ctx.textAlign='center'; ctx.fillText('等一下下… '+remain,W/2,H*0.90); ctx.restore(); } }

// 電流急急棒：點到折線最近點的距離 + 是第幾段
function nearestSeg(px,py,pts){ let best={d:1e9,seg:0,cx:pts[0].x,cy:pts[0].y};
  for(let i=0;i<pts.length-1;i++){ const a=pts[i],b=pts[i+1],dx=b.x-a.x,dy=b.y-a.y,L2=dx*dx+dy*dy||1; let t=((px-a.x)*dx+(py-a.y)*dy)/L2; t=clamp(t,0,1); const cx=a.x+dx*t,cy=a.y+dy*t,d=Math.hypot(px-cx,py-cy); if(d<best.d) best={d,seg:i,cx,cy}; }
  return best; }

const ST_SCENE={ update(evs){ const sc=SCENES[S.idx];

      for(const e of evs){ if(e.t!=='down'||e.btn!==0) continue;
        if(!hasNpc && Object.keys(st.seen).length>=total && st.narrateT && now()-st.narrateT>500){ startAct(); return; }
        let hit=-1; for(let i=0;i<sc.spots.length;i++){ const p=sceneSpotPos(sc.spots[i]); if(dist(e.x,e.y,p.x,p.y)<=p.r+30){ hit=i; break; } }
        if(hit<0){ ripple(e.x,e.y); continue; }
        st.seen[hit]=true; st.lookSay=sc.spots[hit].say; st.lookSayT=now(); Sfx.pop(); ripple(e.x,e.y,'#ffe27a');
        if(sc.spots[hit].npc && sc.talk.length){ startTalk(); return; } }
      if(!hasNpc && Object.keys(st.seen).length>=total && !st.narrateT) st.narrateT=now();
      if(now()-st.startT>22000) startAct();
      return; }

      if(st.replying){ let go=false; for(const e of evs){ if(e.t==='down'&&e.btn===0) go=true; }
        if(go || now()-st.replyT>2600){ if(st.replyOk){ st.talkStep++; if(st.talkStep>=sc.talk.length){ startAct(); return; } } st.replying=false; st.reply=null; }
        return; }
      const rects=talkOptRects(step.opts.length);
      for(const e of evs){ if(e.t!=='down'||e.btn!==0) continue; for(let i=0;i<step.opts.length;i++){ if(inR(e,rects[i])){ const o=step.opts[i]; st.reply=o.a; st.replyOk=o.ok; st.replying=true; st.replyT=now(); if(o.ok) Sfx.ding(); else Sfx.pop(); break; } } }
      return; }

    } else { // 電流急急棒：沿發光通道拖到終點；碰壁嗶一下、退回檢查點（非致命）

function initFind(){ st.spots=[]; const n=3; for(let i=0;i<n;i++){ st.spots.push({ x:W*(0.25+i*0.25)+(Math.random()*40-20), y:H*(0.5+ (i%2?0.12:-0.06)), r:Math.max(60,Math.min(W,H)*0.1), open:false }); }

  st.q=null; }

function bossBase(){ const cfg=OCTS[S.idx]; return {x:W/2,y:H*0.22, sz:clamp(Math.min(W*0.34,H*0.24)*cfg.sizeK,90,220)}; }
function spawnBeat(){ const cfg=OCTS[st.round];
  if(st.qi>=st.queue.length){ if(st.bossHP>0){ st.queue=st.queue.concat(buildBeats(st.bossHP,cfg)); } else { roundClear(); return; } }
  const v=st.queue[st.qi]; st.verb=v; st.actLocked=false; st.spawnAt=now(); st.lastAct=0; st.drag=null; st.proj=null;
  const bx=W/2, by=H*0.22;

  else if(v==='magic'){ st.limitMs=cfg.chargeMs; st.o={x:W/2,y:H*0.58,charge:0,goal:cfg.goal}; st.lastCk=0; }
  else { const side=Math.random()<0.5?-1:1; const sx=clamp(W/2+side*Math.min(W*0.32,250),95,W-95); st.o={x:W/2,y:H*0.64,hx:W/2,hy:H*0.64,sx,sy:H*0.64,safeR:82}; st.limitMs=Math.round(cfg.dodgeMs); st.proj={sx:bx,sy:by}; }
  st.ring={state:'shrink',t0:now(),r:cfg.startR,beat:false}; }
// 連段中的單一打擊圈：位置隨連段序號左右移動，做出節奏遊戲的連續打點感

  st.o={x:clamp(bx+jit*W*0.15+(Math.random()*2-1)*W*0.05,130,W-130), y:H*0.33};
  st.limitMs=Math.round(cfg.ringMs*(n>1?0.85:1)); // 連段圈稍快

    owDiver(st.tdiver.x, st.tdiver.y, st.tdiver);
    owDrawDpad();
    drawTopBanner(P('用 WASD 或方向鍵移動！','ㄩㄥˋ ㄏㄨㄛˋ ㄈㄤ ㄒㄧㄤˋ ㄐㄧㄢˋ ㄧˊ ㄉㄨㄥˋ'));
    if(st.tstep<st.tdots.length){ const dot=st.tdots[st.tstep]; drawRuby(P('按 '+dot.key+' 鍵，走到發光的點！','ㄢˋ ㄐㄧㄢˋ ㄗㄡˇ ㄉㄠˋ ㄈㄚ ㄍㄨㄤ ㄉㄜ˙ ㄉㄧㄢˇ'), W/2, H*0.13, Math.min(19,W*0.04), '#ffe27a'); } } };
function toWorld(){ if(!S.tutDone) goPhase('tut'); else goPhase('world'); }

/* ---------- 主迴圈 ---------- */
const DISPATCH={ cover:ST_COVER, intro:ST_INTRO, scene:ST_SCENE, find:ST_FIND, battle:ST_BATTLE, tut:ST_TUT, world:ST_WORLD, king:ST_KING, deliver:ST_DELIVER, done:ST_DONE };
function drawTopBar(){ const totalUnits=N_SCENE+N_OCT, doneU=S.scenesDone+S.octsDone, n=totalUnits, gap=Math.min(26,(W*0.72)/n), total=(n-1)*gap, y=13;
  ctx.save(); ctx.font='800 11px "Noto Sans TC",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  const label='進度 '+doneU+'/'+totalUnits, lw=ctx.measureText(label).width, groupW=total+12+lw, x0=W/2-groupW/2;
  for(let i=0;i<n;i++){ const x=x0+i*gap, isOct=i>=N_SCENE; ctx.save(); if(i<doneU){ ctx.shadowColor='#8fe0ff'; ctx.shadowBlur=7; ctx.fillStyle=isOct?'#ff8a3c':'#8fe0ff'; ctx.beginPath(); ctx.arc(x,y,5,0,7); ctx.fill(); } else { ctx.globalAlpha=0.4; ctx.strokeStyle='#6fa8c8'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,4.5,0,7); ctx.stroke(); } ctx.restore(); }
  ctx.fillStyle='rgba(190,225,255,.8)'; ctx.fillText(label,x0+total+12,y+1); ctx.restore(); } // 單列細條、貼齊頂端，不與說明文字重疊
function drawOverlay(){ if(!overlay) return true; const t=now(); if(t>=overlay.until){ const then=overlay.then; overlay=null; if(then) then(); return true; }
  seaBg(); ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle='#03111f'; ctx.fillRect(0,0,W,H); ctx.restore();
  if(overlay.gem!=null){ const gy=H*0.26, pp=pulse(); ctx.save(); const gr=ctx.createRadialGradient(W/2,gy,4,W/2,gy,74); gr.addColorStop(0,GEMS[overlay.gem].col); gr.addColorStop(1,'rgba(0,0,0,0)'); ctx.globalAlpha=0.45+pp*0.3; ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(W/2,gy,74,0,7); ctx.fill(); ctx.restore(); gGemIcon(W/2,gy,32+pp*3,true,overlay.gem); } // 打贏後：秀出獲得的那顆寶石
  if(Array.isArray(overlay.text)){ drawRuby(overlay.text,W/2,H*0.44,Math.min(28,W*0.06),'#eaf6ff'); }
  else { ctx.fillStyle='#eaf6ff'; ctx.font='900 '+Math.min(30,W*0.07)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(overlay.text||'',W/2,H*0.46); }
  if(overlay.sub){ if(Array.isArray(overlay.sub)){ drawRuby(overlay.sub,W/2,H*0.56,Math.min(19,W*0.042),'#bfe6ff'); } else { ctx.fillStyle='#bfe6ff'; ctx.font='700 '+Math.min(18,W*0.045)+'px "Noto Sans TC",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(overlay.sub,W/2,H*0.54); } }
  if(overlay.coin){ const cy=H*0.67, fs=Math.min(21,W*0.046), cr=fs*0.72; ctx.save(); ctx.font='900 '+fs+'px "Noto Sans TC",sans-serif'; const txt='+'+overlay.coin+' 金幣', tw=ctx.measureText(txt).width, totW=cr*2+9+tw, sx=W/2-totW/2; gCoin(sx+cr,cy,cr); ctx.fillStyle='#ffe27a'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(txt, sx+cr*2+9, cy+1); ctx.restore(); } ctx.textBaseline='alphabetic'; return false; }
let started=false, bootT=0;
function frame(){ const evs=evQ; evQ=[];
  if(!started){ if(assetsSettled()||now()-bootT>10000){ started=true; } else { drawLoading(); requestAnimationFrame(frame); return; } } // 圖片載完前只顯示載入畫面
  const inOverlay = overlay!==null;
  if(!inOverlay){ const h=DISPATCH[S.phase]; if(h&&h.update) h.update(evs); }
  const [ox,oy]=shakeOffset(); ctx.save(); ctx.translate(ox,oy);
  const cont=drawOverlay(); // 若 overlay 存在會畫過場並回 false
  if(cont){ const h=DISPATCH[S.phase]; if(h&&h.draw) h.draw(); if(S.phase!=='cover'&&S.phase!=='intro'&&S.phase!=='deliver'&&S.phase!=='done'&&S.phase!=='world'&&S.phase!=='tut'&&S.phase!=='king') drawTopBar();
    if(S.phase==='scene'||S.phase==='find'||S.phase==='battle'||S.phase==='world'||S.phase==='king') drawCoinHUD(); }
  updateFx(); drawFx(); ctx.restore();
  requestAnimationFrame(frame); }

/* ---------- 啟動 ---------- */
function boot(){ bootT=now(); initPhase(); renderAcct(); window.addEventListener('online',renderAcct); window.addEventListener('offline',renderAcct);
  (async()=>{ if(!Account.ready) return; const cloud=await Account.load(); if(cloud&&cloud.v===VERSION&&cloud.phase){ if(progressScore(cloud)>progressScore(S)){ S=cloud; save(); initPhase(); } else Account.save(S); } else Account.save(S); renderAcct(); })();
  requestAnimationFrame(frame); }
boot();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>阿問偵探社 · S2-W02：問對格式</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0b1a2e; --bg2:#081422; --panel:#14304f; --panel2:#0f2540; --ink:#eef5ff; --ink2:#c3d6ef; --dim:#93b0d4;
    --paper:#f5ecd6; --paper2:#efe3c6; --ink-dk:#2c2417; --ink-dk2:#5a4a30;
    --role:#b07dff; --bgc:#3fc6dd; --prob:#ff8fbb;      /* 亮化過的三要素色，深底上高對比 */
    --gold:#ffcf5c; --amber:#ff9f43; --good:#4fe08a; --bad:#94a6bd; --line:#28517d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    overflow:hidden;user-select:none;font-size:16px;line-height:1.5;}
  .serif{font-family:"Baskerville","Iowan Old Style","Songti TC","Noto Serif TC",Georgia,serif;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  /* 背景大圖 + 暗化，保證文字可讀 */
  #bg{position:fixed;inset:0;z-index:0;background:radial-gradient(1200px 700px at 50% 0%,#1a3a5e,var(--bg));}
  #bg .bgimg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;}
  #bg .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,18,34,.55),rgba(8,18,34,.82));}
  /* ---- 頂列 HUD ---- */
  #top{position:relative;z-index:5;display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(180deg,rgba(8,16,30,.92),rgba(8,16,30,.6));border-bottom:1px solid var(--line);backdrop-filter:blur(4px);}
  #top .brand{font-weight:900;font-size:18px;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
  #top .brand .lens{width:22px;height:22px;}
  .rankchip{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:#3a2c08;background:linear-gradient(180deg,#ffe08a,#f0b53c);border-radius:20px;padding:4px 11px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
  .spacer{flex:1;}
  .coinchip{display:flex;align-items:center;gap:6px;font-weight:900;color:var(--gold);font-size:16px;}
  .coinchip .c{width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff2b0,var(--gold));box-shadow:0 0 7px var(--gold);}
  .iconbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:rgba(20,48,79,.7);color:var(--ink);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
  .iconbtn:hover{border-color:var(--gold);} .iconbtn .dot{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;background:var(--amber);color:#2a1600;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .iconbtn.skip{font-size:16px;opacity:.62;border-style:dashed;} .iconbtn.skip:hover{opacity:1;}
  /* ---- 進度條 ---- */
  #prog{position:relative;z-index:5;display:flex;align-items:center;gap:10px;padding:8px 16px;background:rgba(8,16,30,.55);border-bottom:1px solid var(--line);}
  #prog .lbl{font-size:12.5px;font-weight:800;color:var(--ink2);white-space:nowrap;}
  #prog .bar{flex:1;height:12px;border-radius:7px;background:#0a1e34;border:1px solid var(--line);overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.5);}
  #prog .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--gold));transition:width .6s cubic-bezier(.3,1,.4,1);box-shadow:0 0 10px rgba(255,207,92,.6);}
  #prog .pips{display:flex;gap:5px;}
  #prog .pip{width:11px;height:11px;border-radius:50%;background:#0a1e34;border:1.5px solid var(--line);}
  #prog .pip.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 7px var(--gold);}
  #prog .pip.cur{border-color:#5bc0ff;box-shadow:0 0 7px #5bc0ff;}
  /* ---- 舞台 ---- */
  #stage{position:relative;z-index:4;flex:1;overflow-y:auto;overflow-x:hidden;}
  .screen{min-height:100%;max-width:720px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;padding:22px 18px 40px;}
  h1{font-size:clamp(26px,6vw,38px);text-align:center;font-weight:900;line-height:1.15;}
  h1 .sub{display:block;font-size:clamp(13px,3.2vw,15px);font-weight:800;color:var(--gold);letter-spacing:3px;margin-top:6px;}
  .lead{font-size:clamp(16px,4vw,19px);line-height:1.6;text-align:center;color:var(--ink2);max-width:600px;}
  .muted{font-size:13.5px;color:var(--dim);font-weight:700;}
  .img{display:block;} .img img{width:100%;height:100%;object-fit:contain;display:block;} .img.fail img{display:none;} .img.fail{background:linear-gradient(160deg,#1c3d5f,#12263f);border-radius:16px;}
  /* 阿問角色 + 對話泡泡 */
  .awenrow{display:flex;gap:14px;align-items:flex-start;max-width:640px;width:100%;}
  .awenrow .face{width:74px;height:74px;flex:0 0 auto;}
  .awenrow .face.fail{border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 18px #0af6;}
  .awenrow .face.fail::after{content:"◕‿◕";color:#7fdfff;font-weight:900;font-size:15px;}
  .bubble{flex:1;position:relative;background:linear-gradient(180deg,#173355,#122843);border:1.5px solid var(--line);border-radius:16px;border-top-left-radius:4px;padding:13px 16px;font-size:clamp(15px,3.9vw,17.5px);line-height:1.55;color:var(--ink);box-shadow:0 6px 18px rgba(0,0,0,.3);}
  .bubble .who{font-size:12px;color:#7fe0c0;font-weight:900;display:block;margin-bottom:4px;letter-spacing:.5px;}
  .bubble.happy{border-color:var(--good);} .bubble.think{opacity:.9;}
  /* 卡片：案情信 / 證物（米色紙，深墨字，超好讀） */
  .paper{background:linear-gradient(180deg,var(--paper),var(--paper2));color:var(--ink-dk);border-radius:16px;padding:18px 20px;max-width:600px;width:100%;
    box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 0 0 1px rgba(120,90,40,.25);position:relative;}
  .paper h3{font-size:15px;color:var(--ink-dk2);margin-bottom:8px;letter-spacing:1px;font-weight:900;}
  .paper .body{font-size:clamp(16px,4vw,18px);line-height:1.65;font-weight:600;}
  .paper.evidence{border:2px solid var(--good);}
  .stampSolved{position:absolute;top:8px;right:10px;transform:rotate(-14deg);border:3px solid #d4453e;color:#d4453e;font-weight:900;font-size:20px;padding:3px 12px;border-radius:8px;letter-spacing:3px;opacity:.85;font-family:serif;}
  /* 場景插圖框 */
  .scene{width:min(100%,460px);aspect-ratio:1/1;border-radius:20px;overflow:hidden;position:relative;box-shadow:0 12px 30px rgba(0,0,0,.4);border:2px solid rgba(255,207,92,.35);background:linear-gradient(160deg,#1c3d5f,#0f2136);}
  .scene .img,.scene .img img{width:100%;height:100%;}
  .scene.small{width:120px;aspect-ratio:1/1;border-radius:14px;}
  /* 三要素儀表燈 */
  .gauge{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
  .lamp{display:flex;align-items:center;gap:7px;border:2px solid var(--line);border-radius:22px;padding:6px 14px;font-size:13.5px;font-weight:900;color:var(--dim);opacity:.65;transition:.2s;background:rgba(10,26,44,.5);}
  .lamp .b{width:12px;height:12px;border-radius:50%;background:#2a3f5a;transition:.2s;}
  .lamp.role.on{color:var(--role);border-color:var(--role);opacity:1;} .lamp.role.on .b{background:var(--role);box-shadow:0 0 10px var(--role);}
  .lamp.bg.on{color:var(--bgc);border-color:var(--bgc);opacity:1;} .lamp.bg.on .b{background:var(--bgc);box-shadow:0 0 10px var(--bgc);}
  .lamp.prob.on{color:var(--prob);border-color:var(--prob);opacity:1;} .lamp.prob.on .b{background:var(--prob);box-shadow:0 0 10px var(--prob);}
  .lamp.miss{animation:missp .7s infinite;} @keyframes missp{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
  /* 組問句：三格輸入（大、好點、好讀） */
  .composer{max-width:600px;width:100%;display:flex;flex-direction:column;gap:12px;}
  .field{border:2px solid var(--line);border-radius:14px;padding:12px 14px;background:rgba(11,26,46,.85);}
  .field.role{border-color:var(--role);} .field.bg{border-color:var(--bgc);} .field.prob{border-color:var(--prob);}
  .field .lab{font-size:13px;font-weight:900;display:flex;align-items:center;gap:7px;margin-bottom:8px;}
  .field.role .lab{color:var(--role);} .field.bg .lab{color:var(--bgc);} .field.prob .lab{color:var(--prob);}
  .field .lab .b{width:11px;height:11px;border-radius:50%;}
  .field.role .lab .b{background:var(--role);} .field.bg .lab .b{background:var(--bgc);} .field.prob .lab .b{background:var(--prob);}
  .field .row{display:flex;align-items:center;gap:8px;}
  .field .pre{font-size:16px;color:var(--ink2);font-weight:800;white-space:nowrap;}
  .field input{flex:1;background:transparent;border:0;outline:0;color:#fff;font-size:clamp(16px,4.2vw,18px);font-weight:700;font-family:inherit;min-width:40px;padding:2px 0;}
  .field input::placeholder{color:#6b88ab;font-weight:600;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
  .chip{border:1.5px dashed;border-radius:18px;padding:5px 13px;font-size:14px;font-weight:800;cursor:pointer;background:rgba(255,255,255,.04);}
  .chip.role{border-color:var(--role);color:#d5bcff;} .chip.bg{border-color:var(--bgc);color:#a9ecf7;} .chip.prob{border-color:var(--prob);color:#ffc6de;}
  .chip:active{transform:scale(.95);}
  .chip.role.sel{background:var(--role);color:#fff;border-style:solid;} .chip.prob.sel{background:var(--prob);color:#3a0f22;border-style:solid;}
  /* 委託人泡泡 */
  .clientface{border-radius:16px;background:linear-gradient(160deg,#3a5a78,#26405a);display:flex;align-items:center;justify-content:center;}
  .clientface::after{content:"🧑";font-size:34px;}
  .bubble.client{background:linear-gradient(180deg,#2c4a2e,#22391f);border-color:#4a7a3a;border-top-left-radius:4px;} .bubble.client .who{color:#bff0a8;}
  /* 段落標題 */
  .sectlbl{align-self:stretch;max-width:640px;margin:2px auto 0;font-size:14.5px;font-weight:900;color:var(--gold);letter-spacing:.5px;}
  .scene.mid{width:min(88%,320px);}
  /* 案發現場：可點擊熱點（在場景圖上找線索） */
  .scene.invest{width:min(100%,440px);cursor:crosshair;}
  .hotspot{position:absolute;transform:translate(-50%,-50%);background:none;border:0;padding:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:3;}
  .hotspot .lens{position:relative;width:40px;height:40px;border-radius:50%;background:rgba(255,207,92,.94);color:#2a1c00;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px rgba(255,207,92,.35),0 3px 9px rgba(0,0,0,.45);}
  .hotspot .ring{position:absolute;top:20px;left:50%;width:40px;height:40px;border-radius:50%;border:3px solid var(--gold);transform:translate(-50%,-50%);animation:hspulse 1.5s ease-out infinite;}
  @keyframes hspulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.85}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}
  .hotspot .hlabel{font-size:11.5px;font-weight:900;color:#fff;background:rgba(6,16,30,.88);border:1px solid var(--gold);border-radius:11px;padding:2px 8px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .hotspot:active .lens{transform:scale(.92);}
  .hotspot.done .lens{background:var(--good);color:#03271a;box-shadow:0 0 0 3px rgba(79,224,138,.4);} .hotspot.done .ring{display:none;} .hotspot.done .hlabel{border-color:var(--good);color:#bff3d4;}
  .clickrip{position:absolute;top:20px;left:50%;width:40px;height:40px;border-radius:50%;transform:translate(-50%,-50%);border:3px solid #fff;animation:hspulse .55s ease-out;}
  /* 搜查式找線索 */
  .scene.invest.hunt{cursor:zoom-in;}
  .foundmark{position:absolute;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:var(--good);color:#03271a;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 0 3px rgba(79,224,138,.35),0 2px 6px rgba(0,0,0,.4);z-index:3;pointer-events:none;animation:pop .3s ease-out;}
  .foundmark.herring{background:#8494a8;color:#fff;width:26px;height:26px;font-size:15px;}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.2)}100%{transform:translate(-50%,-50%) scale(1)}}
  .huntsweep{position:absolute;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,.75);animation:hsweep .65s ease-out;pointer-events:none;z-index:3;}
  .huntsweep.hint{border-color:var(--gold);width:52px;height:52px;box-shadow:0 0 14px rgba(255,207,92,.7);animation:hsweep 1.3s ease-out;}
  @keyframes hsweep{0%{transform:translate(-50%,-50%) scale(.35);opacity:.9}100%{transform:translate(-50%,-50%) scale(1.9);opacity:0}}
  .findcount{font-size:16px;font-weight:900;color:var(--gold);} .findcount b{font-size:19px;}
  .compblock{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .compblock.locked .compinner{display:none;}
  .compblock .locknote{font-size:14.5px;font-weight:800;color:var(--dim);background:rgba(0,0,0,.22);border:1px dashed var(--line);border-radius:12px;padding:11px 18px;text-align:center;}
  .compblock:not(.locked) .locknote{display:none;}
  .compinner{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeup .4s ease;}
  /* 觀察事實托盤 */
  .traywrap{max-width:600px;width:100%;background:rgba(63,198,221,.06);border:1.5px dashed var(--bgc);border-radius:14px;padding:10px 12px;}
  .traylbl{font-size:13px;font-weight:900;color:var(--bgc);margin-bottom:8px;}
  .tray{display:flex;gap:8px;flex-wrap:wrap;min-height:24px;}
  .traytip{color:var(--dim);font-size:13.5px;font-style:italic;}
  .factcard{border:2px solid var(--bgc);background:rgba(63,198,221,.1);color:#c2f0f8;border-radius:12px;padding:8px 12px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left;}
  .factcard:active{transform:scale(.96);} .factcard.sel{background:var(--bgc);color:#04222a;border-style:solid;}
  /* 已填格顯示行 */
  .slotline{font-size:15.5px;font-weight:700;color:var(--dim);padding:8px 10px;border-radius:10px;background:rgba(0,0,0,.18);line-height:1.5;}
  .slotline.filled{color:#fff;background:rgba(255,255,255,.06);}
  /* 按鈕 */
  .btn{border:0;border-radius:16px;font-weight:900;font-size:clamp(16px,4.2vw,20px);padding:15px 30px;cursor:pointer;font-family:inherit;
    background:linear-gradient(180deg,#ffcf5c,#f0a52e);color:#3a2405;box-shadow:0 6px 0 #b4741a,0 10px 22px rgba(0,0,0,.35);transition:transform .06s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b4741a;} .btn:disabled{opacity:.5;filter:grayscale(.4);}
  .btn.green{background:linear-gradient(180deg,#5fe89a,#22b56c);color:#03271a;box-shadow:0 6px 0 #147a45,0 10px 22px rgba(0,0,0,.35);}
  .btn.blue{background:linear-gradient(180deg,#5bb3f0,#2f7fc4);color:#04223c;box-shadow:0 6px 0 #1c4f7e;}
  /* 選項卡（對照 / 測驗） */
  .opt{border:2px solid var(--line);background:linear-gradient(180deg,#16304f,#102540);color:var(--ink);border-radius:16px;padding:16px 18px;
    font-size:clamp(15px,4vw,18px);font-weight:700;cursor:pointer;text-align:left;line-height:1.5;max-width:600px;width:100%;transition:.12s;}
  .opt:hover{border-color:#5bc0ff;transform:translateY(-1px);} .opt.wrong{border-color:var(--bad);opacity:.5;animation:shake .3s;} .opt.right{border-color:var(--good);box-shadow:0 0 0 3px rgba(79,224,138,.4);}
  .opt:disabled{cursor:not-allowed;} .lockmsg{display:none;font-size:14.5px;font-weight:800;color:var(--gold);background:rgba(0,0,0,.22);border:1px dashed #6a5320;border-radius:12px;padding:8px 16px;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  /* 高亮字：主要出現在奶油紙卡上 → 用「深色飽和字」才讀得清（原本亮色是給深底用的） */
  .hl{padding:2px 6px;border-radius:6px;font-weight:900;} .hl.role{background:rgba(155,107,214,.22);color:#6a2fae;} .hl.bg{background:rgba(43,176,199,.24);color:#0d6577;} .hl.prob{background:rgba(255,122,176,.26);color:#b32f61;}
  /* 若高亮字出現在深底容器（泡泡/選項），改用亮色 */
  .bubble .hl.role,.opt .hl.role,.filmcard .hl.role{color:#d9c4f5;background:rgba(176,125,255,.28);}
  .bubble .hl.bg,.opt .hl.bg,.filmcard .hl.bg{color:#bdeef7;background:rgba(63,198,221,.28);}
  .bubble .hl.prob,.opt .hl.prob,.filmcard .hl.prob{color:#ffd0e2;background:rgba(255,143,187,.28);}
  .col{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;}
  /* ---- 偵探筆記本 overlay ---- */
  #nb{position:fixed;inset:0;z-index:40;background:rgba(4,10,20,.8);display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
  #nb.on{display:flex;}
  .book{background:linear-gradient(180deg,#f7efdb,#ece0c2);color:var(--ink-dk);width:min(560px,100%);max-height:88vh;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);position:relative;border-left:14px solid #7a4a24;}
  .book .bh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(180deg,#8a5a2c,#6e4420);color:#ffe9c9;}
  .book .bh .t{font-weight:900;font-size:18px;letter-spacing:1px;display:flex;gap:8px;align-items:center;}
  .book .bh .x{cursor:pointer;font-size:22px;color:#ffe9c9;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;}
  .book .bh .x:hover{background:rgba(0,0,0,.2);}
  .book .pages{padding:14px 20px 22px;overflow-y:auto;max-height:calc(88vh - 58px);
    background-image:repeating-linear-gradient(transparent,transparent 33px,rgba(120,90,40,.18) 34px);}
  .nbcase{margin-bottom:16px;}
  .nbcase .ch{display:flex;align-items:center;gap:10px;font-weight:900;font-size:15px;color:#6e4420;border-bottom:2px solid rgba(120,90,40,.3);padding-bottom:5px;margin-bottom:6px;}
  .nbcase .ch .th{width:34px;height:34px;border-radius:8px;overflow:hidden;flex:0 0 auto;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .nbentry{display:flex;gap:9px;align-items:flex-start;padding:6px 2px;font-size:15.5px;line-height:1.55;font-weight:600;}
  .nbentry .n{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#6e4420;color:#ffe9c9;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .nbentry.solvedmark{color:#1f7a4a;font-weight:800;} .nbentry.solvedmark .n{background:#22b56c;}
  .nbempty{color:#8a6a3a;font-style:italic;text-align:center;padding:20px;}
  /* 過場 / toast / 撒花 */
  #overlay{position:fixed;inset:0;z-index:45;background:rgba(4,12,24,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:24px;}
  #overlay.on{display:flex;} #overlay .big{font-size:clamp(28px,8vw,46px);font-weight:900;} #overlay .sub{font-size:clamp(16px,4.6vw,22px);color:var(--gold);font-weight:900;}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:46;background:#1f7a4a;color:#eafff2;font-weight:900;padding:11px 20px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:.3s;font-size:15px;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

function defaultState(){return {v:VERSION,phase:'start',storyStep:0,owMode:false,owHero:null,caseIdx:0,layerIdx:0,sub:'intro',compared:false,shards:0,solved:[],notebook:{},quizIdx:0,coins:0,done:false,pct:0,weaponsUnlocked:{}};}
let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(STORE));if(r&&r.v===VERSION&&r.phase){r.notebook=r.notebook||{};return r;}}catch(e){}return defaultState();}
const PHASES=['start','tutorial','case','quiz','done'];
function nbCount(){let n=0;const nb=S.notebook||{};for(const k in nb)n+=(nb[k]||[]).length;return n;}
function caseLayers(c){return c&&c.mode==='stepcase'?(c.scenes?c.scenes.length:1):((c&&c.layers)?c.layers.length:0);}
function totalSteps(){let t=2;CASES.forEach(c=>t+=caseLayers(c)+1);t+=QUIZ.length;return t;}
function stepsDone(){let d=0;if(PHASES.indexOf(S.phase)>0)d+=1;if(PHASES.indexOf(S.phase)>1)d+=1;for(let i=0;i<S.caseIdx;i++)d+=caseLayers(CASES[i])+1;if(S.phase==='case')d+=(S.layerIdx||0);if(S.phase==='quiz'||S.phase==='done')d+=(S.quizIdx||0);return d;}
function overallPct(){return S.done?1:clamp(stepsDone()/totalSteps(),0,1);}
function progressScore(s){if(!s||s.v!==VERSION)return -1;
  if(s.done)return 9000;
  const nsolved=(s.solved&&s.solved.length)||0;
  if(s.phase==='world'||s.phase==='battle')return 2000+nsolved*100+40;
  if(s.owMode&&s.phase==='case')return 2000+nsolved*100+60+(s.layerIdx||0)*5;   // 大地圖模式下的案件
  if(s.phase==='travel')return 2000+((s.caseIdx||1)-1)*100+95;
  let base=PHASES.indexOf(s.phase)*1000;base+=(s.caseIdx||0)*100+(s.layerIdx||0)*10+(s.quizIdx||0);return base;}
function save(){S.pct=S.done?1:overallPct();try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}if(Account.ready){clearTimeout(save._t);save._t=setTimeout(()=>Account.save(S),700);}}

function skipStage(){ Sfx.tick();
  if(S.phase==='start'){ S.phase='tutorial'; S.storyStep=0; }
  else if(S.phase==='tutorial'){ S.owMode=true; S.phase='world'; }
  else if(S.phase==='world'||S.phase==='battle'){ tv=null; S.notebook=S.notebook||{}; S.solved=S.solved||[]; // 跳過探索→全部標記破案→結案考
    CASES.forEach(c=>{ S.notebook[c.id]=(c.layers?c.layers.map(l=>l.seed):[]); if(S.solved.indexOf(c.id)<0)S.solved.push(c.id); });
    S.shards=Object.values(S.notebook).reduce((a,arr)=>a+(arr?arr.length:0),0); S.phase='quiz'; S.quizIdx=0; }
  else if(S.phase==='case'){ const c=CASES[S.caseIdx]; S.notebook=S.notebook||{}; S.notebook[c.id]=(c.layers?c.layers.map(l=>l.seed):[]);
    S.solved=S.solved||[]; if(S.solved.indexOf(c.id)<0)S.solved.push(c.id); S.shards=Object.values(S.notebook).reduce((a,arr)=>a+(arr?arr.length:0),0);
    if(S.owMode){ S.phase='world'; } else { S.caseIdx++; S.compared=false; S.layerIdx=0; if(S.caseIdx>=CASES.length){S.phase='quiz';S.quizIdx=0;}else{S.sub='intro';} } }
  else if(S.phase==='travel'){ tv=null; S.phase='case'; S.sub='intro'; S.layerIdx=0; }
  else if(S.phase==='quiz'){ S.phase='done'; }
  else return; // done：沒東西可跳
  owStop(); overlay&&overlay.classList&&overlay.classList.remove('on'); save(); render(); }

// 打字機：逐字顯示 HTML（標籤瞬間出現、文字一個一個），回傳 finish() 讓「點一下」立刻補完
function typeHTML(node,html,speed,onDone){speed=speed||26;
  const toks=[];let re=/<[^>]+>/g,last=0,m;while((m=re.exec(html))){if(m.index>last)for(const ch of html.slice(last,m.index))toks.push(ch);toks.push(m[0]);last=re.lastIndex;}for(const ch of html.slice(last))toks.push(ch);
  let i=0,buf='',timer=null,done=false;
  function finish(){if(done)return;done=true;if(timer){clearTimeout(timer);timer=null;}node.innerHTML=html;onDone&&onDone();}
  function step(){if(i>=toks.length){finish();return;}buf+=toks[i];i++;node.innerHTML=buf+'<span class="tcursor"></span>';const tagNext=i<toks.length&&toks[i][0]==='<';timer=setTimeout(step,tagNext?0:speed);}
  step();return finish;}

/* ---------- 拖拉引擎（滑鼠＋觸控通用；把 .chip 拖進 .slot） ---------- */
function dnd(root,onDrop){let chip=null,ghost=null,ox=0,oy=0;
  function slotAt(x,y){ghost.style.display='none';const t=document.elementFromPoint(x,y);ghost.style.display='';const sl=t?t.closest('.slot'):null;return(sl&&root.contains(sl)&&!sl.classList.contains('filled'))?sl:null;}
  function move(e){if(!chip)return;ghost.style.left=(e.clientX-ox)+'px';ghost.style.top=(e.clientY-oy)+'px';root.querySelectorAll('.slot.hot').forEach(s=>s.classList.remove('hot'));const sl=slotAt(e.clientX,e.clientY);if(sl)sl.classList.add('hot');}
  function up(e){if(!chip)return;const sl=slotAt(e.clientX,e.clientY);root.querySelectorAll('.slot.hot').forEach(s=>s.classList.remove('hot'));
    const c=chip;c.classList.remove('dragging');ghost.remove();ghost=null;chip=null;window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
    let ok=false;if(sl)ok=onDrop(c,sl)!==false;if(!ok){c.classList.remove('nope');void c.offsetWidth;c.classList.add('nope');}}
  root.addEventListener('pointerdown',e=>{const c=e.target.closest('.chip');if(!c||c.classList.contains('placed'))return;e.preventDefault();
    const r=c.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    ghost=c.cloneNode(true);ghost.classList.add('ghost');ghost.style.width=r.width+'px';ghost.style.height=r.height+'px';ghost.style.left=r.left+'px';ghost.style.top=r.top+'px';
    document.body.appendChild(ghost);c.classList.add('dragging');chip=c;window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);});}

  if(!correct){ const p=el('div','messy'); p.textContent=neatItems(n).join('，')+'。'; box.appendChild(p); return box; }
  if(n.kind==='list'){ const ul=el('ul','ansList');(n.list||[]).forEach(t=>{const li=el('li');li.textContent=t;ul.appendChild(li);});box.appendChild(ul); }
  else if(n.kind==='table'){ const tb=el('table','ansTable');const hr=el('tr');(n.tableCols||[]).forEach(cc=>{const th=el('th');th.textContent=cc;hr.appendChild(th);});tb.appendChild(hr);

  else if(n.kind==='steps'){ const ol=el('ol','ansSteps');(n.steps||[]).forEach(t=>{const li=el('li');li.textContent=t;ol.appendChild(li);});box.appendChild(ol); }
  else { const w=el('div','ansKey');(n.keypointsKey||[]).forEach(t=>{const d=el('div','kp');d.innerHTML='<span class="star">★</span>'+t;w.appendChild(d);});box.appendChild(w); }

/* 依線索的動詞，做出「像真偵探」的調查互動：問→訊問目擊者、數→點著數清楚、看/聽→仔細觀察 */
function clueKind(l){ if(/^問|^訪|^跟/.test(l))return 'ask'; if(/^數|人數/.test(l))return 'count'; if(/^聽/.test(l))return 'listen'; if(/時間|幾點/.test(l))return 'time'; return 'look'; }
function kindIcon(k){ return k==='ask'?'🗣️':k==='count'?'🔢':k==='listen'?'👂':k==='time'?'🕐':'🔍'; }
const CNNUM={'一':1,'兩':2,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function parseCount(f){ for(const c in CNNUM){ if(f.indexOf(c+'個')>=0||f.indexOf(c+'位')>=0||f.indexOf(c+'人')>=0||f.indexOf(c+'隻')>=0)return CNNUM[c]; } const m=f.match(/([0-9]+)\s*(個|位|人|隻)/); return m?parseInt(m[1]):0; }

  const note=el('div','invnote');note.textContent='➡ '+sp.f;stage.appendChild(note);Sfx.unlock();
  const ok=el('button','btn sec sm','記下這條線索 ✓');ok.onclick=finish;stage.appendChild(ok); }
function playInvestigate(kind,sp,stage,done){ stage.innerHTML=''; stage.classList.add('on');
  if(kind==='ask'){ const who=sp.s.replace(/^問|^跟/,'').replace(/說$/,'')||'目擊者';

    const conv=el('div','dialog');stage.appendChild(conv);
    const npc=(t)=>{ const r=el('div','awenrow');r.appendChild(el('div','face clientface'));const b=el('div','bubble client');b.innerHTML='<span class="who">👤 '+who+'</span><span class="t">'+t+'</span>';r.appendChild(b);conv.appendChild(r);Sfx.unlock();try{r.scrollIntoView({behavior:'smooth',block:'nearest'});}catch(e){} };
    const me=(t)=>{ const r=el('div','awenrow me');const b=el('div','bubble');b.innerHTML='<span class="who">你（小偵探）</span><span class="t">'+t+'</span>';r.appendChild(b);conv.appendChild(r); };
    npc('嗯？偵探，你想問我什麼？');
    const q1=el('button','btn sec sm','你問：「午休時，你有看到什麼嗎？」');
    q1.onclick=()=>{ q1.remove(); me('午休時，你有看到什麼嗎？'); npc('讓我仔細想想……');
      const q2=el('button','btn sec sm','你再追問：「有沒有覺得奇怪的地方？」');
      q2.onclick=()=>{ q2.remove(); me('有沒有覺得奇怪的地方？'); npc(sp.f); Sfx.ding();
        const ok=el('button','btn sec sm','把這條線索記下來 ✓');ok.onclick=done;stage.appendChild(ok); };

        const ok=el('button','btn sec sm','記下這條線索 ✓');ok.onclick=done;stage.appendChild(ok); } };
      grid.appendChild(p); }
    stage.appendChild(grid);
  } else { invExamine(sp,stage,done); } }

  const trayWrap=el('div','traywrap');trayWrap.appendChild(el('div','traylbl','🔎 你查到的線索'));

  const askBlock=el('div','compblock locked');s.appendChild(askBlock);

  const bubbles=el('div','fmtbubbles');ai.appendChild(bubbles);
  const resp=el('div','fmtresp');ai.appendChild(resp);
  let found=0,wrongN=0,busy=false;
  function commitClue(sp,hs){ hs.classList.add('done'); hs.classList.remove('active'); const dot=hs.querySelector('.csdot'); if(dot)dot.textContent='✓'; invStage.classList.remove('on'); invStage.innerHTML=''; busy=false;
    if(trayIn.querySelector('.traytip'))trayIn.querySelector('.traytip').remove();
    const card=el('div','factcard shown');card.textContent=sp.f;trayIn.appendChild(card);
    found++;findc.querySelector('b').textContent=found;
    if(found>=spots.length){askBlock.classList.remove('locked');Sfx.win();toast('✅ 線索都查清楚了！選一種格式問阿問');drawBubbles();

  }
  spots.forEach(sp=>{ const kind=clueKind(sp.s);
    const hs=el('div','clickspot kind-'+kind); hs.style.left=sp.x+'%'; hs.style.top=sp.y+'%';

  function drawBubbles(){ bubbles.innerHTML=''; shuffle(FORMAT_ORDER).forEach(k=>{

    b.onclick=()=>pick(k,b);bubbles.appendChild(b);

      setTimeout(()=>{try{cont.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){}},200);
    } else { btn.classList.add('wrong');Sfx.pop();wrongN++;
      resp.innerHTML='';resp.appendChild(awenRow('','我用「'+FORMATS[kind].name+'」試試看…'));
      resp.appendChild(renderAnswer(layer,kind,false));
      resp.appendChild(el('div','fmtbad','唔…這樣擠成一團、看不清楚！同一份資料，換一種格式再問問看？'));
      if(wrongN>=3){ const good=[...bubbles.children].find(y=>y.classList.contains('f-'+layer.correctFormat));
        resp.appendChild(el('div','muted','阿問偷偷告訴你：這種情況用「'+FORMATS[layer.correctFormat].name+'」最清楚喔，點它試試！'));
        [...bubbles.children].forEach(x=>x.disabled=(x!==good)); if(good)good.classList.add('hintpulse');
      } else { const secs=2+wrongN;const note=el('div','lockmsg');note.style.display='block';resp.appendChild(note);
        let left=secs;const show=()=>note.textContent='🔒 想一想…（'+left+' 秒後可再選）';show();
        const iv=setInterval(()=>{left--;if(left<=0){clearInterval(iv);resp.innerHTML='';drawBubbles();}else show();},1000);
      }
    }
  }

}

/* 反硬A：選擇題選錯 → 鎖住全部選項 (2+N) 秒，倒數提示，時間到才能再選 */
function lockChoices(opts,wrongN,note){ const secs=2+wrongN; opts.forEach(b=>{ if(!b.classList.contains('right'))b.disabled=true; });
  let left=secs; const show=()=>{note.textContent='🔒 想一想…（'+left+' 秒後可再選）';note.style.display='block';};show();
  const iv=setInterval(()=>{ left--; if(left<=0){ clearInterval(iv); note.textContent='';note.style.display='none'; opts.forEach(b=>{ if(!b.classList.contains('wrong')&&!b.classList.contains('right'))b.disabled=false; }); } else show(); },1000); }
function localGibberish(q){const cjk=(q.match(/[一-鿿ㄅ-ㄯ]/g)||[]).length;const latin=(q.match(/[a-zA-Z0-9]/g)||[]).length;
  if(cjk<3)return true;if(/(.)\1{3,}/.test(q.replace(/\s/g,'')))return true;if(latin>cjk)return true;return false;}
function autoDemo(c,layer,st,ui){ // 連錯 3 次：阿問自動示範（幫忙挑對線索、把問題排好）——不懲罰
  (ui.allSpots||[]).forEach(sp=>{if(!sp.done){sp.done=true;ui.mark(sp);if(ui.tray.querySelector('.traytip'))ui.tray.querySelector('.traytip').remove();ui.addFact(sp.f);}});
  if(ui.unlock)ui.unlock();
  st.role=layer.roles[0];st.bg=layer.spots.map(sp=>sp.f);st.prob=layer.probs[0]; // 只選 3 個對的關鍵線索
  [...ui.roleChips.children].forEach(x=>x.classList.toggle('sel',x.textContent===st.role));
  [...ui.tray.querySelectorAll('.factcard')].forEach(x=>x.classList.toggle('sel',st.bg.indexOf(x.textContent)>=0));
  ui.inp.value=st.prob;[...ui.probChips.children].forEach(x=>x.classList.toggle('sel',x.textContent===st.prob));ui.refresh();}
function lockSend2(send,resp,wrongN){ const secs=2+wrongN; send.disabled=true; const note=el('div','lockmsg');resp.appendChild(note);
  let left=secs;const show=()=>note.textContent='🔒 想一想…（'+left+' 秒後可再問阿問）';show();

function composeReject(c,layer,st,ui,send,resp){ st._w=(st._w||0)+1; // 反硬A：選錯角色/問題 → 鎖問阿問鈕 (2+N) 秒；連錯 3 次自動示範不卡死

  else { lockSend2(send,resp,st._w); } }
async function submitQuestion(c,layer,st,L,resp,send,ui){Sfx.resume();
  const miss=[];if(!st.role)miss.push('role');if(!st.bg.length)miss.push('bg');if(!st.prob)miss.push('prob');
  if(miss.length){miss.forEach(k=>L[k].classList.add('miss'));Sfx.pop();
    const names={role:'你要阿問當誰（紫色格）',bg:'去現場調查，把「看到的事實」放進背景（青色格）',prob:'你想問什麼（粉色格）'};
    resp.innerHTML='';resp.appendChild(awenRow('','還差一點點！請補上：「'+miss.map(k=>names[k]).join('」和「')+'」，我就給你線索！'));return;}
  // 嚴格把關①（本地，可靠＋離線也擋）：明顯亂選的干擾角色 / 離題問題 → 不放行
  const bad=layer.bad||[];
  if(bad.indexOf(st.role)>=0){L.role.classList.add('miss');Sfx.pop();resp.innerHTML='';resp.appendChild(awenRow('','「'+st.role+'」幫不上這件案子的忙耶～換一個「懂這件事」的角色！'));composeReject(c,layer,st,ui,send,resp);return;}
  if(bad.indexOf(st.prob)>=0){L.prob.classList.add('miss');Sfx.pop();resp.innerHTML='';resp.appendChild(awenRow('','這個問題跟案子沒關係喔～想想你到底要查什麼？'));composeReject(c,layer,st,ui,send,resp);return;}
  // 背景：選到「無關觀察」→ 打回並鎖秒；選不夠「對的線索」→ 提示
  const distrBg=st._good?st.bg.filter(f=>!st._good.has(f)):[];
  if(distrBg.length){L.bg.classList.add('miss');Sfx.pop();resp.innerHTML='';resp.appendChild(awenRow('','「'+distrBg[0]+'」跟這件案子沒關係，別放進背景！把它拿掉～'));composeReject(c,layer,st,ui,send,resp);return;}
  if(st._goodCount&&st.bg.length<st._goodCount){L.bg.classList.add('miss');Sfx.pop();resp.innerHTML='';resp.appendChild(awenRow('','背景還不夠！要挑出「'+st._goodCount+'個」對案子有用的關鍵線索喔～'));return;}
  const question='請你當「'+st.role+'」，我在現場看到：'+st.bg.join('、')+'，我想問：'+st.prob+'？';
  if(localGibberish(st.prob)){Sfx.pop();resp.innerHTML='';resp.appendChild(awenRow('','阿問看不太懂你的「問題」耶～用一句話講清楚你想問什麼好嗎？'));composeReject(c,layer,st,ui,send,resp);return;}
  // 通過本地嚴格把關 → 呼叫 AI 只為「一句個人化反應」（best-effort，不擋關）；線索用本地 seed
  resp.innerHTML='';resp.appendChild(awenRow('think','阿問思考中…嗶嗶…'));send.disabled=true;
  let reaction='';
  try{if(navigator.onLine){const r=await fetch('/api/interrogate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({caseTitle:c.title,suspicion:layer.client,clueSeed:layer.seed,question})});const j=await r.json();if(j.ok!==false&&!j.offline)reaction=(j.reply||'').trim();}}catch(e){}
  send.disabled=false;failCount=0;Sfx.unlock();revealClue(c,layer,reaction);}

}

function caseCompare(c){const s=el('div','screen');
  s.appendChild(el('h1','serif','訊問回放'));
  s.appendChild(awenRow('','同一件事，這兩位前輩偵探問過——哪一句我才會給線索？'));
  const g=c.compare.good,goodText='請你當「'+g.role+'」，'+g.bg+'，我想問：'+g.prob+'？';

  s.appendChild(el('h1','serif','🎉 恭喜破案！你是名偵探！'));
  const bw=el('div');bw.style.cssText='display:flex;justify-content:center';bw.appendChild(pic('det-victory','victoryimg'));s.appendChild(bw);
  s.appendChild(awenRow('happy','太強了！你學會「問對格式」——同樣一堆資料，換個格式就清楚多了：📋清單一條條列、▦表格分類比一比、🔢步驟照順序排、🎯重點只抓關鍵。以後問我記得說「你想要哪一種」！'));
  const total=COIN_PER_CASE*CASES.length;
  const coinLine=el('div');coinLine.style.cssText='font-weight:900;color:var(--gold);font-size:24px;text-align:center';coinLine.textContent='🪙 本關共獲得 '+total+' 金幣 已存入錢包！';s.appendChild(coinLine);
  const wall=el('div','wall');(S.solved||[]).forEach(id=>{const c=CASES.find(x=>x.id===id);if(!c)return;const p=el('div','poster');const th=el('div','th');th.appendChild(pic(c.scene));p.appendChild(th);p.appendChild(el('div','cap','✔ '+c.title));wall.appendChild(p);});s.appendChild(wall);
  const row=el('div');row.style.cssText='display:flex;gap:12px;flex-wrap:wrap;justify-content:center';
  const ta=el('button','btn blue','我是小偵探教官 · 去教一位同學');ta.onclick=()=>{ta.textContent='已成為教官 ✓（+TA 12 金幣）';ta.disabled=true;Account.creditCoins('s2w02_ta',12,'S2-W02 小老師 TA');S.coins=(S.coins||0)+12;S.ta=true;save();renderTop();};
  const nbb=el('button','btn','📖 翻開偵探筆記本');nbb.style.fontSize='16px';nbb.onclick=openNB;
  row.appendChild(ta);row.appendChild(nbb);s.appendChild(row);
  if(!S._delivered){S._delivered=true;S.done=true;save();renderTop();confetti();Sfx.win();}
  stage.appendChild(s);}

/* ---------- 啟動 ---------- */
function renderAcct(){const a=$('#acct');const on=navigator.onLine;
  if(Account.ready){a.innerHTML='<span class="d ok"></span> 已綁定：'+(Account.name||'已登入')+(on?'':'　·　<span class="offtag">離線辦案</span>');}
  else{a.innerHTML='<span class="d warn"></span> 訪客模式'+(on?'':'　·　<span class="offtag">離線辦案</span>')+'　<a href="/login" style="color:#8fd0ff">登入</a>';}}
/* ---- 測試用「跳過」鈕：僅 localhost 或網址帶 ?test 時出現，學生上線看不到 ---- */
function isTestMode(){ try{ return /[?&]test/.test(location.search)||['localhost','127.0.0.1'].indexOf(location.hostname)>=0; }catch(e){ return false; } }
function devSkip(){ Sfx.tick();
  if(S.phase==='start'){ if((S.storyStep||0)<STORY.length-1){S.storyStep=(S.storyStep||0)+1;}else{S.phase='tutorial';S.storyStep=0;} save();render(); return; }
  if(S.phase==='tutorial'){ Sfx.win();S.owMode=true;S.phase='world';save();render(); return; }
  if(S.phase==='case'&&CASES[S.caseIdx]&&CASES[S.caseIdx].mode==='stepcase'){
    const order=['intro','explore','sift','format','timeline','deduce','solved'];const cur=Math.max(0,order.indexOf(S.sub||'intro'));
    if(cur<order.length-1){ S.sub=order[cur+1]; S.ckFound=CASES[S.caseIdx].scenes.flatMap(z=>z.spots.map(s=>s.id)); save();render(); return; }
  }
  skipStage(); }
function mountDevSkip(){ if(!isTestMode()||document.getElementById('devskip'))return;
  const b=document.createElement('button');b.id='devskip';b.textContent='跳過 ⏭';b.title='測試用：前進到下一步／下一關';
  b.style.cssText='position:fixed;top:56px;right:8px;z-index:60;background:#b0431f;color:#fff;border:2px solid #ffce47;border-radius:12px;font-weight:900;font-size:13px;padding:8px 12px;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.5);opacity:.92;';
  b.onclick=()=>{try{devSkip();}catch(e){console.error(e);}};document.body.appendChild(b);
  const mb=document.createElement('button');mb.id='devmb';mb.textContent='🐉 怪物戰';mb.title='測試用：直接進怪物戰(每點換一隻)';
  mb.style.cssText='position:fixed;top:98px;right:8px;z-index:60;background:#5b2f8a;color:#fff;border:2px solid #ffce47;border-radius:12px;font-weight:900;font-size:13px;padding:8px 12px;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.5);opacity:.92;';
  mb.onclick=()=>{try{ const i=(window.__mbI=((window.__mbI==null?-1:window.__mbI)+1)%MONSTERS.length); S.phase='battle';tv=mbInit(MONSTERS[i],true);tv.stage='battle';save();render(); }catch(e){console.error(e);}};document.body.appendChild(mb); }
function boot(){$('#bgimg').style.backgroundImage="url('assets/det-bg.png')";$('#brandlens').appendChild(pic('det-magnifier'));
  Account.init();renderTop();render();renderAcct();mountDevSkip();
  window.addEventListener('online',renderAcct);window.addEventListener('offline',renderAcct);
  (async()=>{if(!Account.ready)return;const cloud=await Account.load();if(cloud&&cloud.v===VERSION&&cloud.phase){if(progressScore(cloud)>progressScore(S)){S=cloud;S.notebook=S.notebook||{};save();render();}else{Account.save(S);}}else{Account.save(S);}renderAcct();renderTop();})();}
boot();
</script>

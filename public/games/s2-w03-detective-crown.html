  .len:hover:not(.lock){background:color-mix(in srgb,var(--c) 22%,transparent);transform:translateY(-2px)}

  .len .n{font-weight:900;font-size:17px;color:var(--ink)}

  .note{border-left:4px solid var(--gold);padding:8px 12px;background:rgba(255,207,92,.09);border-radius:0 10px 10px 0;

  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:900;

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;background:rgba(6,18,32,.97);

  .spot{position:absolute;width:38px;height:38px;border-radius:50%;border:3px solid var(--gold);cursor:pointer;
    background:rgba(255,207,92,.2);animation:pulse 1.7s infinite;display:flex;align-items:center;justify-content:center;

  @keyframes pop{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}

const $=(s,r)=>(r||document).querySelector(s);
const el=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;};
const wrap=$('#wrap');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pic(name,cls){const w=el('div','img'+(cls?' '+cls:''));const im=document.createElement('img');
  im.src='assets/'+name;im.alt='';im.onerror=()=>w.classList.add('fail');w.appendChild(im);return w;}

/* ---------- 音效（程序化，無外部檔） ---------- */
const Sfx=(()=>{let ac=null;function c(){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return ac;}
  function tone(f,d,t,v){const a=c();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(v||.06,a.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+(d||.15));o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||.15));}
  return{tick(){tone(430,.05,'triangle',.05);},ok(){tone(880,.12,'sine',.06);setTimeout(()=>tone(1320,.14,'sine',.05),70);},
    no(){tone(200,.16,'square',.05);},unlock(){[620,940,1240].forEach((f,i)=>setTimeout(()=>tone(f,.11,i?'sine':'square',.05),i*72));},
    win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.16,'square',.05),i*95));}};
})();

const Account=(()=>{let uid=null,uname='',db=null,ready=false;
  function su(){try{const r=(sessionStorage.getItem('@session/currentUser')||localStorage.getItem('@session/currentUser'));return r?JSON.parse(r):null;}catch(e){return null;}}
  function init(){const u=su();if(u&&u.id){uid=u.id;uname=u.displayName||u.username||'';}
    if(uid&&window.firebase){try{if(!firebase.apps.length)firebase.initializeApp(FB);db=firebase.firestore();ready=true;}catch(e){}}}
  async function load(){if(!ready)return null;try{const s=await db.collection('gameProgress').doc(uid).get();return s.exists?(s.data()[GAMEKEY]||null):null;}catch(e){return null;}}
  async function save(st){if(!ready)return;try{await db.collection('gameProgress').doc(uid).set({[GAMEKEY]:st,name:uname,updatedAt:new Date().toISOString()},{merge:true});}catch(e){}}
  async function creditCoins(id,amount,reason){if(!ready||!(amount>0))return;const ref=db.collection('coins').doc(uid);
    try{await db.runTransaction(async tx=>{const s=await tx.get(ref);const c=s.exists?s.data():{balance:0,totalEarned:0,transactions:[]};
      const txs=Array.isArray(c.transactions)?c.transactions:[];if(txs.some(t=>t&&t.id===id))return;
      txs.push({id,amount,reason,timestamp:new Date().toISOString()});
      tx.set(ref,{balance:(c.balance||0)+amount,totalEarned:(c.totalEarned||0)+amount,transactions:txs.slice(-160)});});}catch(e){}}
  return{init,load,save,creditCoins,get ready(){return ready;},get name(){return uname;}};
})();

/* =========================================================================
   狀態／存檔（綁 uid；本地即時真相＋雲端背景備份）
   ========================================================================= */
const VERSION=1;
const STORE=(function(){ // 存檔鍵綁使用者：共用電腦時下一位學生不會繼承上一位的進度
  var base='s2w03_progress';
  try{ localStorage.removeItem(base); }catch(e){}
  try{ var r=sessionStorage.getItem('@session/currentUser')||localStorage.getItem('@session/currentUser');
       var u=r?JSON.parse(r):null; return base+':'+((u&&u.id)||'anon'); }catch(e){ return base+':anon'; } })();
function defaultState(){return{v:VERSION,phase:'start',ci:0,sub:'lead',round:0,facts:{},clues:[],
  board:{},links:[],coins:0,ta:false,done:false,pct:0};}
let S=loadLocal();
function loadLocal(){try{const r=JSON.parse(localStorage.getItem(STORE));if(r&&r.v===VERSION&&r.phase)return r;}catch(e){}return defaultState();}
function progressScore(s){return s?((s.clues||[]).length*10+(s.ci||0)*100+(s.done?1000:0)):-1;}
function pct(){if(S.done)return 1;return clamp(((S.clues||[]).length)/CH.length,0,1);}
function save(){S.pct=pct();try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}
  clearTimeout(save._t);save._t=setTimeout(()=>Account.save(S),600);}
function addCoins(n,id,reason){S.coins=(S.coins||0)+n;Account.creditCoins(id,n,reason);save();renderTop();
  toast('＋'+n+' 金幣');}

/* ---------- 頂列 / toast ---------- */
function renderTop(){$('#pbar').style.width=Math.round(pct()*100)+'%';$('#coinN').textContent=S.coins||0;}
let toastT=null;
function toast(msg){const old=$('.toast');if(old)old.remove();const t=el('div','toast',msg);document.body.appendChild(t);
  clearTimeout(toastT);toastT=setTimeout(()=>t.remove(),1900);}
function renderAcct(){const a=$('#acct');
  a.textContent=Account.ready?('已綁定：'+(Account.name||'我的帳號')):'訪客模式（登入後才會記錄金幣與進度）';}

/* =========================================================================
   畫面
   ========================================================================= */
function go(phase,sub){S.phase=phase;if(sub)S.sub=sub;save();render();}

function render(){
  wrap.innerHTML='';renderTop();
  if(S.phase==='start')return renderStart();
  if(S.phase==='done')return renderDone();
  return renderChapter();
}

/* ---- 開場：案件簡報＋線索板預告（收集閉環頭） ---- */
function renderStart(){
  const c=el('div','card pop');
  c.appendChild(pic('s2w03-hall.jpg','cover')).style.height='clamp(150px,26vh,240px)';
  const h=el('h2','','消失的慶典皇冠');h.style.marginTop='12px';c.appendChild(h);
  c.appendChild(el('p','','慶典前一夜，展示櫃裡的皇冠不見了——明天早上就要用。你和阿問只有今晚，分五章把它找回來。'));
  const n=el('div','note');n.style.marginTop='10px';
  n.innerHTML='<b>這一課的鑰匙是「長度」。</b><br>同一個問題，叫阿問用<b>對的長度</b>回答才拿得到能用的線索：太長會把重點淹沒、太短會缺一角，兩種都上不了線索板。';
  c.appendChild(n);
  const lens=el('div','lens');lens.style.marginTop='12px';
  LEN_ORDER.forEach(k=>{const L=LEN[k];const d=el('div','len');d.style.setProperty('--c',L.c);d.style.cursor='default';
    d.appendChild(el('div','g',L.g));d.appendChild(el('div','n',L.n));d.appendChild(el('div','s',L.s));lens.appendChild(d);});
  c.appendChild(lens);
  const prev=el('div','board');prev.style.marginTop='12px';
  prev.appendChild(el('h3','','線索板（還是空的）'));
  const tl=el('div','tl');SLOTS.forEach(s=>{const d=el('div','slot');d.appendChild(el('div','t',s.t));
    d.appendChild(el('div','',' ')).style.cssText='font-size:11px;color:var(--dim)';tl.appendChild(d);});
  prev.appendChild(tl);c.appendChild(prev);
  const b=el('button','btn','開始辦案');b.style.cssText='margin-top:14px;width:100%';
  b.onclick=()=>{Sfx.unlock();S.ci=0;S.sub='lead';go('chapter');};
  c.appendChild(b);
  wrap.appendChild(c);
}

/* ---- 章節主流程 ---- */
function renderChapter(){
  const c=CH[S.ci];if(!c)return go('done');
  if(S.sub==='lead')return chLead(c);
  if(S.sub==='ask')return chAsk(c);
  if(S.sub==='board')return chBoard(c);
  if(S.sub==='quiz')return chQuiz(c);
  if(S.sub==='clear')return chClear(c);
  return chLead(c);
}

/* 蒐證：點亮現場所有觀察點才能開始問阿問 */
function chLead(c){
  const card=el('div','card pop');
  card.appendChild(el('div','tag','第 '+(S.ci+1)+' / '+CH.length+' 章　·　'+c.teach));
  const h=el('h2','',c.title);h.style.margin='8px 0 6px';card.appendChild(h);
  card.appendChild(el('p','',c.lead));
  const got=S.facts[c.id]||[];
  if(c.spots.length){
    const box=el('div');box.style.cssText='position:relative;margin-top:12px;border-radius:14px;overflow:hidden';
    const im=pic(c.scene,'cover');im.style.height='clamp(180px,32vh,300px)';box.appendChild(im);
    c.spots.forEach((sp,i)=>{const d=el('div','spot'+(got.includes(i)?' got':''),got.includes(i)?'✓':'?');
      d.style.left=sp.x+'%';d.style.top=sp.y+'%';d.title=sp.label;
      d.onclick=()=>{if(got.includes(i))return;got.push(i);S.facts[c.id]=got;Sfx.tick();save();render();};
      box.appendChild(d);});
    card.appendChild(box);
    const list=el('div');list.style.marginTop='10px';
    c.spots.forEach((sp,i)=>{const r=el('div','note');r.style.marginTop='6px';
      r.innerHTML=got.includes(i)?('<b>'+sp.label+'</b>：'+sp.fact):('<b>'+sp.label+'</b>：<span style="color:var(--dim)">（還沒查）</span>');
      list.appendChild(r);});
    card.appendChild(list);
  }
  const all=c.spots.length===0||got.length>=c.spots.length;
  const b=el('button','btn',all?'去問阿問':'先把現場查完（'+got.length+'/'+c.spots.length+'）');
  b.disabled=!all;b.style.cssText='margin-top:14px;width:100%';
  b.onclick=()=>{S.round=0;go('chapter','ask');};
  card.appendChild(b);
  wrap.appendChild(card);
}

/* 提煉：選長度 → 看阿問的回答（剛好/太長/太短） */
function chAsk(c){
  const rounds=c.rounds||[{ask:c.ask,want:c.want,hint:c.hint,answers:c.answers,limitN:c.limitN}];
  const r=rounds[S.round]||rounds[0];
  const card=el('div','card pop');
  card.appendChild(el('div','tag','提煉線索　·　'+(rounds.length>1?('追問 '+(S.round+1)+' / '+rounds.length):'選對長度')));
  const h=el('h3','','問阿問');h.style.margin='9px 0 4px';card.appendChild(h);
  card.appendChild(el('p','',r.ask));
  const hint=el('div','note');hint.style.marginTop='9px';hint.innerHTML='💡 '+r.hint;card.appendChild(hint);

  const st=chState(c.id,S.round);
  const lens=el('div','lens');lens.style.marginTop='13px';
  // 防硬 A：位置隨機，但只在「答錯」時重洗——不要在讀答案時讓選項跳來跳去
  st.order.forEach(k=>{
    const L=LEN[k];const d=el('div','len'+(st.locked?' lock':''));d.style.setProperty('--c',L.c);
    d.appendChild(el('div','g',L.g));
    d.appendChild(el('div','n',L.n+(k==='limit'&&r.limitN?('（'+r.limitN+'字）'):'')));
    d.appendChild(el('div','s',L.s));
    if(st.tried.includes(k))d.appendChild(el('div','tried','試過'));
    d.onclick=()=>{if(st.locked)return;pickLen(c,r,k);};
    lens.appendChild(d);
  });
  card.appendChild(lens);

  if(st.last){
    const a=r.answers[st.last];
    const box=el('div','ans '+a.v);box.textContent=a.t;card.appendChild(box);
    const v=el('div','verdict '+(a.v==='good'?'ok':'no'));
    v.textContent=a.v==='good'?'剛好！這條線索可以放上線索板。'
      :(a.v==='toolong'?'太長了——重點被淹沒在一大段話裡，抓不出可用的線索。'
                       :'太短了——缺了一角，這樣還不夠用。');
    card.appendChild(v);
    if(a.v==='good'){
      const b=el('button','btn','收進線索板');b.style.cssText='margin-top:12px;width:100%';
      b.onclick=()=>advance(c,rounds);card.appendChild(b);
    }else{
      const t=el('div');t.style.cssText='margin-top:10px;font-size:13px;color:var(--dim);font-weight:700';
      t.textContent=st.locked?('等一下下…（'+st.remain+' 秒）再換一種長度問問看'):'換一種長度再問一次。';
      card.appendChild(t);
    }
  }
  wrap.appendChild(card);
  if(st.locked)tickLock(c.id,S.round);
}

/* 每一輪提問的暫時狀態（不進存檔，重整就重來一輪，不影響章進度） */
const askState={};
function chState(cid,round){const k=cid+'#'+round;
  if(!askState[k])askState[k]={tried:[],last:null,wrong:0,lockUntil:0,order:shuffle(LEN_ORDER)};
  const s=askState[k];const now=Date.now();
  s.locked=now<s.lockUntil;s.remain=Math.max(0,Math.ceil((s.lockUntil-now)/1000));return s;}
function tickLock(cid,round){clearTimeout(tickLock._t);
  tickLock._t=setTimeout(()=>{const s=chState(cid,round);render();},400);}
function pickLen(c,r,k){
  const s=chState(c.id,S.round);const a=r.answers[k];
  if(!s.tried.includes(k))s.tried.push(k);
  s.last=k;
  if(a.v==='good'){Sfx.ok();}
  else{Sfx.no();s.wrong++;s.lockUntil=Date.now()+(2000+(s.wrong-1)*1000);s.order=shuffle(s.order);} // 鎖 2＋N 秒（升冪）＋重洗位置
  render();
}
function advance(c,rounds){
  if(S.round<rounds.length-1){S.round++;askStateClear(c.id,S.round);Sfx.tick();save();render();return;}
  // 這一章的線索到手
  if(!S.clues.some(x=>x.id===c.clue.id)){S.clues.push({id:c.clue.id,name:c.clue.name,text:c.clue.text});}
  Sfx.unlock();
  go('chapter', c.id==='ch5' ? 'board' : (needBoard(c) ? 'board' : 'quiz'));
}
function askStateClear(cid,round){delete askState[cid+'#'+round];}
function needBoard(c){return c.id==='ch4';}   // 章1–3 收線索、章4 排時間軸、章5 連連看

/* 線索板：章4＝時間軸拖放；章5＝連連看 */
function chBoard(c){
  if(c.id==='ch5')return boardLinks(c);
  return boardTimeline(c);
}

function boardTimeline(c){
  const card=el('div','card pop');
  card.appendChild(el('div','tag','線索板　·　時間軸'));
  const h=el('h3','','把每個人排到他的時段');h.style.margin='9px 0 4px';card.appendChild(h);
  card.appendChild(el('p','','皇冠在 8:00–9:00 之間消失。把四個人拖到「有人能證明他在那裡」的時段——排完就看得出哪一格出問題。'));
  const b=el('div','board');b.style.marginTop='11px';
  const tl=el('div','tl');
  SLOTS.forEach((s,i)=>{
    const d=el('div','slot');d.dataset.i=i;
    d.appendChild(el('div','t',s.t));
    const placed=S.board[s.t];
    if(placed){d.classList.add(s.gap?'gap':'filled');d.appendChild(personCard(PEOPLE[placed],false));
      const n=el('div','',s.note);n.style.cssText='font-size:10px;color:var(--ink2);text-align:center;line-height:1.35';d.appendChild(n);}
    d.ondragover=e=>{e.preventDefault();d.classList.add('over');};
    d.ondragleave=()=>d.classList.remove('over');
    d.ondrop=e=>{e.preventDefault();d.classList.remove('over');dropPerson(s,e.dataTransfer.getData('id'));};
    d.onclick=()=>{if(dragSel){dropPerson(s,dragSel);}};
    tl.appendChild(d);
  });
  b.appendChild(tl);
  const pool=el('div','pool');
  SLOTS.map(s=>s.who).filter(w=>!Object.values(S.board).includes(w)).forEach(w=>pool.appendChild(personCard(PEOPLE[w],true)));
  if(!pool.children.length)pool.appendChild(el('div','','（都排好了）')).style.cssText='color:var(--dim);font-size:13px';
  b.appendChild(pool);
  card.appendChild(b);

  const done=SLOTS.every(s=>S.board[s.t]===s.who);
  if(done){
    const n=el('div','note');n.style.cssText='margin-top:11px;border-left-color:#ff7a7a;background:rgba(255,122,122,.1)';
    n.innerHTML='<b>看出來了嗎？</b> 8:45 那一格是紅的——阿福在廚房、秀琴在廁所、小葉在後台都有人證，<b>只有林主席說不出自己在哪裡</b>，總機也查不到她說的那通電話。';
    card.appendChild(n);
    const btn=el('button','btn','記進線索板');btn.style.cssText='margin-top:12px;width:100%';
    btn.onclick=()=>go('chapter','quiz');card.appendChild(btn);
  }
  wrap.appendChild(card);
}
let dragSel=null;
function personCard(p,draggable){
  const d=el('div','pcard');d.dataset.id=p.id;
  const av=el('div','av');const im=document.createElement('img');im.src='assets/'+p.img;im.onerror=()=>av.style.background='#1d3f66';
  av.appendChild(im);d.appendChild(av);
  d.appendChild(el('div','nm',p.name));
  const r=el('div','','');r.textContent=p.role;r.style.cssText='font-size:9px;color:var(--dim)';d.appendChild(r);
  if(draggable){
    d.draggable=true;
    d.ondragstart=e=>{e.dataTransfer.setData('id',p.id);d.classList.add('drag');};
    d.ondragend=()=>d.classList.remove('drag');
    d.onclick=()=>{dragSel=(dragSel===p.id?null:p.id);
      [...document.querySelectorAll('.pcard')].forEach(x=>x.style.outline='');
      if(dragSel)d.style.outline='3px solid var(--gold)';toast(dragSel?'選好了，點一個時段放上去':'取消選取');};
  }
  return d;
}
function dropPerson(slot,pid){
  if(!pid)return;
  if(slot.who!==pid){Sfx.no();toast('這個時段沒有人能證明他在那裡');return;}
  S.board[slot.t]=pid;dragSel=null;Sfx.ok();save();render();
}

/* 章5 連連看：物證 ↔ 說明 */
function boardLinks(c){
  const card=el('div','card pop');
  card.appendChild(el('div','tag','線索板　·　連連看'));
  const h=el('h3','','把物證和說明連起來');h.style.margin='9px 0 4px';card.appendChild(h);
  card.appendChild(el('p','','點左邊一條，再點右邊對應的說明。連對三組，真相就完整了。'));
  const st=linkState();
  const g=el('div','link');
  const L=el('div','lcol'),M=el('div','lmid','↔'),R=el('div','lcol');
  st.left.forEach(i=>{const d=el('div','li'+(S.links.includes(i)?' done':(st.sel===i?' sel':'')),LINKS[i].l);
    d.onclick=()=>{if(S.links.includes(i))return;st.sel=(st.sel===i?null:i);render();};L.appendChild(d);});
  st.right.forEach(o=>{
    const isReal=typeof o==='number';const txt=isReal?LINKS[o].r:o;
    const d=el('div','li'+(isReal&&S.links.includes(o)?' done':''),txt);
    d.onclick=()=>{
      if(st.sel==null){toast('先點左邊一條線索');return;}
      if(isReal&&o===st.sel){S.links.push(o);st.sel=null;Sfx.ok();save();render();}
      else{Sfx.no();toast('這兩條兜不起來，再想想');}
    };R.appendChild(d);});
  g.appendChild(L);g.appendChild(M);g.appendChild(R);card.appendChild(g);

  if(S.links.length>=LINKS.length){
    const n=el('div','note');n.style.marginTop='11px';
    n.innerHTML='<b>真相拼齊了。</b>林主席戴上點心師傅的手套、用備份鑰匙打開展示櫃，把皇冠拿去修——因為那顆藍寶石鬆了，她怕明天在台上掉下來。';
    card.appendChild(n);
    const b=el('button','btn','指認兇手');b.style.cssText='margin-top:12px;width:100%';
    b.onclick=()=>go('chapter','quiz');card.appendChild(b);
  }
  wrap.appendChild(card);
}
let _linkState=null;
function linkState(){
  if(!_linkState){
    const rights=LINKS.map((_,i)=>i).concat(LINK_DISTRACT);   // 干擾 ≥3
    _linkState={left:LINKS.map((_,i)=>i),right:shuffle(rights),sel:null};
  }
  return _linkState;
}

/* 顯性理解檢核（泡泡題・隨機位置＋鎖秒＋洗牌） */
const quizState={};
function chQuiz(c){
  const k=c.id;
  if(!quizState[k])quizState[k]={opts:shuffle(c.quiz.opts.map((t,i)=>({t,ok:i===c.quiz.a}))),wrong:0,lockUntil:0,pos:null};
  const q=quizState[k];const now=Date.now();const locked=now<q.lockUntil;
  const card=el('div','card pop');
  card.appendChild(el('div','tag','考考你　·　複述一次'));
  const h=el('h3','',c.quiz.q);h.style.margin='9px 0 2px';card.appendChild(h);
  const bw=el('div','bubwrap');
  if(!q.pos)q.pos=layoutBubbles(q.opts.length);
  q.opts.forEach((o,i)=>{
    const b=el('div','bub'+(locked?' lockd':''),'');b.textContent=textOf(o.t);
    const p=q.pos[i];b.style.cssText+=';left:'+p.x+'%;top:'+p.y+'%;width:'+p.d+'px;height:'+p.d+'px;margin-left:'+(-p.d/2)+'px;margin-top:'+(-p.d/2)+'px';
    b.onclick=()=>{
      if(locked)return;
      if(o.ok){Sfx.win();chapterCleared(c);}
      else{Sfx.no();q.wrong++;q.lockUntil=Date.now()+(2000+(q.wrong-1)*1000);
        q.opts=shuffle(q.opts);q.pos=layoutBubbles(q.opts.length);   // 點錯洗牌換位置
        toast('再想想～答案就在剛剛的辦案過程裡');render();}
    };
    bw.appendChild(b);
  });
  card.appendChild(bw);
  if(locked){const t=el('div','');t.style.cssText='text-align:center;color:var(--gold);font-weight:900;font-size:14px';
    t.textContent='等一下下… '+Math.ceil((q.lockUntil-now)/1000);card.appendChild(t);
    clearTimeout(chQuiz._t);chQuiz._t=setTimeout(render,400);}
  wrap.appendChild(card);
}
function textOf(t){return t;}
function layoutBubbles(n){
  const d=Math.max(96,Math.min(140,Math.floor(520/n)+52));
  const out=[];const cols=n<=2?2:2, rows=Math.ceil(n/cols);
  for(let i=0;i<n;i++){
    const cx=(i%cols),cy=Math.floor(i/cols);
    out.push({x:18+cx*64+(Math.random()*10-5), y:22+cy*(70/Math.max(1,rows-1||1))+(Math.random()*8-4), d});
  }
  return out;
}

function chapterCleared(c){
  const first=!(S.clearedList||[]).includes(c.id);
  S.clearedList=S.clearedList||[];
  if(first){S.clearedList.push(c.id);addCoins(COIN_PER_CH,'s2w03_ch_'+c.id,'S2-W03 破章：'+c.title);}
  save();go('chapter','clear');
}

function chClear(c){
  const card=el('div','card pop');
  const h=el('h2','','第 '+(S.ci+1)+' 章・破了！');h.style.marginBottom='8px';card.appendChild(h);
  if(c.evidence){const im=pic(c.evidence);im.style.cssText='height:130px;margin:6px auto';card.appendChild(im);}
  const n=el('div','note');n.innerHTML='<b>新線索：'+c.clue.name+'</b><br>'+c.clue.text;card.appendChild(n);
  card.appendChild(clueBoard());
  if(c.bridge){const p=el('p','',c.bridge);p.style.marginTop='10px';card.appendChild(p);}
  const last=S.ci>=CH.length-1;
  const b=el('button','btn',last?'公布真相':'進入第 '+(S.ci+2)+' 章');
  b.style.cssText='margin-top:14px;width:100%';
  b.onclick=()=>{if(last){go('done');}else{S.ci++;S.sub='lead';S.round=0;save();render();}};
  card.appendChild(b);
  wrap.appendChild(card);
}
function clueBoard(){
  const b=el('div','board');b.style.marginTop='11px';
  b.appendChild(el('h3','','線索板（'+S.clues.length+' / '+CH.length+'）'));
  const g=el('div');g.style.cssText='display:flex;flex-wrap:wrap;gap:7px;margin-top:7px';
  CH.forEach((c,i)=>{
    const got=S.clues.find(x=>x.id===c.clue.id);
    const d=el('div','');d.style.cssText='flex:1 1 150px;border:2px solid '+(got?'var(--good)':'var(--line)')+
      ';border-radius:11px;padding:8px 10px;background:'+(got?'rgba(79,224,138,.1)':'rgba(255,255,255,.03)');
    d.innerHTML='<div style="font-weight:900;font-size:13px;color:'+(got?'var(--good)':'var(--dim)')+'">'+
      (got?'✓ '+c.clue.name:'第 '+(i+1)+' 章・未解')+'</div>'+
      (got?'<div style="font-size:12px;color:var(--ink2);margin-top:3px;line-height:1.5">'+c.clue.text+'</div>':'');
    g.appendChild(d);
  });
  b.appendChild(g);return b;
}

/* ---- 結局：頒獎 ---- */
function renderDone(){
  if(!S.done){S.done=true;addCoins(COIN_SOLVE,'s2w03_solve','S2-W03 破案：消失的慶典皇冠');
    CH.forEach(c=>Account.creditCoins('s2w03_ch_'+c.id,COIN_PER_CH,'S2-W03 破章：'+c.title));save();}
  const card=el('div','card pop');
  const im=pic('s2w03-truth.jpg','cover');im.style.height='clamp(160px,28vh,250px)';card.appendChild(im);
  const h=el('h2','','破案！皇冠回來了');h.style.margin='12px 0 6px';card.appendChild(h);
  card.appendChild(el('p','','林主席在天亮前把修好的皇冠送了回來。她說她只是怕寶石在典禮上掉下來，卻用錯了方法——慶典照常舉行，這次由你戴著偵探徽章站在台上。'));
  const n=el('div','note');n.style.marginTop='11px';
  n.innerHTML='<b>你學會的事：</b>同一個問題，問法不變、只要換一個<b>長度</b>，拿到的答案就完全不同。<br>'+
    '要重點 → 一句話；要補齊細節 → 一段話；有硬限制 → 指定字數。<b>問對長度，才拿得到能用的答案。</b>';
  card.appendChild(n);
  card.appendChild(clueBoard());
  const coin=el('div','');coin.style.cssText='text-align:center;font-weight:900;color:var(--gold);font-size:20px;margin-top:12px';
  coin.textContent='本課共獲得 '+(S.coins||0)+' 金幣';card.appendChild(coin);
  const ta=el('button','btn blue',S.ta?'已成為小偵探學長 ✓':'我是小偵探學長 · 去教一位同學');
  ta.style.cssText='margin-top:12px;width:100%';ta.disabled=!!S.ta;
  ta.onclick=()=>{S.ta=true;addCoins(COIN_TA,'s2w03_ta','S2-W03 小老師 TA');
    toast('去教一位同學：怎麼決定要問多長');render();};
  card.appendChild(ta);
  const again=el('button','btn ghost','再玩一次（不會重複發金幣）');
  again.style.cssText='margin-top:8px;width:100%';
  again.onclick=()=>{const keep={coins:S.coins,ta:S.ta,done:S.done};S=Object.assign(defaultState(),keep,{phase:'start'});
    Object.keys(quizState).forEach(k=>delete quizState[k]);_linkState=null;save();render();};
  card.appendChild(again);
  wrap.appendChild(card);
}

/* =========================================================================
   啟動：本地為即時真相、雲端背景比對取較遠者
   ========================================================================= */
Account.init();renderAcct();
window.addEventListener('online',renderAcct);window.addEventListener('offline',renderAcct);
render();
(async()=>{try{const cloud=await Account.load();
  if(cloud&&cloud.v===VERSION&&progressScore(cloud)>progressScore(S)){S=cloud;save();render();}
  else Account.save(S);}catch(e){}renderAcct();})();

/* ---------- 測試接口（免截圖驗證；學生端無副作用） ---------- */
window.W3S=({S:()=>S,go:(p,s)=>go(p,s),render,CH,LEN,SLOTS,LINKS,
  chapter:(i,sub)=>{S.phase='chapter';S.ci=i;S.sub=sub||'lead';S.round=0;render();},
  pick:(k)=>{const c=CH[S.ci];const rs=c.rounds||[{answers:c.answers,want:c.want,hint:c.hint,ask:c.ask}];
    pickLen(c,rs[S.round],k);return chState(c.id,S.round);},
  state:()=>{const c=CH[S.ci];return chState(c.id,S.round);},
  fillSpots:()=>{const c=CH[S.ci];S.facts[c.id]=c.spots.map((_,i)=>i);render();},
  fillBoard:()=>{SLOTS.forEach(s=>S.board[s.t]=s.who);save();render();},
  fillLinks:()=>{S.links=LINKS.map((_,i)=>i);save();render();},
  answerQuiz:()=>{const c=CH[S.ci];const q=quizState[c.id];if(!q)return 'no-quiz';
    q.lockUntil=0;const i=q.opts.findIndex(o=>o.ok);document.querySelectorAll('.bub')[i].click();return 'ok';},
  reset:()=>{S=defaultState();save();render();}});
</script>

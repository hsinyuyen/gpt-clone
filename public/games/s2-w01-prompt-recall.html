/* ---------- 音效（程序化 WebAudio；靜音安全） ---------- */
const Sfx=(()=>{let ac=null; function ctx(){try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();}catch(e){} return ac;}
  function tone(f,d,t,v){const a=ctx(); if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type=t||'sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,a.currentTime); g.gain.linearRampToValueAtTime(v||.06,a.currentTime+.01); g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+(d||.15));
    o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+(d||.15));}
  return {tick(){tone(430,.06,'triangle',.05);}, snap(){tone(680,.08,'sine',.06);}, ding(){tone(880,.12,'sine',.06); setTimeout(()=>tone(1320,.14,'sine',.05),70);},
    pop(){tone(300,.12,'square',.05);}, win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.16,'square',.05),i*90));}, resume(){ctx();}};
})();

  async function creditCoins(id,amount,reason){if(!ready||!(amount>0))return; const ref=db.collection('coins').doc(uid);

      if(txs.some(t=>t&&t.id===id))return; txs.push({id,amount,reason,timestamp:new Date().toISOString()}); tx.set(ref,{balance:(c.balance||0)+amount,totalEarned:(c.totalEarned||0)+amount,transactions:txs.slice(-160)});});}catch(e){}}

function defaultState(){return {v:VERSION, screen:'start', round:0, coins:0, done:false, pct:0};}

function load(){try{const r=JSON.parse(localStorage.getItem(STORE)); if(r&&r.v===VERSION&&r.screen)return r;}catch(e){} return defaultState();}
function screenIdx(s){return SCREENS.indexOf(s);}
function totalRounds(){let t=0; for(const k in ROUNDS)t+=ROUNDS[k]; return t;}
function doneRounds(){let t=0; for(let i=1;i<screenIdx(S.screen);i++){t+=ROUNDS[SCREENS[i]]||0;} return t+(S.round||0);}
function overallPct(){if(S.done)return 1; return clamp(doneRounds()/totalRounds(),0,1);}
function progressScore(s){if(!s||s.v!==VERSION)return -1; let r=0; for(let i=1;i<screenIdx(s.screen);i++)r+=ROUNDS[SCREENS[i]]||0; return screenIdx(s.screen)*1000+r+(s.round||0)+(s.done?500:0);}
function save(){S.pct=S.done?1:overallPct(); try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){} if(Account.ready){clearTimeout(save._t); save._t=setTimeout(()=>Account.save(S),700);}}

/* =========================================================================
   通用拖拉引擎（指標事件；判定放大、靠近吸附；失誤靜音回彈 = 防挫折 M2/M4）
   ========================================================================= */
function makeDraggable(card, getSlots, onDrop){
  let drag=null;
  card.addEventListener('pointerdown', e=>{
    if(card.classList.contains('placed')||card.classList.contains('locked'))return;
    Sfx.resume(); card.setPointerCapture(e.pointerId);
    const r=card.getBoundingClientRect(); drag={dx:e.clientX-r.left, dy:e.clientY-r.top, x0:r.left, y0:r.top};
    card.classList.add('dragging'); card.style.position='fixed'; card.style.left=r.left+'px'; card.style.top=r.top+'px'; card.style.width=r.width+'px'; card.style.margin='0';
    Sfx.tick();
  });
  card.addEventListener('pointermove', e=>{ if(!drag)return; card.style.left=(e.clientX-drag.dx)+'px'; card.style.top=(e.clientY-drag.dy)+'px';
    const s=nearestSlot(getSlots(),e.clientX,e.clientY); getSlots().forEach(sl=>sl.classList.toggle('hover', sl===s)); });
  const end=e=>{ if(!drag)return; card.classList.remove('dragging');
    const slots=getSlots(); const s=nearestSlot(slots,e.clientX,e.clientY); slots.forEach(sl=>sl.classList.remove('hover'));
    const ok = s && onDrop(card,s);
    if(!ok){ card.style.transition='left .18s,top .18s'; card.style.left=drag.x0+'px'; card.style.top=drag.y0+'px';
      setTimeout(()=>{card.style.position=''; card.style.left=card.style.top=card.style.width=card.style.transition=card.style.margin=''; },190); }
    drag=null;
  };
  card.addEventListener('pointerup', end); card.addEventListener('pointercancel', end);
}
function nearestSlot(slots,x,y){let best=null,bd=1e9; slots.forEach(s=>{const r=s.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const inside=x>=r.left-40&&x<=r.right+40&&y>=r.top-40&&y<=r.bottom+40; const d=Math.hypot(x-cx,y-cy);   // 判定放大 ±40
  if(inside&&d<bd){bd=d;best=s;}}); return (best&&bd<=Math.max(160, best.getBoundingClientRect().width))?best:best;}
function placeInto(card,slot){ // 把 card 視覺塞進 slot
  card.classList.add('placed'); card.style.position=''; card.style.left=card.style.top=card.style.width=card.style.transition=card.style.margin='';
  slot.classList.add('filled'); slot.innerHTML=''; slot.appendChild(card); Sfx.snap();}

/* ---------- 防挫折：逾時提示 → 再逾時靜音放行 ---------- */
let roundTimer=null, hintRing=null;
function armAntiStuck(getHintTargets, autoPass){ clearAntiStuck();
  roundTimer=setTimeout(()=>{ showHint(getHintTargets()); roundTimer=setTimeout(()=>{ clearAntiStuck(); autoPass(); }, 15000); }, 22000); }
function showHint(targets){ (targets||[]).forEach(t=>{ if(!t)return; const r=t.getBoundingClientRect(); const ring=el('div','hint-ring');
  const sz=Math.max(r.width,r.height)+24; ring.style.width=ring.style.height=sz+'px'; ring.style.left=(r.left+r.width/2-sz/2)+'px'; ring.style.top=(r.top+r.height/2-sz/2)+'px'; stage.appendChild(ring); setTimeout(()=>ring.remove(),3000); }); }
function clearAntiStuck(){ clearTimeout(roundTimer); roundTimer=null; }

/* ---------- 過場 ---------- */
function transition(text,sub,dur,then){ overlay.innerHTML=''; overlay.appendChild(el('div','big',text)); if(sub){const s=el('div','sub'); s.innerHTML=sub; overlay.appendChild(s);} overlay.classList.add('on');
  setTimeout(()=>{overlay.classList.remove('on'); overlay.innerHTML=''; if(then)then();}, dur||1500); }

function confetti(){ const cols=['#ffd75e','#2bd17e','#5bc0ff','#ff7ab0','#9b6bd6']; for(let i=0;i<70;i++){ const c=el('div','confetti'); c.style.left=Math.random()*100+'%'; c.style.background=cols[i%cols.length];
  c.style.transform='rotate('+Math.random()*360+'deg)'; stage.appendChild(c); const dur=1200+Math.random()*1400; c.animate([{transform:c.style.transform,top:'-20px',opacity:1},{top:'110%',opacity:.9}],{duration:dur,easing:'cubic-bezier(.3,.7,.5,1)'}); setTimeout(()=>c.remove(),dur);} }
function flyCoin(fromEl){ const t=$('#coins').getBoundingClientRect(); const r=(fromEl||stage).getBoundingClientRect(); const f=el('div','fly'); f.style.width=f.style.height='16px'; f.style.borderRadius='50%'; f.style.background='radial-gradient(circle at 35% 30%,#fff2b0,#ffd75e)'; f.style.left=(r.left+r.width/2)+'px'; f.style.top=(r.top+r.height/2)+'px'; document.body.appendChild(f);
  f.animate([{left:f.style.left,top:f.style.top,opacity:1},{left:(t.left+10)+'px',top:(t.top+10)+'px',opacity:.4}],{duration:650,easing:'cubic-bezier(.4,0,.3,1)'}); setTimeout(()=>f.remove(),650); }

function setScreen(name,round){ S.screen=name; S.round=round||0; save(); renderTop(); render(); }
function nextRound(){ const total=ROUNDS[S.screen]||0; if(S.round+1>=total){ nextScreen(); } else { S.round++; save(); renderTop(); render(); } }

function redoScreen(){ clearAntiStuck(); S.round=0; save(); render(); }

function clearStage(){ [...stage.children].forEach(c=>{ if(c.id!=='overlay')c.remove(); }); }
function passRound(fromEl){ clearAntiStuck(); Sfx.ding(); save(); const total=ROUNDS[S.screen]||1;
  if(S.round+1>=total){ setTimeout(()=>nextRound(),620); } else { setTimeout(()=>nextRound(),520); } }

// S1 三要素配對
R.recall=()=>{ const d=RECALL[S.round%RECALL.length]; const s=el('div','screen'); s.appendChild(roundBadge());
  s.appendChild(hcap('把三張卡拖進對應顏色的空格')); const center=el('div','center');

  const frame=el('div','qcard'); frame.style.maxWidth='600px'; frame.style.display='flex'; frame.style.flexWrap='wrap'; frame.style.alignItems='center'; frame.style.gap='6px'; frame.style.justifyContent='center';

  let done=0;

    makeDraggable(card, ()=>Object.values(slots), (c,slot)=>{ const want=slot.dataset.type; if(c.dataset.type!==want)return false; if(slot.classList.contains('filled'))return false;
      placeInto(c,slot); done++; if(done===3){ okFx(frame); passRound(); } return true; }); });
  center.appendChild(pool); s.appendChild(center);

  let opts=shuffle([{txt:goodText,good:true},{txt:d.b,good:false}]);
  const wrap=el('div','col');

  opts.forEach(o=>{ const c=el('button','choice'); c.textContent=o.txt; c.onclick=()=>{ if(o.good){ c.classList.add('right'); Sfx.snap(); [...wrap.children].forEach(x=>x.disabled=true); startStep2(); }
      else { c.classList.add('wrong'); c.disabled=true; Sfx.pop(); /* 反硬A：點錯永久鎖定＋洗牌 */ reshuffle(wrap); } }; wrap.appendChild(c); });
  function reshuffle(w){ const kids=shuffle([...w.children]); kids.forEach(k=>w.appendChild(k)); }
  function startStep2(){ s.querySelector('.hcap').innerHTML='把「角色・背景・問題」三張標籤，拖到好問法對應的部分'; step2.style.display='flex';
    const chunks={role:d.g.role,bg:d.g.bg,prob:d.g.prob}; const line=el('div','qcard'); line.style.display='flex'; line.style.flexWrap='wrap'; line.style.gap='6px'; line.style.justifyContent='center'; line.style.maxWidth='600px';
    const slots={}; ['role','bg','prob'].forEach((t,i)=>{ const box=el('div'); box.style.textAlign='center'; const seg=el('div'); seg.textContent=chunks[t]; seg.style.fontWeight='800'; seg.style.marginBottom='4px';
      const sl=mkSlot(t); sl.style.minWidth='84px'; sl.textContent=''; slots[t]=sl; box.appendChild(seg); box.appendChild(sl); line.appendChild(box); if(i<2)line.appendChild(txt('＋')); });
    step2.appendChild(line);
    const pool=el('div','pool'); let done=0;
    shuffle(['role','bg','prob']).forEach(t=>{ const tag=mkTag(t); pool.appendChild(tag);
      makeDraggable(tag, ()=>Object.values(slots), (cc,slot)=>{ if(slot.dataset.type!==cc.dataset.type||slot.classList.contains('filled'))return false; placeInto(cc,slot); done++; if(done===3){okFx(line); passRound();} return true; }); });
    step2.appendChild(pool);
    armAntiStuck(()=>Object.values(slots), ()=>passRound());
  }
  center.appendChild(wrap); center.appendChild(step2); s.appendChild(center); stage.appendChild(s); };

// S3 缺什麼補完整
R.taskA2=()=>{ const d=TASKA2[S.round%TASKA2.length]; const s=el('div','screen'); s.appendChild(roundBadge());
  const missName=TYPES[d.miss[0]].name; s.appendChild(hcap('這個問法「缺了什麼」？把正確的卡片補進空格'));
  const center=el('div','center'); const line=el('div','qcard'); line.style.display='flex'; line.style.flexWrap='wrap'; line.style.gap='6px'; line.style.justifyContent='center'; line.style.alignItems='center'; line.style.maxWidth='600px';
  // present chunks + one empty slot（依原順序 role,bg,prob 混排：這裡用 have 順序，缺的插在中間）
  const parts=[]; d.have.forEach(h=>parts.push({type:h[0],txt:h[1],have:true})); parts.push({type:d.miss[0],txt:null,have:false});
  const ordered=shuffle(parts);
  const slot=mkSlot(d.miss[0]); slot.textContent='缺「'+missName+'」';
  ordered.forEach((p,i)=>{ if(p.have){ const c=el('div','card '+TYPES[p.type].cls); c.appendChild(el('span','tag',TYPES[p.type].name)); c.appendChild(txt(p.txt)); c.classList.add('placed'); line.appendChild(c); }
    else line.appendChild(slot); if(i<ordered.length-1)line.appendChild(txt('，')); });
  center.appendChild(line);
  // options：正解 + 兩張別型干擾
  const others=['role','bg','prob'].filter(t=>t!==d.miss[0]);
  const opts=shuffle([ {type:d.miss[0],txt:d.miss[1]}, {type:others[0],txt:distractor(others[0])}, {type:others[1],txt:distractor(others[1])} ]);
  const pool=el('div','pool');
  opts.forEach(o=>{ const c=mkCard(o.type,o.txt); pool.appendChild(c);
    makeDraggable(c, ()=>[slot], (cc,sl)=>{ if(cc.dataset.type!==d.miss[0]){ return false; } placeInto(cc,sl); okFx(line); passRound(); return true; }); });
  center.appendChild(pool); s.appendChild(center);
  armAntiStuck(()=>[slot], ()=>passRound()); stage.appendChild(s); };

// S4 組裝工廠（產出看得見）
R.taskB1=()=>{ const d=TASKB1[S.round%TASKB1.length]; const s=el('div','screen'); s.appendChild(roundBadge());
  if(S.round===0){ const mem=el('div'); mem.innerHTML=MEM; mem.style.margin='2px 0 6px'; s.appendChild(mem); }  // 記憶點②
  s.appendChild(hcap('情境：'+d.sc+'。把 角色＋背景＋問題 各拖一張，組成好問法！'));
  const center=el('div','center');
  const frame=el('div','qcard'); frame.style.maxWidth='600px'; frame.style.display='flex'; frame.style.flexWrap='wrap'; frame.style.gap='6px'; frame.style.alignItems='center'; frame.style.justifyContent='center';
  const slots={role:mkSlot('role'),bg:mkSlot('bg'),prob:mkSlot('prob')};
  frame.appendChild(slots.role); frame.appendChild(txt('＋')); frame.appendChild(slots.bg); frame.appendChild(txt('＋')); frame.appendChild(slots.prob);
  const quality=el('div','quality'); const qi=el('i'); quality.appendChild(qi);
  const resp=el('div','airesp'); resp.innerHTML='<span class="who">AI 終端機</span><span class="txt">組好問法，我就會回答囉～</span>';
  center.appendChild(frame); center.appendChild(quality); center.appendChild(resp);
  // 卡池：正解 3 + 干擾（別回合的）
  const pool=el('div','pool'); let done=0;
  const cards=[mkCard('role',d.role),mkCard('bg',d.bg),mkCard('prob',d.prob),
    mkCard('role',distractor('role',d.role)),mkCard('bg',distractor('bg',d.bg)),mkCard('prob',distractor('prob',d.prob))];
  shuffle(cards).forEach(c=>{ pool.appendChild(c);
    makeDraggable(c, ()=>Object.values(slots), (cc,slot)=>{ if(slot.dataset.type!==cc.dataset.type||slot.classList.contains('filled'))return false;
      // 只有「正解卡」算對；干擾卡雖同色也允許放（避免懲罰），但要三張正解到位才通關 → 用文字比對
      placeInto(cc,slot); slot.dataset.val=cc.dataset.val; recompute(); return true; }); });
  function recompute(){ let n=0; ['role','bg','prob'].forEach(t=>{ if(slots[t].dataset.val)n++; }); qi.style.width=Math.round(n/3*100)+'%';
    const allRight = slots.role.dataset.val===d.role && slots.bg.dataset.val===d.bg && slots.prob.dataset.val===d.prob;
    if(n===3){ if(allRight){ qi.style.width='100%'; resp.querySelector('.txt').textContent=d.ai; resp.style.borderColor='#2bd17e'; okFx(frame); Sfx.win(); passRound(); }
      else { resp.querySelector('.txt').textContent='嗯…有一張放得不太對，換一張看看？'; } } }
  center.appendChild(pool); s.appendChild(center);
  armAntiStuck(()=>Object.values(slots), ()=>{ resp.querySelector('.txt').textContent=d.ai; passRound(); }); stage.appendChild(s); };

// S5 角色扮演回放
R.taskB2=()=>{ const d=TASKB2[S.round%TASKB2.length]; const s=el('div','screen'); s.appendChild(roundBadge());
  s.appendChild(hcap(d.sc+'。把正確的「角色卡」拖進去！'));
  const center=el('div','center');
  const frame=el('div','qcard'); frame.style.maxWidth='560px'; frame.style.display='flex'; frame.style.flexWrap='wrap'; frame.style.gap='6px'; frame.style.alignItems='center'; frame.style.justifyContent='center';
  frame.appendChild(txt('請你當「')); const slot=mkSlot('role'); slot.style.minWidth='96px'; frame.appendChild(slot); frame.appendChild(txt('」，回我一句話。'));
  const resp=el('div','airesp'); resp.innerHTML='<span class="who">AI 終端機</span><span class="txt">選對角色，我就用它的口氣回你～</span>';
  center.appendChild(frame); center.appendChild(resp);
  const distr=shuffle(ROLE_POOL.filter(r=>r!==d.role)).slice(0,2);
  const pool=el('div','pool');
  shuffle([d.role,...distr]).forEach(rn=>{ const c=mkCard('role',rn); pool.appendChild(c);
    makeDraggable(c, ()=>[slot], (cc,sl)=>{ placeInto(cc,sl);
      if(cc.dataset.val===d.role){ resp.querySelector('.txt').textContent='（'+d.role+'）'+d.ai; resp.style.borderColor='#2bd17e'; okFx(frame); passRound(); }
      else { // 錯角色：靜音回彈、卡片可重來（防挫折）
        resp.querySelector('.txt').textContent='這個角色不太對，換一個試試？'; setTimeout(()=>{ cc.classList.remove('placed'); sl.classList.remove('filled'); sl.textContent=''; pool.appendChild(cc); },250); }
      return true; }); });
  center.appendChild(pool); s.appendChild(center);
  armAntiStuck(()=>[slot], ()=>{ resp.querySelector('.txt').textContent='（'+d.role+'）'+d.ai; passRound(); }); stage.appendChild(s); };

// Rehearsal（taskA 群 / taskB 群 後）：句子接龍
R.rehearsalA=()=>rehearsal('小複習：好問法有哪三樣？');
R.rehearsalB=()=>rehearsal('再複習一次：好問法的公式');
function rehearsal(cap){ const d=CHAIN[Math.floor(Math.random()*CHAIN.length)]; const s=el('div','screen'); s.appendChild(hcap(cap));
  const center=el('div','center'); const q=el('div','qcard'); q.style.fontSize='clamp(16px,4.4vw,22px)'; q.style.fontWeight='900'; q.innerHTML=d.q; center.appendChild(q);
  const row=el('div','row'); shuffle(d.opts).forEach(o=>{ const b=el('button','choice'); b.textContent=o; b.style.textAlign='center'; b.onclick=()=>{ if(o===d.ans){ b.classList.add('right'); okFx(q); passRound(); } else { b.classList.add('wrong'); b.disabled=true; Sfx.pop(); } }; row.appendChild(b); });
  center.appendChild(row); s.appendChild(center); stage.appendChild(s); }

// S6 summary：填空 + 4 反例
R.summary=()=>{ const s=el('div','screen');
  if(S.round===0){ // 填空
    s.appendChild(hcap('把公式填完整'));
    const center=el('div','center'); const q=el('div','qcard'); q.style.fontSize='clamp(18px,4.8vw,24px)'; q.style.fontWeight='900';
    q.innerHTML='好問法 ＝ <span class="r">角色</span> ＋ ____ ＋ <span class="p">問題</span>'; center.appendChild(q);
    const row=el('div','row'); shuffle(['背景','表情','顏色','名字']).forEach(o=>{ const b=el('button','choice'); b.textContent=o; b.style.textAlign='center';
      b.onclick=()=>{ if(o==='背景'){ b.classList.add('right'); okFx(q); passRound(); } else { b.classList.add('wrong'); b.disabled=true; Sfx.pop(); } }; row.appendChild(b); });
    center.appendChild(row); s.appendChild(center);
  } else { // 反例 1..4：這是好問法嗎？
    const d=BADEX[(S.round-1)%BADEX.length]; s.appendChild(roundBadge()); s.appendChild(hcap('這是「好問法」嗎？'));
    const center=el('div','center'); const q=el('div','qcard'); q.style.fontSize='clamp(16px,4.4vw,20px)'; q.textContent=d.t; center.appendChild(q);
    const row=el('div','row');
    const no=el('button','choice'); no.innerHTML='<span class="qmark no">✕</span> 不好'; no.style.display='flex'; no.style.alignItems='center'; no.style.gap='8px';
    const yes=el('button','choice'); yes.innerHTML='<span class="qmark ok">✓</span> 很好'; yes.style.display='flex'; yes.style.alignItems='center'; yes.style.gap='8px';
    no.onclick=()=>{ no.classList.add('right'); const w=el('div','small',d.why); w.style.marginTop='8px'; center.appendChild(w); okFx(q); passRound(); };
    yes.onclick=()=>{ yes.classList.add('wrong'); yes.disabled=true; Sfx.pop(); };
    shuffle([no,yes]).forEach(b=>row.appendChild(b)); center.appendChild(row); s.appendChild(center);
  }
  stage.appendChild(s); };

// S7 wall：技能牆
R.wall=()=>{ const s=el('div','screen'); s.appendChild(hcap('你學會的技能，一塊一塊點進牆裡！'));
  const center=el('div','center'); const wall=el('div','row'); wall.style.minHeight='60px'; wall.style.alignItems='flex-end';
  const floatRow=el('div','row'); let set=0;
  WALL.forEach((name,i)=>{ const b=el('div','brick float'); b.textContent=name; b.style.animationDelay=(i*.2)+'s';
    b.onclick=()=>{ if(b.classList.contains('set'))return; b.classList.remove('float'); b.classList.add('set'); Sfx.snap(); const r=b.getBoundingClientRect();
      floatRow.removeChild(b); wall.appendChild(b); set++; if(set===WALL.length){ okFx(wall); Sfx.win(); setTimeout(()=>nextScreen(),700); } }; floatRow.appendChild(b); });
  center.appendChild(wall); center.appendChild(el('div','small','（點擊上面的磚塊）')); center.appendChild(floatRow); s.appendChild(center); stage.appendChild(s); };

// S8 done：Deliver + 翻轉教育
R.done=()=>{ const s=el('div','screen'); const mac=el('div','machine glow'); mac.innerHTML='<div class="funnel"></div><div class="body"></div><div class="face"><div class="eye"></div><div class="eye"></div></div>'; s.appendChild(mac);
  s.appendChild(hbig('你是 Prompt 高手！'));
  const badge=el('div','badge'); badge.innerHTML='<b>三要素<br>徽章</b>'; const bw=el('div'); bw.style.display='flex'; bw.style.justifyContent='center'; bw.style.margin='6px 0'; bw.appendChild(badge); s.appendChild(bw);
  const mem=el('div'); mem.innerHTML=MEM; s.appendChild(mem);  // 記憶點③
  const coinLine=el('div'); coinLine.style.margin='6px 0'; coinLine.style.fontWeight='900'; coinLine.style.color='var(--gold)'; coinLine.style.fontSize='20px'; coinLine.textContent='+'+COIN_AMT+' 金幣 已存入錢包'; s.appendChild(coinLine);
  const row=el('div','row');
  const raise=el('button','btn','🙋 舉手告訴老師'.replace('🙋','')); raise.textContent='舉手告訴老師！'; raise.onclick=()=>{ raise.textContent='已通知老師 ✓'; raise.disabled=true; markRaise(); };
  const ta=el('button','btn sec','我是小老師 · 去教一位同學'); ta.onclick=()=>{ ta.textContent='已成為小老師 ✓（+TA 12 點）'; ta.disabled=true; markTA(); };
  row.appendChild(raise); row.appendChild(ta); s.appendChild(row);
  stage.appendChild(s);
  if(!S._delivered){ S._delivered=true; deliver(); } };

function deliver(){ S.done=true; S.coins=Math.max(S.coins,COIN_AMT); save(); Account.creditCoins(COIN_ID,COIN_AMT,'S2-W01 Prompt 記憶回放'); renderTop(); confetti(); Sfx.win(); document.getElementById('redo').style.display='none';
  const c=$('#coinN'); if(c)c.textContent=S.coins; }
function markRaise(){ S.raised=true; save(); Account.save&&Account.save(S); }
function markTA(){ S.ta=true; save(); Account.creditCoins('s2w01_ta',12,'S2-W01 小老師 TA'); }

/* ---------- 小工具 ---------- */
function hcap(t){ const c=el('div','subq hcap'); c.textContent=t; return c; }
function hbig(t){ return el('h1',null,t); }
function txt(t){ const s=el('span'); s.textContent=t; s.style.fontWeight='800'; return s; }
function mkSlot(type){ const s=el('div','slot '+TYPES[type].cls); s.dataset.type=type; s.textContent=TYPES[type].name; return s; }
function mkCard(type,val){ const c=el('div','card '+TYPES[type].cls); c.dataset.type=type; c.dataset.val=val; c.appendChild(el('span','tag',TYPES[type].name)); c.appendChild(txt(val)); return c; }
function mkTag(type){ const c=el('div','card '+TYPES[type].cls); c.dataset.type=type; c.style.minHeight='40px'; c.textContent=TYPES[type].name; return c; }
function okFx(node){ if(!node)return; node.animate([{boxShadow:'0 0 0 0 rgba(43,209,126,.6)'},{boxShadow:'0 0 0 8px rgba(43,209,126,0)'}],{duration:600}); }
// 干擾字（別回合借用，避免與正解相同）
function distractor(type,avoid){ const pool={role:[],bg:[],prob:[]};
  TASKB1.forEach(d=>{pool.role.push(d.role);pool.bg.push(d.bg);pool.prob.push(d.prob);});
  TASKA1.forEach(d=>{pool.role.push(d.g.role);pool.bg.push(d.g.bg);pool.prob.push(d.g.prob);});
  const cand=pool[type].filter(x=>x&&x!==avoid); return cand[Math.floor(Math.random()*cand.length)]||({role:'你當老師',bg:'我在上課',prob:'這個怎麼做'})[type]; }

/* ---------- 主渲染 ---------- */
function render(){ clearStage(); document.getElementById('redo').style.display=(S.screen==='start'||S.screen==='done')?'none':'inline-block';
  (R[S.screen]||R.start)(); }

/* ---------- 啟動（含帳號續玩） ---------- */
function boot(){ Account.init(); renderTop(); render(); renderAcct();
  (async()=>{ if(!Account.ready)return; const cloud=await Account.load(); if(cloud&&cloud.v===VERSION&&cloud.screen){ if(progressScore(cloud)>progressScore(S)){ S=cloud; save(); renderTop(); render(); } else { Account.save(S); } } else { Account.save(S); } renderAcct(); })(); }
function renderAcct(){ const a=$('#acct'); if(Account.ready){ a.innerHTML='<span class="dot ok"></span> 已綁定帳號：'+(Account.name||'已登入')+'　金幣會存進帳號'; } else { a.innerHTML='<span class="dot warn"></span> 訪客模式：進度只存這台電腦。<a href="/login" style="color:#8fd0ff">登入</a>後綁定'; } }
boot();
</script>

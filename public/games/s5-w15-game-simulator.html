<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S5-W15 遊戲開發模擬器｜Lab Terminal</title>
<!-- Firebase（compat CDN）：讓進度與金幣綁定登入帳號、跨裝置同步 -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0b1020;
    --bg-2: #121a33;
    --panel: #16203d;
    --panel-2: #1d2a4d;
    --line: #2b3a63;
    --ink: #e8eeff;
    --ink-dim: #93a3c9;
    --accent: #5b8cff;
    --accent-2: #7c5cff;
    --good: #2bd17e;
    --good-bg: rgba(43,209,126,.12);
    --bad: #ff5d6c;
    --bad-bg: rgba(255,93,108,.12);
    --gold: #ffce47;
    --shadow: 0 10px 40px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(91,140,255,.15), transparent 60%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap { width: 100%; max-width: 1080px; padding: 16px; flex: 1; display: flex; flex-direction: column; }

  /* ===== two-column layout: left workspace / right interaction ===== */
  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; margin-top: 16px; align-items: start; }
  .layout.solo { grid-template-columns: 1fr; max-width: 820px; margin-left: auto; margin-right: auto; width: 100%; }
  .layout.solo .leftcol { display: none; }
  .leftcol { position: sticky; top: 176px; display: flex; flex-direction: column; gap: 16px; }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
    .leftcol { position: static; }
  }

  .workspace { background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
  .ws-head { padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 14px; background: var(--panel-2); }
  .ws-head .folder { width: 18px; height: 18px; color: var(--gold); }
  .ws-head small { color: var(--ink-dim); font-weight: 600; margin-left: auto; }
  .ws-files { padding: 8px; display: flex; flex-direction: column; gap: 3px; max-height: 168px; overflow: auto; }
  .ws-file { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--ink-dim); border: 1px solid transparent; font-family: "Consolas",monospace; }
  .ws-file:hover { background: var(--panel-2); }
  .ws-file.active { background: var(--panel-2); border-color: var(--line); color: var(--ink); }
  .ws-file.justsaved { animation: savein .55s ease both; }
  @keyframes savein { from { background: var(--good-bg); transform: translateX(-8px); opacity: 0; } to { opacity: 1; } }
  .ws-file .fic { width: 15px; height: 15px; flex-shrink: 0; color: var(--accent); }
  .ws-empty { padding: 34px 18px; text-align: center; color: var(--ink-dim); font-size: 13px; line-height: 1.8; }
  .ws-preview { border-top: 1px solid var(--line); padding: 14px; min-height: 210px; }
  .ws-pname { font-size: 11px; color: var(--ink-dim); margin-bottom: 10px; font-family: "Consolas",monospace; display: flex; align-items: center; gap: 6px; }
  .ws-saving { font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 8px; padding: 30px 0; justify-content: center; }

  /* markdown / code preview */
  .md-doc h3 { font-size: 15px; color: var(--accent); margin: 0 0 8px; }
  .md-doc h4 { font-size: 13px; color: var(--ink); margin: 11px 0 5px; }
  .md-doc p { font-size: 13px; line-height: 1.75; margin: 4px 0; color: var(--ink); }
  .md-doc ul { margin: 5px 0; padding: 0; }
  .md-doc li { font-size: 13px; line-height: 1.7; list-style: none; display: flex; gap: 8px; align-items: flex-start; margin: 3px 0; color: var(--ink); }
  .md-doc li .bul { color: var(--accent); flex-shrink: 0; }
  .md-chk { width: 15px; height: 15px; border: 1.5px solid var(--ink-dim); border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: inline-flex; align-items: center; justify-content: center; }
  .md-chk.on { background: var(--good); border-color: var(--good); }
  .code-doc { background: #0a1024; border: 1px solid var(--line); border-radius: 8px; padding: 12px; font-family: "Consolas","Monaco",monospace; font-size: 12.5px; line-height: 1.75; color: #cfe0ff; white-space: pre-wrap; overflow: auto; }
  .code-doc .cm { color: #6b87c0; }
  .code-doc .kw { color: #ff9bb0; }

  /* ===== Docked game preview panel (single, non-draggable) ===== */
  .gpwin { background: #0b1226; border: 1px solid var(--accent); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .gp-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: linear-gradient(180deg,#16203d,#101a33); border-bottom: 1px solid var(--line); user-select: none; }
  .gp-dots { display: flex; gap: 4px; }
  .gp-dots i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .gp-dots i:nth-child(1) { background: #ff5d6c; } .gp-dots i:nth-child(2) { background: #ffce47; } .gp-dots i:nth-child(3) { background: #2bd17e; }
  .gp-title { font-size: 13px; font-weight: 800; color: var(--ink); }
  .gp-badge { font-size: 10px; font-weight: 800; margin-left: auto; padding: 2px 8px; border-radius: 999px; }
  .gp-badge.live { background: #2bd17e; color: #06210f; }
  .gp-badge.build { background: rgba(91,140,255,.2); color: var(--accent); }
  .gp-body { padding: 12px; }
  #gpCanvas { width: 100%; max-width: 320px; height: auto; aspect-ratio: 1 / 1; display: block; margin: 0 auto; border-radius: 10px; background: #0a1024; cursor: pointer; }
  .gp-hint { font-size: 12px; color: var(--ink-dim); text-align: center; margin-top: 10px; line-height: 1.5; min-height: 32px; }
  .gp-ctrl { display: none; justify-content: center; gap: 14px; margin-top: 8px; }
  .gp-ctrl.on { display: flex; }
  .gp-ctrl button { width: 64px; height: 42px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-size: 20px; cursor: pointer; user-select: none; }
  .gp-ctrl button:active { background: var(--accent); color: #fff; }
  .ws-note { font-size: 12px; color: var(--ink-dim); line-height: 1.7; text-align: center; padding: 18px 8px; }

  /* ===== Top HUD: journey map + coin ===== */
  .hud {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    position: sticky; top: 8px; z-index: 5;
  }
  .hud-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; letter-spacing: .5px; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--good); box-shadow: 0 0 12px var(--good); }
  .brand small { color: var(--ink-dim); font-weight: 600; }
  .coin { display: flex; align-items: center; gap: 7px; background: rgba(255,206,71,.12); border: 1px solid rgba(255,206,71,.4); color: var(--gold); padding: 6px 12px; border-radius: 999px; font-weight: 800; }
  .coin svg { width: 18px; height: 18px; }

  .map { margin-top: 12px; }
  .map-bar { position: relative; height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
  .map-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .6s cubic-bezier(.2,.8,.2,1); }
  .gates { display: flex; justify-content: space-between; margin-top: 10px; }
  .gate { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .gate .ic { width: 34px; height: 34px; border-radius: 10px; background: var(--panel-2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; transition: .3s; }
  .gate .ic svg { width: 20px; height: 20px; color: var(--ink-dim); transition: .3s; }
  .gate.lit .ic { background: var(--good-bg); border-color: var(--good); box-shadow: 0 0 16px rgba(43,209,126,.4); }
  .gate.lit .ic svg { color: var(--good); }
  .gate span { font-size: 11px; color: var(--ink-dim); font-weight: 700; }
  .gate.lit span { color: var(--ink); }
  .map-pct { text-align: center; margin-top: 8px; font-size: 12px; color: var(--ink-dim); font-weight: 700; }
  .map-pct b { color: var(--accent); }

  /* ===== Screen ===== */
  #screen { min-width: 0; }
  .card {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
    animation: rise .4s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  h1 { font-size: 26px; line-height: 1.3; }
  h2 { font-size: 20px; line-height: 1.35; }
  .sub { color: var(--ink-dim); margin-top: 8px; line-height: 1.7; }
  .key-msg { margin: 14px 0; padding: 12px 14px; border-left: 4px solid var(--accent); background: rgba(91,140,255,.1); border-radius: 0 10px 10px 0; line-height: 1.7; font-weight: 600; }
  .stage-flag { display: inline-flex; align-items: center; gap: 7px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 700; color: var(--ink-dim); }
  .stage-flag b { color: var(--accent); }

  /* AI bubble */
  .ai { display: flex; gap: 12px; margin-top: 16px; }
  .ai .avatar { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 6px 18px rgba(91,140,255,.4); }
  .ai .avatar svg { width: 26px; height: 26px; color: #fff; }
  .ai .bubble { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; border-top-left-radius: 4px; padding: 14px 16px; line-height: 1.85; font-size: 15px; }
  .ai .bubble .term { color: var(--gold); font-weight: 800; border-bottom: 2px dotted var(--gold); }

  /* steps */
  .step { margin-top: 18px; border-top: 1px dashed var(--line); padding-top: 18px; }
  .step.hidden { display: none; }
  .step-label { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: .4px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .step-label .n { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }

  /* ===== Play the finished game (fullscreen) ===== */
  .play-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(5,8,20,.94); display: flex; align-items: center; justify-content: center; padding: 12px; }
  .play-frame { width: min(94vw, 400px); display: flex; flex-direction: column; gap: 10px; }
  .play-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .play-title { font-weight: 800; color: var(--ink); font-size: 15px; }
  .play-close { background: none; border: 1px solid var(--line); color: var(--ink-dim); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .play-close:hover { color: var(--ink); }
  #playCanvas { width: 100%; height: auto; aspect-ratio: 360 / 560; max-height: 72vh; background: #0a1024; border: 1px solid var(--accent); border-radius: 14px; cursor: pointer; touch-action: none; display: block; margin: 0 auto; }
  .play-ctrl { display: flex; justify-content: center; gap: 20px; }
  .play-ctrl button { width: 88px; height: 56px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-size: 26px; cursor: pointer; user-select: none; }
  .play-ctrl button:active { background: var(--accent); color: #fff; }
  .btn.play-cta { background: linear-gradient(135deg, var(--good), #1fae6a); margin-bottom: 6px; }
  .exam-cert { text-align: center; margin-top: 18px; padding: 20px; border: 1px solid var(--good); border-radius: 16px; background: var(--good-bg); animation: pop .4s ease both; }
  .exam-score { font-size: 44px; font-weight: 900; color: var(--good); }
  .exam-grade { font-size: 16px; font-weight: 800; margin-top: 4px; }
  .real-world { margin-top: 14px; border: 1px solid var(--line); border-radius: 12px; background: rgba(91,140,255,.06); overflow: hidden; }
  .real-world summary { cursor: pointer; padding: 11px 14px; font-size: 13px; font-weight: 700; color: var(--accent); list-style: none; display: flex; align-items: center; gap: 8px; }
  .real-world summary::-webkit-details-marker { display: none; }
  .real-world summary svg { width: 15px; height: 15px; }
  .real-world[open] summary { border-bottom: 1px solid var(--line); }
  .rw-body { padding: 12px 16px; }
  .rw-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; color: var(--ink); }
  .rw-sub { font-size: 12px; font-weight: 700; color: var(--accent); margin: 8px 0 4px; }
  .rw-list, .rw-steps { margin: 0 0 4px; padding-left: 20px; }
  .rw-list li, .rw-steps li { font-size: 13px; line-height: 1.7; color: var(--ink); margin: 2px 0; }
  .rw-steps li { list-style: none; }
  .decide-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .decide-btn { padding: 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-size: 15px; font-weight: 700; cursor: pointer; transition: .15s; }
  .decide-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .decide-btn.chosen { border-color: var(--good); background: var(--good-bg); color: var(--good); }
  @media (max-width: 520px){ .decide-opts { grid-template-columns: 1fr; } }
  .quiz-q { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed var(--line); }
  .quiz-q:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .quiz-qtext { font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.6; }
  .options { display: grid; gap: 10px; }
  .opt { text-align: left; padding: 13px 15px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-size: 15px; font-weight: 600; cursor: pointer; transition: .15s; }
  .opt:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
  .opt:disabled { cursor: not-allowed; }
  .opt.locked { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); opacity: .7; text-decoration: line-through; }
  .opt.correct { background: var(--good-bg); border-color: var(--good); color: var(--good); }

  .field { margin-top: 4px; }
  input.txt, textarea.txt {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 12px;
    color: var(--ink); padding: 13px 15px; font-size: 15px; resize: vertical; line-height: 1.6;
  }
  input.txt:focus, textarea.txt:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,140,255,.2); }
  .hint { margin-top: 8px; font-size: 13px; color: var(--ink-dim); line-height: 1.6; -webkit-user-select: none; user-select: none; }
  .feedback { margin-top: 10px; font-size: 14px; font-weight: 700; min-height: 20px; }
  .feedback.ok { color: var(--good); }
  .feedback.no { color: var(--bad); }

  .ai-status { font-size: 13px; font-weight: 700; line-height: 1.5; display: inline-flex; align-items: center; gap: 7px; }
  .ai-status.loading { color: var(--accent); }
  .ai-status.ok { color: var(--good); }
  .ai-status.no { color: var(--bad); }
  .spin { width: 14px; height: 14px; border: 2px solid rgba(91,140,255,.3); border-top-color: var(--accent); border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Stage visual (AI 生成預覽) ===== */
  .visual-wrap { margin-top: 16px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--bg); }
  .visual-wrap.hidden { display: none; }
  .visual-label { font-size: 12px; font-weight: 800; color: var(--accent); padding: 9px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 7px; background: var(--panel-2); }
  .visual-label svg { width: 15px; height: 15px; }
  .visual-stage { padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 150px; }
  .shimmer { width: 100%; height: 150px; border-radius: 10px; background: linear-gradient(100deg, var(--panel-2) 30%, rgba(91,140,255,.22) 50%, var(--panel-2) 70%); background-size: 220% 100%; animation: sh 1.1s linear infinite; }
  @keyframes sh { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .mock { animation: rise .4s ease both; }
  .vcap { text-align: center; font-size: 12px; color: var(--ink-dim); margin-top: 10px; line-height: 1.5; }
  .vcap b { color: var(--ink); }
  /* mock phone screen */
  .phone { width: 188px; }
  .phone .scr-title { font: 700 13px/1 "Noto Sans TC",sans-serif; }
  .float-rock { animation: rockfall 2.4s ease-in infinite; }
  @keyframes rockfall { from { transform: translateY(-6px); } to { transform: translateY(8px); } }
  .glitch { animation: glx .35s steps(2) infinite; }
  @keyframes glx { 0%{transform:translate(0,0)} 50%{transform:translate(1.5px,-1px)} 100%{transform:translate(-1.5px,1px)} }
  .pulse-live { animation: plive 1.1s ease-in-out infinite; }
  @keyframes plive { 0%,100%{opacity:1} 50%{opacity:.4} }
  .check-pop { animation: pop .35s ease both; }

  .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  button.btn {
    border: none; border-radius: 12px; padding: 13px 22px; font-size: 15px; font-weight: 800; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 6px 18px rgba(91,140,255,.35); transition: .15s;
  }
  button.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(91,140,255,.45); }
  button.btn.ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); box-shadow: none; }
  button.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

  .reward { margin-top: 12px; display: inline-flex; align-items: center; gap: 8px; color: var(--gold); font-weight: 800; opacity: 0; transition: .4s; }
  .reward.show { opacity: 1; }

  /* recall 2-step */
  .qline { margin-top: 16px; }
  .qline .qtext { line-height: 1.8; font-size: 15px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(5,8,20,.78); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 20; padding: 16px; }
  .overlay.show { display: flex; }
  .modal { max-width: 560px; width: 100%; background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--accent); border-radius: 18px; padding: 24px; box-shadow: var(--shadow); animation: rise .35s ease both; }
  .modal h2 { margin-bottom: 6px; }
  .blank-inline { display: inline-block; min-width: 90px; border-bottom: 2px solid var(--accent); }

  /* skill wall */
  .wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 18px; }
  .badge { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center; animation: pop .4s ease both; }
  .badge.dim { opacity: .35; }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .badge .bic { width: 40px; height: 40px; margin: 0 auto 8px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; }
  .badge .bic svg { width: 24px; height: 24px; color: #fff; }
  .badge .bt { font-weight: 800; font-size: 14px; }
  .badge .bs { font-size: 12px; color: var(--ink-dim); margin-top: 3px; }

  /* rocket / done */
  .launchpad { position: relative; height: 220px; margin: 18px 0; overflow: hidden; border-radius: 16px; background: linear-gradient(180deg, #0a1230, #142250); border: 1px solid var(--line); }
  .stars::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(2px 2px at 20% 30%, #fff, transparent), radial-gradient(1px 1px at 60% 20%, #fff, transparent), radial-gradient(1.5px 1.5px at 80% 60%, #fff, transparent), radial-gradient(1px 1px at 35% 70%, #fff, transparent), radial-gradient(2px 2px at 75% 40%, #fff, transparent); opacity: .6; }
  .rocket { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); width: 60px; }
  .rocket.go { animation: launch 2.4s cubic-bezier(.4,0,.6,1) forwards; }
  @keyframes launch { 0% { bottom: 14px; } 30% { bottom: 26px; } 100% { bottom: 260px; opacity: .2; } }
  .flame { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); width: 22px; height: 0; background: linear-gradient(180deg, var(--gold), #ff7a3c); border-radius: 0 0 50% 50%; filter: blur(1px); opacity: 0; }
  .rocket.go + .flame { animation: flame 2.4s ease forwards; }

/* 每階段金幣：taskA(0-6)=120，taskB(7-14)=130，合計 250 */
const STAGE_COIN = [17,17,17,17,17,17,18, 16,16,16,16,16,16,16,18];

/* =========================================================
   STAGE VISUAL ENGINE — 視覺類型（與 STAGES 同序）
   wireframe/screen/launch = 互動畫布的遊戲畫面（左側資料夾改指向遊戲預覽）
   ========================================================= */
const STAGE_VIS = ['concept','team','checklist','checklist','checklist','wireframe','screen','gitgraph','screen','code','deploy','aichat','bug','testlist','launch'];

const COLOR_WORDS = { '藍':'#5b8cff','blue':'#5b8cff','紅':'#ff5d6c','red':'#ff5d6c','綠':'#2bd17e','green':'#2bd17e','黃':'#ffce47','yellow':'#ffce47','紫':'#7c5cff','purple':'#7c5cff','橘':'#ff8a3c','orange':'#ff8a3c','粉':'#ff7ab0','pink':'#ff7ab0','青':'#33d6c8','cyan':'#33d6c8','白':'#eef3ff','white':'#eef3ff' };
function pickColors(text){ const out=[]; const t=(text||''); for(const k in COLOR_WORDS){ if(t.toLowerCase().includes(k)){ const c=COLOR_WORDS[k]; if(!out.includes(c)) out.push(c); } } return out; }
function kw(text, words){ const t=(text||'').toLowerCase(); return words.some(w=>t.includes(w.toLowerCase())); }
function gameName(text){ const m=(text||'').match(/(?:做|開發|製作|玩)([^，。,.!！?？、]{1,8}?)的?遊戲/); return (m&&m[1].trim())? m[1].trim()+'遊戲' : '我的遊戲'; }
function esc(s){ return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

/* 手機畫面 mockup — 讀顏色與元素關鍵字 */
function buildScreen(text, kind){
  const cols = pickColors(text);
  const accent = cols[0] || '#5b8cff';
  const accent2 = cols[1] || '#7c5cff';
  const title = esc(gameName(text)).slice(0,8);
  const wantStart = kw(text,['開始','start','play','玩']) || kind==='ui';
  const wantScore = kw(text,['分數','得分','score','計分','積分']) || kind==='vars';
  const wantHP = kw(text,['血','生命','hp','life','心','血量']) || kind==='vars';
  const wantShip = kw(text,['太空船','飛船','火箭','船','ship','角色','主角']) || kind==='feature';
  const wantRock = kw(text,['隕石','石頭','障礙','asteroid','敵人','怪']);
  let body = '';
  if(wantScore) body += `<g><rect x="14" y="60" width="60" height="20" rx="6" fill="#0f1730"/><text x="20" y="74" fill="${accent}" font-size="11" font-weight="700">分數 0</text></g>`;
  if(wantHP) body += `<g>${[0,1,2].map(i=>`<path transform="translate(${128+i*16},64)" d="M5 9 C-2 3 1 -1 5 2 C9 -1 12 3 5 9 Z" fill="${accent2}"/>`).join('')}</g>`;
  if(wantRock) body += [0,1,2].map(i=>`<circle class="float-rock" style="animation-delay:${i*0.5}s" cx="${40+i*55}" cy="${110+i*8}" r="9" fill="#6b7aa8"/>`).join('');
  if(wantShip) body += `<path class="float-rock" d="M94 215 l12 22 -12 -7 -12 7 Z" fill="${accent}" stroke="#fff" stroke-width="1.5"/>`;
  if(wantStart) body += `<g><rect x="44" y="150" width="100" height="34" rx="17" fill="${accent}"/><text x="94" y="172" fill="#fff" font-size="13" font-weight="800" text-anchor="middle">開始</text></g>`;
  return `<svg class="mock phone" viewBox="0 0 188 300" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="184" height="296" rx="22" fill="#0a1024" stroke="${accent}" stroke-width="2"/>
    <rect x="10" y="10" width="168" height="280" rx="16" fill="#111a33"/>
    <rect x="10" y="10" width="168" height="34" rx="16" fill="${accent}"/>
    <rect x="10" y="28" width="168" height="16" fill="${accent}"/>
    <text x="94" y="32" class="scr-title" fill="#fff" text-anchor="middle">${title}</text>
    ${body}
  </svg>`;
}

function buildVisual(idx, text){
  const A='#5b8cff', G='#2bd17e', Y='#ffce47', R='#ff5d6c', P='#7c5cff';
  switch(STAGE_VIS[idx]){
    case 'concept': {
      const name = esc(gameName(text));
      return `<div class="mock" style="text-align:center">
        <svg viewBox="0 0 60 60" width="56" style="margin-bottom:8px"><circle cx="30" cy="26" r="16" fill="${Y}" opacity=".9"/><path d="M24 40h12M26 45h8" stroke="${Y}" stroke-width="3" stroke-linecap="round"/></svg>
        <div style="font-weight:800;font-size:16px">${name}</div>
        <div style="margin-top:8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
          ${['好上手','越玩越緊張','想再玩一次'].map(t=>`<span style="font-size:11px;background:rgba(91,140,255,.15);border:1px solid ${A};color:${A};padding:3px 8px;border-radius:999px">需求：${t}</span>`).join('')}
        </div></div>`;
    }
    case 'team':
      return `<div class="mock" style="text-align:center">
        <svg viewBox="0 0 120 60" width="150"><rect x="6" y="14" width="40" height="34" rx="8" fill="#1d2a4d" stroke="${A}"/><circle cx="26" cy="26" r="6" fill="${A}"/><path d="M16 42c0-6 20-6 20 0" fill="${A}"/><text x="74" y="26" fill="#fff" font-size="12" font-weight="800">你就是 PM</text><text x="74" y="42" fill="${"#93a3c9"}" font-size="10">決定先做什麼</text></svg></div>`;
    case 'checklist': case 'testlist': {
      const items = STAGE_VIS[idx]==='testlist' ? ['移動正常','計分正確','撞到會結束','重玩會重設'] : ['太空船能移動','隕石會掉下','撞到就結束','右上顯示分數'];
      return `<div class="mock" style="width:100%;max-width:240px">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:${G}">${STAGE_VIS[idx]==='testlist'?'測試清單 ✓':'規格書 · 功能清單'}</div>
        ${items.map((t,i)=>`<div class="check-pop" style="animation-delay:${i*0.18}s;display:flex;align-items:center;gap:8px;padding:6px 0">
          <span style="width:18px;height:18px;border-radius:5px;background:${G};display:inline-flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="13" fill="none" stroke="#06210f" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg></span>
          <span style="font-size:13px">${t}</span></div>`).join('')}</div>`;

/* mini markdown renderer */
function renderMd(src){
  const lines = (src||'').split('\n'); let html=''; let inList=false;
  const close=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  for(const raw of lines){
    const line = esc(raw).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(/^#\s+/.test(raw)){ close(); html+='<h3>'+line.replace(/^#\s+/,'')+'</h3>'; }
    else if(/^##\s+/.test(raw)){ close(); html+='<h4>'+line.replace(/^##\s+/,'')+'</h4>'; }
    else if(/^\s*-\s*\[( |x)\]\s+/.test(raw)){ if(!inList){html+='<ul>';inList=true;} const on=/\[x\]/.test(raw); const t=line.replace(/^\s*-\s*\[( |x)\]\s+/,''); html+='<li><span class="md-chk '+(on?'on':'')+'">'+(on?'<svg viewBox=\"0 0 24 24\" width=\"10\" fill=\"none\" stroke=\"#06210f\" stroke-width=\"4\"><path d=\"M4 12l5 5L20 6\"/></svg>':'')+'</span><span>'+t+'</span></li>'; }
    else if(/^\s*[-*]\s+/.test(raw)){ if(!inList){html+='<ul>';inList=true;} html+='<li><span class="bul">•</span><span>'+line.replace(/^\s*[-*]\s+/,'')+'</span></li>'; }
    else if(/^\s*\d+\.\s+/.test(raw)){ if(!inList){html+='<ul>';inList=true;} html+='<li><span class="bul">›</span><span>'+line.replace(/^\s*\d+\.\s+/,'')+'</span></li>'; }
    else if(raw.trim()===''){ close(); }
    else { close(); html+='<p>'+line+'</p>'; }
  }
  close();
  return '<div class="md-doc">'+html+'</div>';
}
function renderCode(src){
  const h = esc(src||'')
    .replace(/(\/\/[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(function|let|const|if|return|var|else)\b/g,'<span class="kw">$1</span>');
  return '<div class="code-doc">'+h+'</div>';
}
// 決策站的 .md 依 S.spec 動態生成，讓學生的決定真的長進檔案
function dynamicMd(idx){
  const sp = S.spec || defaultSpec();
  const control = sp.control==='touch' ? '螢幕按鈕（手指點）' : '方向鍵 ← →';
  const players = sp.players==='double' ? '雙人（多人示意）' : '單人';
  const platform = '網頁（瀏覽器打開就能玩）';
  const framework = sp.framework==='framework' ? '使用框架' : '不用框架（純網頁＋畫布）';
  const cloud = sp.cloudScore==='local' ? '只存這台電腦' : '雲端資料庫（換裝置也看得到）';
  const scoring = sp.scoring==='no' ? '先不顯示分數' : '顯示分數';
  switch(idx){
    case 0: return `# 遊戲需求\n我想做一款：**躲避隕石** 小遊戲\n\n## 玩家想要什麼\n- 操作很簡單，一看就會玩\n- 越玩越緊張、越刺激\n- 想要一直挑戰更高分`;
    case 1: return `# 核心玩法\n- 太空船左右閃避一直掉下來的隕石\n- 撞到隕石 → 遊戲結束\n- **操作方式：** ${control}`;
    case 2: return `# 企劃 · 範圍決定（你是 PM）\n- **這一版做：** ${players}\n- 先把單人(MVP)做好，行有餘力再加多人\n- 多人＝大家連到同一台伺服器，比較難`;
    case 3: return `# 技術選型（用什麼做）\n- **平台：** ${platform}\n- **畫圖：** 用一塊畫布 Canvas\n- **框架：** ${framework}\n- **伺服器：** 先不用`;
    case 4: return `# 規格書 · 功能清單\n- [ ] 太空船能用${control}移動\n- [ ] 隕石會從上面掉下來\n- [ ] 撞到隕石 → 遊戲結束\n- [ ] ${scoring}\n- [ ] 可以重新開始\n- 人數：${players}`;
    case 10: return `# 最高分存哪裡？\n- **變數**：像便條紙，遊戲關掉就不見\n- **資料庫**：像雲端成績簿，存著明天/別台都看得到\n- **這款的最高分存到：** ${cloud}\n\n## 真實世界怎麼接\n- 用 **Firebase** 或 **Supabase** 這種雲端資料庫服務\n- 申請帳號 → 開資料庫 → 拿金鑰(API Key)\n- 破紀錄就 save(分數)，開遊戲時 load() 讀回來`;
    default: return '';
  }
}
function renderArtifactBody(idx){
  const a = ARTIFACTS[idx];
  if(!a) return '';
  if(a.dyn) return renderMd(dynamicMd(idx));
  if(a.kind==='md') return renderMd(a.content);
  if(a.kind==='code') return renderCode(a.content);
  // 遊戲畫面類（原型 / 介面 / 上線）改由下方「遊戲預覽」呈現，避免重複兩個畫面
  if(['wireframe','screen','launch'].includes(STAGE_VIS[idx]))
    return '<div class="ws-note">這個檔案的即時成果，<br>請看下方的「遊戲預覽」 ↓</div>';
  return buildVisual(idx, (S.prompts && S.prompts[idx]) || '');
}

/* =========================================================
   WORKSPACE — 左側專案資料夾（檔案會隨進度累積）
   ========================================================= */
function saveArtifact(idx, promptText){
  if(!S.prompts) S.prompts = {};
  S.prompts[idx] = promptText || '';
  if(!S.artifacts.includes(idx)) S.artifacts.push(idx);
  S.selected = idx;
  S.justSaved = idx;
  save();
  // 存檔動畫：先顯示「存檔中…」再揭曉內容
  renderWorkspace(true);
  setTimeout(() => { S.justSaved = -1; renderWorkspace(false); }, 850);
  GamePreview.sync();
}
function updateLayout(){
  const layout = document.getElementById('layout');
  if(!layout) return;
  const solo = (S.screen==='start' || S.screen==='recall');
  layout.classList.toggle('solo', solo);
}
function renderWorkspace(saving){
  const ws = document.getElementById('workspace');
  if(!ws) return;
  const list = S.artifacts.slice().sort((a,b)=>a-b);
  if(list.length===0){
    ws.innerHTML = `<div class="ws-head"><span class="folder">${ICON_FOLDER}</span> 我的遊戲專案</div>
      <div class="ws-empty">你「請 AI 撰寫」的每個檔案<br>都會存進這個資料夾 →</div>`;
    return;
  }
  if(typeof S.selected!=='number' || !S.artifacts.includes(S.selected)) S.selected = list[list.length-1];
  const files = list.map(idx => {
    const a = ARTIFACTS[idx];
    const cls = 'ws-file' + (idx===S.selected?' active':'') + (idx===S.justSaved?' justsaved':'');
    return `<div class="${cls}" data-idx="${idx}"><span class="fic">${ICON_FILE}</span>${a.file}</div>`;
  }).join('');
  const sel = S.selected;
  const body = (saving && sel===S.justSaved)
    ? `<div class="ws-saving"><span class="spin"></span> AI 撰寫中，存入 ${ARTIFACTS[sel].file}…</div>`
    : renderArtifactBody(sel);
  ws.innerHTML = `
    <div class="ws-head"><span class="folder">${ICON_FOLDER}</span> 我的遊戲專案 <small>${list.length} 個檔案</small></div>
    <div class="ws-files">${files}</div>
    <div class="ws-preview">
      <div class="ws-pname"><span class="fic" style="width:13px;height:13px">${ICON_FILE}</span> ${ARTIFACTS[sel].file}</div>
      ${body}
    </div>`;
  ws.querySelectorAll('.ws-file').forEach(el => {
    el.onclick = () => { S.selected = parseInt(el.dataset.idx,10); save(); renderWorkspace(false); };
  });
}

function gAsteroid(W,scale){ scale=scale||1; const r=(8+Math.random()*6)*scale; const verts=[]; const n=7+Math.floor(Math.random()*4); for(let i=0;i<n;i++){ const ang=(i/n)*6.283, rr=r*(0.72+Math.random()*0.42); verts.push({x:Math.cos(ang)*rr,y:Math.sin(ang)*rr}); } return { x:0,y:-r,r,verts,rot:Math.random()*6.283,vr:(Math.random()-0.5)*0.07,vy:0,scored:false }; }
function gDrawAsteroid(ctx,a){ ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot); ctx.beginPath(); a.verts.forEach((v,i)=> i?ctx.lineTo(v.x,v.y):ctx.moveTo(v.x,v.y)); ctx.closePath(); const g=ctx.createLinearGradient(-a.r,-a.r,a.r,a.r); g.addColorStop(0,'#9aa6c8'); g.addColorStop(1,'#566089'); ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle='#404e74'; ctx.lineWidth=1; ctx.stroke(); ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.arc(a.r*0.22,-a.r*0.1,a.r*0.22,0,6.283); ctx.arc(-a.r*0.26,a.r*0.22,a.r*0.15,0,6.283); ctx.fill(); ctx.restore(); }
function gBurst(p,x,y,c,n){ for(let i=0;i<(n||14);i++){ const ang=Math.random()*6.283,sp=1+Math.random()*3.6; p.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:c}); } }
function gThrust(p,x,y,c){ p.push({x:x+(Math.random()-0.5)*6,y,vx:(Math.random()-0.5)*0.7,vy:1.4+Math.random(),life:0.5,color:c,thr:true}); }
function gUpdateParts(p){ for(let i=p.length-1;i>=0;i--){ const q=p[i]; q.x+=q.vx; q.y+=q.vy; if(!q.thr){ q.vy+=0.05; q.vx*=0.98; } q.life-=q.thr?0.06:0.03; if(q.life<=0) p.splice(i,1); } }
function gDrawParts(ctx,p){ for(const q of p){ ctx.globalAlpha=Math.max(0,q.life); ctx.fillStyle=q.color; ctx.beginPath(); ctx.arc(q.x,q.y,q.thr?2:2.4,0,6.283); ctx.fill(); } ctx.globalAlpha=1; }
function gRR(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function gHeart(ctx,x,y,s,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(x,y+s*0.9); ctx.bezierCurveTo(x-s,y-s*0.3,x-s*0.5,y-s*1.2,x,y-s*0.4); ctx.bezierCurveTo(x+s*0.5,y-s*1.2,x+s,y-s*0.3,x,y+s*0.9); ctx.fill(); }
function gShip(ctx,x,y,cfg,o){ o=o||{}; const s=o.big?1.4:1, accent=cfg.accent||'#5b8cff'; ctx.save(); ctx.translate(x,y);
  if(o.thrust){ const fl=ctx.createRadialGradient(0,15*s,0,0,15*s,13*s); fl.addColorStop(0,'#ffd75e'); fl.addColorStop(1,'rgba(255,120,60,0)'); ctx.fillStyle=fl; ctx.beginPath(); ctx.ellipse(0,15*s,6*s,12*s,0,0,6.283); ctx.fill(); }
  ctx.shadowColor=accent; ctx.shadowBlur=12*s; ctx.fillStyle=accent; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  if(cfg.shipKind==='ball'){ ctx.beginPath(); ctx.arc(0,0,12*s,0,6.283); ctx.fill(); ctx.stroke(); }
  else if(cfg.shipKind==='box'){ gRR(ctx,-11*s,-11*s,22*s,22*s,5*s); ctx.fill(); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(0,-16*s); ctx.lineTo(-12*s,9*s); ctx.lineTo(0,4*s); ctx.lineTo(12*s,9*s); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  ctx.shadowBlur=0; ctx.fillStyle='#dceaff'; ctx.beginPath(); ctx.arc(0,-2*s,3*s,0,6.283); ctx.fill(); ctx.restore(); }

const GamePreview = (function(){
  const W=300, H=300;

  function heart(c,x,y,s,col){ c.fillStyle=col; c.beginPath(); c.moveTo(x,y+s*0.9); c.bezierCurveTo(x-s,y-s*0.3,x-s*0.5,y-s*1.2,x,y-s*0.4); c.bezierCurveTo(x+s*0.5,y-s*1.2,x+s,y-s*0.3,x,y+s*0.9); c.fill(); }

      b.addEventListener('mouseup',up); b.addEventListener('mouseleave',up); b.addEventListener('touchend',up);
    });
    cv.addEventListener('click',()=>{ if(over && F.live) reset(); });
    window.addEventListener('keydown',onKey); window.addEventListener('keyup',onKey);

  function onKey(e){

    const tag=(document.activeElement&&document.activeElement.tagName)||'';
    if(tag==='INPUT'||tag==='TEXTAREA') return;
    const down=e.type==='keydown';
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ keys.dec=down; e.preventDefault(); }
    else if(e.key==='ArrowRight'||e.key==='ArrowDown'){ keys.inc=down; e.preventDefault(); }
  }
  function loop(){ raf=requestAnimationFrame(loop); update(); draw(); }
  function update(){
    gUpdateStars(stars,W,H);
    if(shake>0)shake--; if(inv>0)inv--;
    if(!F.feature || over) return;
    elapsed++;
    const diff = 1 + Math.min(elapsed/3000,1.2) + (P.fast?0.4:0);
    const maxv=4.2, ac=0.7;
    if(P.axis==='x'){ if(keys.dec)vx-=ac; if(keys.inc)vx+=ac; vx*=0.84; vx=Math.max(-maxv,Math.min(maxv,vx)); ship.x+=vx; ship.x=Math.max(16,Math.min(W-16,ship.x)); }
    else { if(keys.dec)vy-=ac; if(keys.inc)vy+=ac; vy*=0.84; vy=Math.max(-maxv,Math.min(maxv,vy)); ship.y+=vy; ship.y=Math.max(44,Math.min(H-12,ship.y)); }
    const sp=shipPos();
    if((keys.dec||keys.inc)&&Math.random()<0.6) gThrust(parts, sp.x, sp.y+(P.axis==='x'?12:0), P.accent2);
    spawnT++;
    const interval=Math.max(16,(P.fast?38:52)/diff);
    if(spawnT>interval){ spawnT=0; const a=gAsteroid(W,1); a.x=14+Math.random()*(W-28); a.vy=(P.fast?1.9:1.3)*diff+Math.random()*1.2; rocks.push(a); }
    for(let i=rocks.length-1;i>=0;i--){ const a=rocks[i]; a.y+=a.vy; a.rot+=a.vr;
      if(a.y>H+14){ rocks.splice(i,1); continue; }
      if(Math.hypot(a.x-sp.x,a.y-sp.y)<a.r+12){
        if(F.bug){ rocks.splice(i,1); continue; }
        if(inv>0) continue;
        rocks.splice(i,1);
        if(F.vars && P.hp){ hp--; gBurst(parts,sp.x,sp.y,P.accent,16); shake=12; inv=60; Sfx.hit();
          if(hp<=0){ over=true; if(P.hiscore && Math.floor(score)>getBest()) setBest(Math.floor(score)); Sfx.over(); } }
        else gBurst(parts,sp.x,sp.y,P.accent2,8);
      }
    }
    if(F.vars && P.score && !over) score += F.bug ? 0 : 0.06*diff;
    gUpdateParts(parts);
  }
  function draw(){
    if(!ctx) return;
    ctx.save();

      if(P.multiplayer){ ctx.globalAlpha=0.4; const sp2=P.axis==='x'?{x:Math.max(16,Math.min(W-16,W-sp.x)),y:sp.y}:{x:W/2+40,y:sp.y}; gShip(ctx,sp2.x,sp2.y,P,{}); ctx.globalAlpha=1; ctx.fillStyle='#93a3c9'; ctx.font='9px sans-serif'; ctx.fillText('（雙人示意：第 2 台船今天先不能動）',W/2,H-4); } }
    else if(F.ui){ ctx.fillStyle=P.accent; ctx.shadowColor=P.accent; ctx.shadowBlur=14; gRR(ctx,W/2-44,H/2-16,88,34,16); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.font='700 13px sans-serif'; ctx.fillText('開始',W/2,H/2+5); }

    if(P.hiscore){ ctx.fillStyle='#ffce47'; ctx.font='700 11px sans-serif'; ctx.fillText('最高分 '+getBest()+'（雲端）', W/2, F.ui?40:14); }

    if(over){ ctx.fillStyle='rgba(5,8,20,.8)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.font='800 18px sans-serif'; ctx.textAlign='center'; ctx.fillText('結束！',W/2,H/2-6);
      ctx.fillStyle='#cfe0ff'; ctx.font='12px sans-serif'; ctx.fillText(F.live?'點一下重新開始':(P.score?('分數 '+Math.floor(score)):'再玩一次'),W/2,H/2+18); }
  }
  function sync(){
    computeFlags();

const PlayGame = (function(){

  }

    btns.forEach(b=>{ const d=b.dataset.d; const dn=e=>{if(e.cancelable)e.preventDefault();keys[d]=true;}; const up=()=>{keys[d]=false;};
      b.addEventListener('mousedown',dn);b.addEventListener('touchstart',dn,{passive:false});b.addEventListener('mouseup',up);b.addEventListener('mouseleave',up);b.addEventListener('touchend',up); });
    cv.addEventListener('click',()=>{ if(phase!=='play'){ phase='play'; reset(); Sfx.start(); } });

/* =========================================================
   ANTI-CHEAT helpers
   ========================================================= */
function blockPaste(el){
  ['paste','drop'].forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); }));
  el.addEventListener('dragover', e => e.preventDefault());
}
function norm(s){ return (s||'').toLowerCase().replace(/\s+/g,'').trim(); }
function validateBlank(value, synonyms){
  const v = norm(value);
  if(!v) return false;
  return synonyms.some(syn => { const n = norm(syn); return v === n || v.includes(n); });
}
// 常見可接受的英數術語（其餘英數雜訊視為亂打）
const TERM_WHITELIST = new Set(['ui','ux','git','qa','mvp','web','app','ai','pm','2d','3d','copilot','prompt','canvas','next','js','html','css','bug','ok']);
// 偵測亂打：連續重複字元、去重字數太少、或夾雜隨機英數雜訊（例如 1c8、單獨亂字母 c）
function looksLikeGibberish(value){
  const raw = (value||'').trim();
  if(/(.)\1{3,}/.test(raw)) return true;
  const uniq = new Set([...raw.replace(/\s/g,'')]).size;
  if(uniq < 5) return true;
  const tokens = raw.match(/[a-zA-Z0-9]+/g) || [];
  for(const t of tokens){
    if(TERM_WHITELIST.has(t.toLowerCase())) continue;
    if(/[a-z]/i.test(t) && /[0-9]/.test(t)) return true;  // 英文數字混雜：1c8、a3b
    if(/^[a-z]$/i.test(t)) return true;                    // 中文句子裡單獨一個亂英文字母：c
  }
  return false;
}
/* 白話 prompt 驗證（取代「必含術語」）：
   字數≥12、不是亂打、而且要講到「一個東西(target)」＋「要它做什麼(behavior)」。
   部分決策站只給單一關鍵字清單(slots.any)，命中一個即可。 */
function validateSlots(value, slots){
  const raw = (value||'').trim();
  if([...raw].length < 12) return false;
  if(looksLikeGibberish(raw)) return false;
  const v = norm(value);
  const hit = list => list.some(w => v.includes(norm(w)));
  if(slots && slots.any) return hit(slots.any);
  if(!slots || !slots.target || !slots.behavior) return [...raw].length >= 12;
  return hit(slots.target) && hit(slots.behavior);
}

        <div class="step-label"><span class="n">2</span> 填出這個專有名詞</div>
        <div class="field"><input class="txt" id="blank" placeholder="輸入專有名詞…" autocomplete="off"></div>
        <div class="hint">${st.blankHint}</div>
        <div class="feedback" id="s3fb"></div>
      </div>

      ${st.decision ? `
      <!-- Step 3.5: 做一個產品決定（二選一） -->
      <div class="step hidden" id="sDecide">
        <div class="step-label"><span class="n">★</span> 做個決定：${st.decision.q}</div>
        <div class="decide-opts" id="decideOpts"></div>
        <div class="feedback" id="decideFb"></div>
      </div>` : ''}

      <!-- Step 4: 用白話一句話告訴 AI 你想讓遊戲做到什麼（AI 幫你做，並自動歸檔） -->
      <div class="step hidden" id="s4">
        <div class="step-label"><span class="n">3</span> ${opts.isClimax ? '寫一句你要對玩家說的「上線宣言」' : '用一句話告訴 AI：這一步你想讓遊戲做到什麼？'}</div>
        <div class="field"><textarea class="txt" id="sent" rows="2" placeholder="${opts.isClimax ? '例：我的躲隕石遊戲正式發布上線，快來挑戰你的最高分！' : (st.taskExample ? esc(st.taskExample) : '用白話講清楚你想要什麼…')}"></textarea></div>
        <div class="hint">用一句通順的白話，講清楚你想讓遊戲做到什麼。不用講專有名詞、不用指定檔名——<b>AI 會幫你判斷寫得清不清楚、方向對不對</b>，聽懂了才會幫你做、並把成果歸到左邊資料夾。不能用貼上。</div>
        <div class="feedback" id="s4fb"></div>
        <div class="row" style="margin-top:10px">
          <button class="btn ghost" id="aiReview" disabled>${opts.isClimax ? '送出上線宣言' : '送出給 AI'}</button>
          <span class="ai-status" id="aiStatus"></span>
        </div>
      </div>

      <div class="row">
        <button class="btn" id="stageNext" disabled>${opts.isClimax ? '發布上線！ →' : '完成這一站 →'}</button>
        <span class="reward" id="reward">${ICON.coin} +${STAGE_COIN[globalIndex]} 金幣</span>
      </div>
    </div>`;

  // build comprehension quiz（多題、選項洗牌、全對才解鎖填空）
  const quizWrap = document.getElementById('quizWrap');
  const quizPassed = new Array(st.quiz.length).fill(false);
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function checkQuizAll(){
    if(quizPassed.every(Boolean)){
      document.getElementById('s2fb').textContent = '✓ 全部答對，你真的讀懂了！';
      document.getElementById('s2fb').className = 'feedback ok';
      document.getElementById('s3').classList.remove('hidden');
    }
  }
  st.quiz.forEach((Q, qi) => {
    const block = document.createElement('div');
    block.className = 'quiz-q';
    block.innerHTML = `<div class="quiz-qtext">${qi+1}. ${Q.q}</div><div class="options"></div>`;
    const optsEl = block.querySelector('.options');
    const order = shuffle(Q.options.map((_, i) => i)); // 洗牌索引，避免「正確答案永遠在同一格」
    order.forEach(origIdx => {
      const b = document.createElement('button');
      b.className = 'opt'; b.textContent = Q.options[origIdx];
      b.onclick = () => {
        if(quizPassed[qi]) return;
        if(origIdx === Q.answer){
          b.classList.add('correct');
          [...optsEl.children].forEach(c => c.disabled = true);
          quizPassed[qi] = true;
          checkQuizAll();
        } else {
          lockWrongOption(b);
          document.getElementById('s2fb').textContent = '這個選項不對，而且被鎖住了。回去把 AI 那段話再讀一次。';
          document.getElementById('s2fb').className = 'feedback no';
        }
      };
      optsEl.appendChild(b);
    });
    quizWrap.appendChild(block);
  });

  // 決策站：填空通過 → 先做決定 → 才解鎖 prompt；非決策站：填空通過直接解鎖 prompt
  let decided = !st.decision;  // 沒有決策就視為已決定
  function revealAfterBlank(){
    if(st.decision) document.getElementById('sDecide').classList.remove('hidden');
    else document.getElementById('s4').classList.remove('hidden');
  }
  if(st.decision){
    const dOpts = document.getElementById('decideOpts');
    st.decision.options.forEach(o => {
      const b=document.createElement('button'); b.className='decide-btn'; b.textContent=o.label;
      b.onclick=()=>{
        if(!S.spec) S.spec=defaultSpec();
        S.spec[st.decision.key]=o.val; save();
        [...dOpts.children].forEach(c=>c.classList.remove('chosen'));
        b.classList.add('chosen');
        const note = st.decision.note && st.decision.note[o.val];
        document.getElementById('decideFb').textContent = '✓ 已決定：' + o.label + (note?'　'+note:'');
        document.getElementById('decideFb').className = 'feedback ok';
        decided = true;
        document.getElementById('s4').classList.remove('hidden');
        GamePreview.sync(); renderWorkspace(false);
        recheck();
      };
      dOpts.appendChild(b);
    });
  }

  // blank
  const blank = document.getElementById('blank'); blockPaste(blank);
  let passBlank=false, passSent=false;
  blank.addEventListener('input', () => {
    passBlank = validateBlank(blank.value, st.synonyms);
    document.getElementById('s3fb').textContent = blank.value ? (passBlank?`✓ 正確：${st.term}`:'還不太對，再讀一次 AI 段落裡被標起來的詞。') : '';
    document.getElementById('s3fb').className = 'feedback ' + (blank.value?(passBlank?'ok':'no'):'');
    if(passBlank) revealAfterBlank();
    recheck();
  });

  // prompt — 本地只看「夠不夠長能送出」；亂碼/離題/語意/方向全交給 AI 判讀
  const task = st || {};
  const MIN_LEN = 6;  // 唯一通用門檻：太短就先別送 API
  const sent = document.getElementById('sent'); blockPaste(sent);
  const aiBtn = document.getElementById('aiReview');
  const aiStatus = document.getElementById('aiStatus');
  let aiOK = false;
  let refineRound = 0;  // re-prompt：第一次 prompt 少了關鍵細節時，要求再講一次

  sent.addEventListener('input', () => {
    const len = [...sent.value.trim()].length;
    passSent = len >= MIN_LEN;
    let msg = '';
    // re-prompt 第二輪：要補上 AI 指出缺的關鍵細節才能再送
    if(passSent && st.refine && refineRound===1 && !st.refine.check(sent.value)){
      passSent = false;
    }
    if(sent.value){
      if(passSent) msg = '可以送出給 AI 看看（AI 會判斷你寫得清不清楚）';
      else if(len < MIN_LEN) msg = `再多寫一點（目前 ${len} 字）`;
      else if(st.refine && refineRound===1) msg = st.refine.hint || '再補上剛剛 AI 問你的那個細節';
    }
    document.getElementById('s4fb').textContent = msg;
    document.getElementById('s4fb').className = 'feedback ' + (sent.value?(passSent?'ok':'no'):'');
    // editing resets any previous AI verdict — must re-send
    aiOK = false; aiStatus.textContent = ''; aiStatus.className = 'ai-status';
    aiBtn.disabled = !passSent;
    recheck();
  });

  aiBtn.onclick = async () => {
    if(!passSent || aiBtn.disabled) return;
    aiBtn.disabled = true;
    aiStatus.className = 'ai-status loading';
    aiStatus.innerHTML = '<span class="spin"></span> AI 正在讀你的指令…';
    try {
      const resp = await fetch('/api/review-sentence', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stage: st.stage, stageGoal: task.goal || '', gameContext: '一款用左右鍵閃避掉落隕石的網頁小遊戲', term: st.term, sentence: sent.value })
      });
      if(!resp.ok) throw new Error('api');
      const data = await resp.json();
      const verdict = !!data.passed;
      if(verdict && tryRefine()) return;  // 觸發 re-prompt → 先不算完成
      aiOK = verdict;
      aiStatus.className = 'ai-status ' + (aiOK?'ok':'no');
      aiStatus.textContent = (aiOK?'✓ ':'✗ ') + (data.feedback || (aiOK?'AI：好的，我來幫你做！':'AI：我不太確定你要什麼，再講清楚一點？'));
      aiBtn.disabled = aiOK; // pass -> lock button; fail -> allow retry after edit
      if(!aiOK) aiBtn.disabled = false;
      if(aiOK){ aiStatus.textContent += `（AI 幫你歸檔成 ${ARTIFACTS[globalIndex].file}，看左邊 →）`; saveArtifact(globalIndex, sent.value); }
    } catch(e) {
      // 離線 / 獨立開啟 / API 不可用 → 沒有 AI 可判讀，退回通用最低檢查：夠長＋不是明顯亂打
      const ok = [...sent.value.trim()].length >= MIN_LEN && !looksLikeGibberish(sent.value);
      if(ok && tryRefine()) return;
      aiOK = ok;
      aiStatus.className = 'ai-status ' + (ok?'ok':'no');
      aiStatus.textContent = ok
        ? `✓ 已歸檔成 ${ARTIFACTS[globalIndex].file}（離線練習模式：沒有 AI 幫你看，記得自己讀通順）`
        : '✗ 離線練習模式：請用通順的話再寫一次（不要亂打）';
      aiBtn.disabled = ok;
      if(ok) saveArtifact(globalIndex, sent.value);
    }
    recheck();
  };

  // re-prompt：第一次 prompt 雖然方向對，但少了關鍵細節 → AI 反問，要求再講一次
  function tryRefine(){
    if(st.refine && refineRound===0 && st.refine.needs(sent.value)){
      refineRound = 1;
      aiOK = false;
      aiBtn.disabled = true; // 必須先編輯補上細節
      aiStatus.className = 'ai-status no';
      aiStatus.textContent = st.refine.ask;
      const h = document.querySelector('#s4 .hint'); if(h) h.textContent = st.refine.hint || h.textContent;
      passSent = false;
      recheck();
      return true;
    }
    return false;
  }

  function recheck(){ document.getElementById('stageNext').disabled = !(passBlank && decided && passSent && aiOK); }

  document.getElementById('stageNext').onclick = () => {
    if(!S.done[globalIndex]){
      S.done[globalIndex] = true;
      S.coins += STAGE_COIN[globalIndex];
      save();
      Account.creditCoins('s5w15_stage_'+globalIndex, STAGE_COIN[globalIndex], '遊戲完成：'+st.stage);
    }
    const rw = document.getElementById('reward'); rw.classList.add('show');
    renderHUD();
    setTimeout(opts.onPass, 650);
  };

  // 測試模式：跳過這關（仍存入產物 + 加金幣，讓預覽/工作區照常推進）
  if(TEST_MODE){
    const sk = document.getElementById('skipStage');
    if(sk) sk.onclick = () => {
      saveArtifact(globalIndex, '（測試略過）');
      if(!S.done[globalIndex]){ S.done[globalIndex] = true; S.coins += STAGE_COIN[globalIndex]; save(); Account.creditCoins('s5w15_stage_'+globalIndex, STAGE_COIN[globalIndex], '遊戲完成：'+st.stage); }
      renderHUD();
      setTimeout(opts.onPass, 150);
    };
  }
}
function highlightTerm(st){
  // 在段落中把第一次出現的 term 標亮（閱讀提示）
  const idx = st.passage.indexOf(st.term);
  if(idx < 0) return st.passage;
  return st.passage.slice(0,idx) + `<span class="term">${st.term}</span>` + st.passage.slice(idx+st.term.length);
}

/* ---------- Rehearsal Modal A / B ---------- */
function openModal(which){
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');

  if(which === 'A'){
    modal.innerHTML = `
      <span class="stage-flag">${ICON.check}<span>排練 · 回顧前半段</span></span>
      <h2 class="mt16">句子接龍</h2>
      <p class="sub">把空格填對，才能繼續。（讀懂前半段就會了）</p>
      <p class="qtext mt16">「做遊戲的第一步不是寫程式，而是先搞清楚使用者要什麼，這叫
        <input class="txt" id="mA1" style="display:inline-block;width:140px" placeholder="____" autocomplete="off">；
        把它列成清單就是
        <input class="txt" id="mA2" style="display:inline-block;width:160px" placeholder="____" autocomplete="off">。」</p>
      <div class="hint mt8">想一想：先「想清楚」還是先「寫程式」？原型是不是最終成品？UI 和 UX 一樣嗎？</div>
      <div class="key-msg" style="text-align:left">${KEY_MSG}</div>
      <div class="feedback" id="mAfb"></div>
      <div class="row"><button class="btn" id="mAok" disabled>完成排練 →</button></div>`;
    overlay.classList.add('show');
    const a1 = modal.querySelector('#mA1'), a2 = modal.querySelector('#mA2');
    [a1,a2].forEach(blockPaste);
    const ok = modal.querySelector('#mAok');
    function chk(){
      const p1 = validateBlank(a1.value, ["需求","requirement"]);
      const p2 = validateBlank(a2.value, ["規格書","規格","spec","功能清單"]);
      modal.querySelector('#mAfb').textContent = (a1.value||a2.value) ? (p1&&p2?'✓ 完全正確！':'再想想：先搞清楚要什麼＝需求；列成清單＝規格書。') : '';
      modal.querySelector('#mAfb').className = 'feedback ' + ((a1.value||a2.value)?(p1&&p2?'ok':'no'):'');
      ok.disabled = !(p1&&p2);
    }
    a1.addEventListener('input',chk); a2.addEventListener('input',chk);
    ok.onclick = () => { overlay.classList.remove('show'); taskTransition(); };
  } else {
    modal.innerHTML = `
      <span class="stage-flag">${ICON.check}<span>排練 · 回顧後半段</span></span>
      <h2 class="mt16">句子接龍（最終回）</h2>
      <p class="sub">四個空格全對，就能抵達終點。</p>
      <p class="qtext mt16">「程式出錯叫
        <input class="txt" id="mB1" style="display:inline-block;width:120px" placeholder="____" autocomplete="off">，
        把它修好叫
        <input class="txt" id="mB2" style="display:inline-block;width:140px" placeholder="____" autocomplete="off">；
        全部試過沒問題後，把遊戲放上網拿到網址叫
        <input class="txt" id="mB3" style="display:inline-block;width:140px" placeholder="____" autocomplete="off">，
        正式公開給大家玩叫
        <input class="txt" id="mB4" style="display:inline-block;width:140px" placeholder="____" autocomplete="off">。」</p>
      <div class="hint mt8">小心：有 bug 不能直接發布；部署 ≠ 發布；除錯不是重寫整個程式。</div>
      <div class="feedback" id="mBfb"></div>
      <div class="row"><button class="btn" id="mBok" disabled>抵達終點 →</button></div>`;
    overlay.classList.add('show');
    const ins = ['#mB1','#mB2','#mB3','#mB4'].map(s => modal.querySelector(s));
    ins.forEach(blockPaste);
    const ok = modal.querySelector('#mBok');
    function chk(){
      const p1 = validateBlank(ins[0].value, ["bug","蟲","錯誤"]);
      const p2 = validateBlank(ins[1].value, ["除錯","debug"]);
      const p3 = validateBlank(ins[2].value, ["部署","deploy"]);
      const p4 = validateBlank(ins[3].value, ["發布","上線","release"]);
      const all = p1&&p2&&p3&&p4;
      const any = ins.some(i=>i.value);
      modal.querySelector('#mBfb').textContent = any ? (all?'✓ 全部正確，出發！':'bug／除錯／部署／發布，對應修錯與上線的四步。') : '';
      modal.querySelector('#mBfb').className = 'feedback ' + (any?(all?'ok':'no'):'');
      ok.disabled = !all;
    }
    ins.forEach(i => i.addEventListener('input',chk));
    ok.onclick = () => { overlay.classList.remove('show'); go('summary'); };
  }
}

function renderExam(){
  const score = { correct:0, answered:0 };
  const total = EXAM.length;

  screen.innerHTML = `
    <div class="card">
      <span class="stage-flag">${ICON.flag}<span>總複習考試</span></span>
      <h2 class="mt16">畢業考：你真的學會了嗎？</h2>

      <div id="examWrap"></div>
      <div id="examResult"></div>
    </div>`;
  const wrap = document.getElementById('examWrap');
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  EXAM.forEach((Q, qi) => {
    const block = document.createElement('div'); block.className='quiz-q';
    block.innerHTML = `<div class="quiz-qtext">${qi+1}. ${Q.q}</div><div class="options"></div>`;
    const optsEl = block.querySelector('.options');
    shuffle(Q.options.map((_,i)=>i)).forEach(origIdx => {
      const b=document.createElement('button'); b.className='opt'; b.textContent=Q.options[origIdx];
      b.onclick=()=>{
        if(b.dataset.locked || optsEl.dataset.done) return;
        optsEl.dataset.done='1';
        score.answered++;
        if(origIdx===Q.answer){ b.classList.add('correct'); score.correct++; }
        else { b.classList.add('locked'); [...optsEl.children].forEach(c=>{ if(c.textContent===Q.options[Q.answer]) c.classList.add('correct'); }); }
        [...optsEl.children].forEach(c=>c.disabled=true);
        if(score.answered===total) finishExam();
      };
      optsEl.appendChild(b);
    });
    wrap.appendChild(block);
  });
  function finishExam(){
    const bonus = score.correct*3;
    if(!S.examDone){ S.examDone=true; S.examScore=score.correct; S.coins += bonus; save(); renderHUD(); Account.creditCoins('s5w15_exam', bonus, '遊戲：總複習考試 '+score.correct+'/'+total); }
    const grade = score.correct===total ? '滿分！你是真正的開發者 🏆'.replace('🏆','') : score.correct>=Math.ceil(total*0.7) ? '很棒！你掌握了開發流程' : '再複習一下，你可以更好';
    document.getElementById('examResult').innerHTML = `
      <div class="exam-cert">
        <div class="exam-score">${score.correct} / ${total}</div>
        <div class="exam-grade">${grade}</div>
        <div class="muted" style="margin-top:6px">考試獎勵 +${bonus} 金幣</div>
        <div class="key-msg" style="text-align:left;margin-top:14px">${KEY_MSG}</div>
        <div class="row" style="justify-content:center"><button class="btn" id="examDone">領取證書 →</button></div>
      </div>`;
    document.getElementById('examResult').scrollIntoView({behavior:'smooth'});
    document.getElementById('examDone').onclick = () => go('done');
  }
}

/* ---------- Screen 6: done ---------- */
function renderDone(){
  const completed = S.done.filter(Boolean).length;
  const pct = Math.round(completed/15*100);
  document.getElementById('screen').innerHTML = `
    <div class="card done-banner">
      <div class="launchpad stars">
        <div class="rocket go">${rocketSVG()}</div>
        <div class="flame"></div>
      </div>
      <div class="big-pct">${pct}%</div>
      <h1>你的遊戲已上線！</h1>
      <p class="sub">從一句話的想法，到正式發布——15 個階段，你全部走完了。</p>
      ${S.examDone ? `<div style="margin-top:12px;font-weight:800;color:var(--good)">總複習考試：${S.examScore} / ${EXAM.length} 分</div>` : ''}
      <div class="coin" style="display:inline-flex;margin-top:14px">${ICON.coin}<span>${S.coins}</span> 金幣已入袋</div>
      <div class="key-msg" style="text-align:left;margin-top:18px">${KEY_MSG}</div>
      <div class="row" style="justify-content:center;margin-top:14px"><button class="btn play-cta" id="playGame">▶ 玩你做好的遊戲</button></div>
      <div><button class="restart" id="restart">重新開始這趟旅程</button></div>
    </div>`;
  document.getElementById('playGame').onclick = () => PlayGame.open();
  document.getElementById('restart').onclick = () => {
    if(confirm('確定要清除進度、重新開始嗎？')){ S = defaultState(); save(); go('start'); }
  };
}

/* =========================================================
   BOOT — 從上次進度繼續（先用本機即時顯示，再從雲端帳號同步）
   ========================================================= */
render();
renderAccountBadge();

(async function cloudSync(){
  if(!Account.ready) return;
  const cloud = await Account.loadProgress();
  if(cloud && cloud.done && cloud.done.length===15){
    // 雲端進度若 >= 本機，採用雲端（換裝置續玩）；否則把本機推上雲端
    if(progressScore(cloud) > progressScore(S)){
      cloud.justSaved=-1;
      if(!cloud.spec) cloud.spec=defaultSpec(); else cloud.spec=Object.assign(defaultSpec(), cloud.spec);
      S = cloud; save(); render();
    } else {
      Account.saveProgress(S);
    }
  } else {
    Account.saveProgress(S); // 帳號第一次玩：把目前進度建到雲端
  }
  renderAccountBadge();
})();

function renderAccountBadge(){
  let el=document.getElementById('acctBadge');
  if(!el){ el=document.createElement('div'); el.id='acctBadge'; el.className='acct-badge'; document.body.appendChild(el); }
  if(Account.ready){ el.innerHTML='<span class="dot ok"></span> 已綁定帳號：'+(esc(Account.name)||'已登入')+'　進度與金幣會跨裝置同步'; }
  else { el.innerHTML='<span class="dot warn"></span> 訪客模式：進度只存這台電腦。<a href="/login">登入</a>後才會綁定帳號、跨裝置續玩'; }
}
</script>
